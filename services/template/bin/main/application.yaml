# ===========================================================================
# NovaTrek Microservice — Shared Configuration
# ===========================================================================
# Settings common to ALL environments. Override per environment below.
# ===========================================================================

spring:
  application:
    name: svc-template  # CHANGE: Replace with actual service name

  # Database
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate  # Never auto-create — Flyway manages schema
    open-in-view: false
    properties:
      hibernate:
        default_schema: template  # CHANGE: Replace with service schema name

  # Flyway
  flyway:
    enabled: true
    schemas: template  # CHANGE: Replace with service schema name
    clean-disabled: true
    baseline-on-migrate: true

  # Jackson
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

# Server
server:
  port: 8080
  shutdown: graceful

# Resilience4j defaults
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
  timelimiter:
    configs:
      default:
        timeout-duration: 5s
