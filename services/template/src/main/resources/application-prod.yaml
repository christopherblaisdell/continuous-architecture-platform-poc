# ===========================================================================
# Production Environment Profile (Azure)
# ===========================================================================

spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${DATABASE_HOST}:5432/novatrek_prod
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

logging:
  level:
    com.novatrek: INFO
    root: WARN
