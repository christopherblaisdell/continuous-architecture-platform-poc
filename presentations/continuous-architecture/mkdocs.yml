site_name: "Continuous Architecture — Closing the Loop"
site_description: "How we achieve truly continuous architecture: automated publishing, the PROMOTE step, and CALM integration"
site_author: "Christopher Blaisdell"

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.instant.prefetch
    - content.tabs.link
    - toc.integrate
  icon:
    logo: material/sync-circle
  font:
    text: Inter
    code: Fira Code

nav:
  - Home: index.md
  - The Problem: the-problem.md
  - The Platform:
    - Markdown-First: markdown-first.md
    - Automated Publishing: publishing-pipeline.md
  - Closing the Loop: closing-the-loop.md
  - CALM Integration: calm-integration.md
  - Roadmap: roadmap.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.critic
  - pymdownx.mark

extra_css:
  - stylesheets/presentation.css

extra_javascript:
  - javascripts/site-name-link.js

extra:
  generator: false
