# ---------------------------------------------------------------------------
# MkDocs Material Configuration — Continuous Architecture Platform
# ---------------------------------------------------------------------------
# Local preview:  mkdocs serve
# Build:          mkdocs build --strict
# Output:         site/
# ---------------------------------------------------------------------------

site_name: Continuous Architecture Platform
site_url: https://victorious-mud-06704740f.4.azurestaticapps.net
site_description: >-
  Living architecture documentation for NovaTrek Adventures —
  ADRs, solution designs, service pages, and architecture standards.
site_author: Christopher Blaisdell
repo_url: https://github.com/christopherblaisdell/continuous-architecture-platform-poc
repo_name: continuous-architecture-platform-poc
edit_uri: edit/main/

# ---------------------------------------------------------------------------
# Theme
# ---------------------------------------------------------------------------
theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github

# ---------------------------------------------------------------------------
# Plugins
# ---------------------------------------------------------------------------
plugins:
  - search
  - tags
  - exclude:
      glob:
        - "phase-1-ai-tool-cost-comparison/workspace/corporate-services/**"
        - "phase-1-ai-tool-cost-comparison/workspace/source-code/**"
        - "phase-1-ai-tool-cost-comparison/workspace/scripts/**"
        - "phase-1-ai-tool-cost-comparison/workspace/work-items/**"
        - "phase-1-ai-tool-cost-comparison/outputs/**"
        - "phase-1-ai-tool-cost-comparison/scripts/**"
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true
  - git-committers:
      repository: christopherblaisdell/continuous-architecture-platform-poc
      branch: main
  - minify:
      minify_html: true

# ---------------------------------------------------------------------------
# Markdown Extensions
# ---------------------------------------------------------------------------
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - attr_list
  - md_in_html
  - tables
  - def_list
  - footnotes
  - toc:
      permalink: true

