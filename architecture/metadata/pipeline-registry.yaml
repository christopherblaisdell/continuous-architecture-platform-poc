# ===========================================================================
# Pipeline Registry — NovaTrek Adventures
# ===========================================================================
# Central registry of all CI/CD pipelines and Azure resources.
# Used by portal generators to inject pipeline links into every page.
# ===========================================================================

repository:
  org: christopherblaisdell
  repo: continuous-architecture-platform-poc-2
  base_url: https://github.com/christopherblaisdell/continuous-architecture-platform-poc-2

# ---------------------------------------------------------------------------
# Global Pipelines
# ---------------------------------------------------------------------------
pipelines:
  global:
    infra-deploy:
      workflow: infra-deploy.yml
      description: Provision/update Azure platform resources (Bicep)
    infra-teardown:
      workflow: infra-teardown.yml
      description: Destroy non-prod environments (manual trigger)
    docs-deploy:
      workflow: docs-deploy.yml
      description: Build and publish architecture portal
    ephemeral-env:
      workflow: ephemeral-env.yml
      description: PR-based preview environments (auto create/destroy)
    db-migrate:
      workflow: db-migrate.yml
      description: Database migrations (Flyway)
    nightly-stop-dev:
      workflow: nightly-stop-dev.yml
      description: Stop dev resources at night (cost control)
    nightly-start-dev:
      workflow: nightly-start-dev.yml
      description: Start dev resources in morning
    validate-solution:
      workflow: validate-solution.yml
      description: Validate architecture solution designs
    confluence-drift-check:
      workflow: confluence-drift-check.yml
      description: Monitor Confluence mirror for unauthorized edits

  # ---------------------------------------------------------------------------
  # Per-Service Pipeline Patterns
  # ---------------------------------------------------------------------------
  per-service:
    ci-workflow-pattern: "service-{service-name}.yml"
    cd-workflow: "service-cd.yml"
    source-path-pattern: "services/{service-name}"
    dockerfile-pattern: "services/{service-name}/Dockerfile"
    migration-path-pattern: "services/{service-name}/src/main/resources/db/migration"
    infra-module: "infra/modules/container-app.bicep"
    openapi-spec-pattern: "architecture/specs/{service-name}.yaml"

# ---------------------------------------------------------------------------
# Azure Resources
# ---------------------------------------------------------------------------
azure:
  subscription_id: "19e4c997-f9c1-46a9-b66b-1ad5a8260b8b"
  resource_groups:
    prod: rg-novatrek-prod
    dev: rg-novatrek-dev
  container_app_pattern: "ca-{service-name}"
  container_registry:
    prod: crnovatrekprod
    dev: crnovatrekdev
  key_vault:
    prod: kv-novatrek-prod
    dev: kv-novatrek-dev
  postgresql:
    prod: psql-novatrek-prod
    dev: psql-novatrek-dev
  service_bus:
    prod: sb-novatrek-prod
    dev: sb-novatrek-dev
  log_analytics:
    prod: log-novatrek-prod
    dev: log-novatrek-dev
  app_insights:
    prod: appi-novatrek-prod
    dev: appi-novatrek-dev

# ---------------------------------------------------------------------------
# Azure Portal Link Templates
# ---------------------------------------------------------------------------
portal_links:
  container_app: "https://portal.azure.com/#@/resource/subscriptions/{subscription_id}/resourceGroups/{rg}/providers/Microsoft.App/containerApps/{name}"
  log_analytics: "https://portal.azure.com/#@/resource/subscriptions/{subscription_id}/resourceGroups/{rg}/providers/Microsoft.OperationalInsights/workspaces/{name}/logs"
  postgresql: "https://portal.azure.com/#@/resource/subscriptions/{subscription_id}/resourceGroups/{rg}/providers/Microsoft.DBforPostgreSQL/flexibleServers/{name}"
  service_bus: "https://portal.azure.com/#@/resource/subscriptions/{subscription_id}/resourceGroups/{rg}/providers/Microsoft.ServiceBus/namespaces/{name}"
