# Cross-service integration map showing which endpoints call which services.
# Source of truth for portal generation.
# Edit this file, commit, push -- CI rebuilds the portal automatically.

svc-check-in:
  POST /check-ins:
  - alias: Res
    label: Reservations
    action: Verify reservation exists
    async: false
    target:
      method: GET
      path: /reservations/{reservation_id}
  - alias: GP
    label: Guest Profiles
    action: Validate guest identity
    async: false
    target:
      method: GET
      path: /guests/{guest_id}
  - alias: TC
    label: Trip Catalog
    action: Get adventure category
    async: false
    target:
      method: GET
      path: /trips/{trip_id}
  - alias: Safety
    label: Safety Compliance
    action: Validate active waiver
    async: false
    target:
      method: GET
      path: /waivers
  - alias: Ntfy
    label: Notifications
    action: Send check-in confirmation
    async: true
    target:
      method: POST
      path: /notifications
  POST /check-ins/{check_in_id}/gear-verification:
  - alias: Gear
    label: Gear Inventory
    action: Verify gear assignment
    async: false
    target:
      method: GET
      path: /gear-assignments/{assignment_id}
  - alias: Safety
    label: Safety Compliance
    action: Log gear verification
    async: false
    target:
      method: POST
      path: /incidents
svc-reservations:
  POST /reservations:
  - alias: GP
    label: Guest Profiles
    action: Validate guest identity
    async: false
    target:
      method: GET
      path: /guests/{guest_id}
  - alias: TC
    label: Trip Catalog
    action: Check trip availability
    async: false
    target:
      method: GET
      path: /trips/{trip_id}
  - alias: Pay
    label: Payments Svc
    action: Process deposit payment
    async: false
    target:
      method: POST
      path: /payments
  - alias: Kafka
    label: Event Bus
    action: reservation.created
    async: true
  - alias: Ntfy
    label: Notifications
    action: Send booking confirmation
    async: true
    target:
      method: POST
      path: /notifications
  PUT /reservations/{reservation_id}:
  - alias: TC
    label: Trip Catalog
    action: Verify availability
    async: false
    target:
      method: GET
      path: /trips/{trip_id}
  POST /reservations/{reservation_id}/participants:
  - alias: GP
    label: Guest Profiles
    action: Validate participant
    async: false
    target:
      method: GET
      path: /guests/{guest_id}
  PUT /reservations/{reservation_id}/status:
  - alias: Kafka
    label: Event Bus
    action: reservation.status_changed
    async: true
  - alias: Ntfy
    label: Notifications
    action: Send status update
    async: true
    target:
      method: POST
      path: /notifications
svc-scheduling-orchestrator:
  POST /schedule-requests:
  - alias: GM
    label: Guide Mgmt
    action: Check guide availability
    async: false
    target:
      method: GET
      path: /guides/{guide_id}/availability
  - alias: TM
    label: Trail Mgmt
    action: Verify trail conditions
    async: false
    target:
      method: GET
      path: /trails/{trail_id}/conditions
  - alias: WX
    label: Weather Svc
    action: Get forecast
    async: false
    target:
      method: GET
      path: /weather/forecast
  - alias: TC
    label: Trip Catalog
    action: Get trip details
    async: false
    target:
      method: GET
      path: /trips/{trip_id}
  - alias: Ntfy
    label: Notifications
    action: Notify assigned guides
    async: true
    target:
      method: POST
      path: /notifications
  POST /schedule-optimization:
  - alias: GM
    label: Guide Mgmt
    action: Get all available guides
    async: false
    target:
      method: GET
      path: /guides/available
  - alias: LS
    label: Location Svc
    action: Check location capacity
    async: false
    target:
      method: GET
      path: /locations/{location_id}/capacity
  - alias: TC
    label: Trip Catalog
    action: Get trip requirements
    async: false
    target:
      method: GET
      path: /trips/{trip_id}
  - alias: AN
    label: Analytics
    action: Log optimization metrics
    async: true
    target:
      method: POST
      path: /events
  POST /schedule-conflicts/resolve:
  - alias: GM
    label: Guide Mgmt
    action: Reassign guide
    async: false
    target:
      method: PATCH
      path: /guides/{guide_id}
  - alias: Ntfy
    label: Notifications
    action: Notify affected parties
    async: true
    target:
      method: POST
      path: /notifications
svc-partner-integrations:
  POST /partner-bookings:
  - alias: GP
    label: Guest Profiles
    action: Validate guest identity
    async: false
    target:
      method: GET
      path: /guests/{guest_id}
  - alias: TC
    label: Trip Catalog
    action: Check trip availability
