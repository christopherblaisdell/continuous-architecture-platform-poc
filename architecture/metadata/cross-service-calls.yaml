    action: Confirm reservation
    async: false
    target:
      method: PUT
      path: /reservations/{reservation_id}/status
  - alias: Pay
    label: Payments Svc
    action: Process commission
    async: false
    target:
      method: POST
      path: /payments
  - alias: Ntfy
    label: Notifications
    action: Send partner confirmation
    async: true
    target:
      method: POST
      path: /notifications
svc-guest-profiles:
  POST /guests:
  - alias: ExtID
    label: IDVerify API
    action: Verify identity document
    async: false
