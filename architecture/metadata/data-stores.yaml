        constraints: NOT NULL, FK -> partners
      - name: reservation_id
        type: UUID
        constraints: NOT NULL
      - name: idempotency_key
        type: VARCHAR(64)
        constraints: NOT NULL, UNIQUE
      - name: commission_amount
        type: DECIMAL(10,2)
        constraints: NOT NULL
      - name: created_at
        type: TIMESTAMPTZ
        constraints: NOT NULL
      indexes:
      - name: idx_pb_partner
        columns: partner_id
      - name: idx_pb_idempotency
        columns: idempotency_key
        type: UNIQUE
