        columns: reservation_id
svc-payments:
  engine: PostgreSQL 15
  schema: payments
  tables:
  - payments
  - refunds
  - payment_methods
  - daily_summaries
  features:
  - PCI-DSS compliant token storage (no raw card data)
  - Idempotent payment processing via request keys
  - Double-entry ledger for financial reconciliation
  volume: ~2,500 transactions/day
  connection_pool:
    min: 10
    max: 30
    idle_timeout: 5min
  backup: Continuous WAL archiving, daily base backup, 7-year retention (financial)
  table_details:
    payments:
      description: Payment transaction records with tokenized card references
      columns:
      - name: payment_id
        type: UUID
        constraints: PK
      - name: reservation_id
        type: UUID
        constraints: NOT NULL
      - name: guest_id
        type: UUID
        constraints: NOT NULL
      - name: amount
        type: DECIMAL(10,2)
        constraints: NOT NULL
      - name: currency
        type: CHAR(3)
        constraints: NOT NULL
      - name: payment_method_id
        type: UUID
        constraints: NOT NULL, FK -> payment_methods
      - name: gateway_ref
        type: VARCHAR(255)
        constraints: NOT NULL
      - name: status
        type: VARCHAR(20)
        constraints: NOT NULL
      - name: idempotency_key
        type: VARCHAR(64)
        constraints: NOT NULL, UNIQUE
      - name: created_at
        type: TIMESTAMPTZ
        constraints: NOT NULL
      indexes:
      - name: idx_pay_reservation
        columns: reservation_id
      - name: idx_pay_guest
        columns: guest_id
      - name: idx_pay_idempotency
        columns: idempotency_key
        type: UNIQUE
      - name: idx_pay_status
        columns: status, created_at DESC
    refunds:
      description: Refund records linked to original payments
      columns:
      - name: refund_id
        type: UUID
        constraints: PK
      - name: payment_id
        type: UUID
        constraints: NOT NULL, FK -> payments
      - name: amount
        type: DECIMAL(10,2)
        constraints: NOT NULL
      - name: reason
        type: TEXT
        constraints: NOT NULL
      - name: gateway_ref
        type: VARCHAR(255)
        constraints: NOT NULL
      - name: status
        type: VARCHAR(20)
        constraints: NOT NULL
      - name: created_at
        type: TIMESTAMPTZ
        constraints: NOT NULL
      indexes:
      - name: idx_refund_payment
        columns: payment_id
    payment_methods:
      description: Tokenized payment instruments (no raw card data stored)
      columns:
      - name: method_id
        type: UUID
        constraints: PK
      - name: guest_id
        type: UUID
        constraints: NOT NULL
      - name: token
        type: VARCHAR(255)
        constraints: NOT NULL (gateway token)
      - name: card_last_four
        type: CHAR(4)
        constraints: NOT NULL
      - name: card_brand
        type: VARCHAR(20)
        constraints: NOT NULL
      - name: expiry_month
        type: SMALLINT
        constraints: NOT NULL
      - name: expiry_year
        type: SMALLINT
        constraints: NOT NULL
      - name: is_default
        type: BOOLEAN
        constraints: NOT NULL, DEFAULT FALSE
      indexes:
      - name: idx_pm_guest
        columns: guest_id
svc-notifications:
  engine: PostgreSQL 15 + Valkey 8
  schema: notifications
  tables:
  - notifications
  - templates
  - delivery_log
  - channel_preferences
  features:
  - Valkey queue for async delivery processing
  - Template versioning with rollback support
  - 'Multi-channel delivery: email, SMS, push, in-app'
  volume: ~15,000 notifications/day
  connection_pool:
    min: 5
    max: 25
    idle_timeout: 10min
  backup: Daily pg_dump, 30-day retention
  table_details:
    notifications:
      description: Notification dispatch records with delivery tracking
      columns:
      - name: notification_id
        type: UUID
        constraints: PK
      - name: recipient_id
        type: UUID
        constraints: NOT NULL
      - name: template_id
        type: UUID
        constraints: NOT NULL, FK -> templates
      - name: channel
        type: VARCHAR(20)
        constraints: NOT NULL
      - name: subject
        type: VARCHAR(255)
        constraints: 'NULL'
      - name: body
        type: TEXT
        constraints: NOT NULL
      - name: status
        type: VARCHAR(20)
        constraints: NOT NULL, DEFAULT 'queued'
      - name: scheduled_at
        type: TIMESTAMPTZ
        constraints: 'NULL'
      - name: sent_at
        type: TIMESTAMPTZ
        constraints: 'NULL'
      - name: created_at
        type: TIMESTAMPTZ
        constraints: NOT NULL
      indexes:
      - name: idx_notif_recipient
        columns: recipient_id, created_at DESC
      - name: idx_notif_status
        columns: status
      - name: idx_notif_scheduled
        columns: scheduled_at
        type: WHERE status = 'scheduled'
    templates:
      description: Notification content templates with version history
      columns:
      - name: template_id
        type: UUID
        constraints: PK
      - name: name
        type: VARCHAR(100)
        constraints: NOT NULL
      - name: channel
        type: VARCHAR(20)
        constraints: NOT NULL
      - name: subject_template
        type: TEXT
        constraints: 'NULL'
      - name: body_template
        type: TEXT
        constraints: NOT NULL
      - name: version
        type: INTEGER
        constraints: NOT NULL, DEFAULT 1
      - name: active
        type: BOOLEAN
        constraints: NOT NULL, DEFAULT TRUE
      - name: created_at
        type: TIMESTAMPTZ
        constraints: NOT NULL
      indexes:
      - name: idx_tpl_name_channel
        columns: name, channel
    delivery_log:
      description: Delivery attempt history for debugging and retry logic
      columns:
      - name: log_id
        type: UUID
        constraints: PK
      - name: notification_id
        type: UUID
        constraints: NOT NULL, FK -> notifications
      - name: attempt
        type: SMALLINT
        constraints: NOT NULL
      - name: status
        type: VARCHAR(20)
        constraints: NOT NULL
      - name: provider_response
        type: JSONB
        constraints: 'NULL'
      - name: attempted_at
        type: TIMESTAMPTZ
        constraints: NOT NULL
      indexes:
      - name: idx_dlog_notif
        columns: notification_id
svc-analytics:
  engine: Oracle Database 19c
  schema: ANALYTICS
  tables:
  - BOOKING_METRICS
  - REVENUE_METRICS
  - UTILIZATION_METRICS
  - SATISFACTION_SCORES
  - SAFETY_METRICS
  - GUIDE_PERFORMANCE
  features:
  - Oracle Partitioning for time-series data (range partitioning by month)
  - Materialized views with fast refresh for real-time dashboards
  - Oracle Advanced Analytics (DBMS_PREDICTIVE_ANALYTICS) for trend forecasting
  volume: ~50K metric inserts/day (event-driven)
  connection_pool:
    min: 5
    max: 20
    idle_timeout: 10min
  backup: Oracle RMAN incremental backup, 90-day retention
  table_details:
    BOOKING_METRICS:
      description: Aggregated booking KPIs partitioned by month
      columns:
      - name: METRIC_ID
        type: NUMBER(19)
        constraints: PK
      - name: METRIC_DATE
        type: DATE
        constraints: NOT NULL
      - name: REGION_ID
        type: VARCHAR2(36)
        constraints: NOT NULL
      - name: BOOKINGS_COUNT
        type: NUMBER(10)
        constraints: NOT NULL
      - name: CANCELLATION_COUNT
        type: NUMBER(10)
        constraints: NOT NULL, DEFAULT 0
      - name: TOTAL_REVENUE
        type: NUMBER(12,2)
        constraints: NOT NULL
      - name: AVG_PARTY_SIZE
        type: NUMBER(4,1)
        constraints: 'NULL'
      - name: CREATED_AT
        type: TIMESTAMP WITH TIME ZONE
        constraints: NOT NULL
      indexes:
      - name: IDX_BM_DATE_REGION
        columns: METRIC_DATE, REGION_ID
    REVENUE_METRICS:
      description: Daily revenue aggregation across payment channels
      columns:
      - name: METRIC_ID
        type: NUMBER(19)
        constraints: PK
      - name: METRIC_DATE
        type: DATE
        constraints: NOT NULL
      - name: CHANNEL
        type: VARCHAR2(30)
        constraints: NOT NULL
      - name: GROSS_REVENUE
        type: NUMBER(12,2)
        constraints: NOT NULL
      - name: REFUND_TOTAL
        type: NUMBER(12,2)
        constraints: NOT NULL, DEFAULT 0
      - name: NET_REVENUE
        type: NUMBER(12,2)
        constraints: GENERATED ALWAYS AS (GROSS_REVENUE - REFUND_TOTAL)
      - name: TRANSACTION_COUNT
        type: NUMBER(10)
        constraints: NOT NULL
      indexes:
      - name: IDX_RM_DATE
        columns: METRIC_DATE
    GUIDE_PERFORMANCE:
      description: Guide performance metrics for scheduling optimization
      columns:
      - name: METRIC_ID
        type: NUMBER(19)
        constraints: PK
      - name: GUIDE_ID
        type: VARCHAR2(36)
        constraints: NOT NULL
      - name: METRIC_DATE
        type: DATE
        constraints: NOT NULL
      - name: TRIPS_LED
        type: NUMBER(5)
        constraints: NOT NULL
      - name: AVG_RATING
        type: NUMBER(3,2)
        constraints: 'NULL'
      - name: INCIDENTS_COUNT
        type: NUMBER(5)
        constraints: NOT NULL, DEFAULT 0
      - name: UTILIZATION_PCT
        type: NUMBER(5,2)
        constraints: 'NULL'
      indexes:
      - name: IDX_GP_GUIDE_DATE
        columns: GUIDE_ID, METRIC_DATE
svc-loyalty-rewards:
  engine: Couchbase 7
  schema: loyalty
  tables:
  - members
  - point_transactions
  - tiers
  - redemptions
  features:
  - Document-oriented member profiles with flexible reward schemas
  - N1QL queries for tier recalculation and point aggregation
  - Sub-document operations for atomic point balance updates
  volume: ~1,000 transactions/day
  connection_pool:
    min: 5
    max: 15
    idle_timeout: 30s
  backup: XDCR to standby cluster, daily cbbackupmgr
  table_details:
    members:
      description: Loyalty member documents with point balances and tier status
      columns:
      - name: document_key
        type: String
        constraints: members::{guest_id}
      - name: guest_id
        type: String
        constraints: NOT NULL
      - name: tier
        type: String
        constraints: NOT NULL (bronze/silver/gold/platinum)
      - name: points_balance
        type: Number
        constraints: NOT NULL
      - name: lifetime_points
        type: Number
        constraints: NOT NULL
      - name: tier_qualified_at
        type: ISO8601 String
        constraints: NOT NULL
      - name: enrolled_at
        type: ISO8601 String
        constraints: NOT NULL
      indexes:
      - name: idx_member_tier
        columns: tier
        type: N1QL GSI
      - name: idx_member_points
        columns: points_balance DESC
        type: N1QL GSI
    point_transactions:
      description: Point earn and redeem transaction ledger
      columns:
      - name: document_key
        type: String
        constraints: txn::{transaction_id}
      - name: transaction_id
        type: String
        constraints: NOT NULL
      - name: guest_id
        type: String
        constraints: NOT NULL
      - name: type
        type: String
        constraints: NOT NULL (earn/redeem/expire/adjust)
      - name: points
        type: Number
        constraints: NOT NULL
      - name: description
        type: String
        constraints: NOT NULL
      - name: reference_id
        type: String
        constraints: NULL (reservation or trip ID)
      - name: created_at
        type: ISO8601 String
        constraints: NOT NULL
      indexes:
      - name: idx_txn_guest
        columns: guest_id, created_at DESC
        type: N1QL GSI
    redemptions:
      description: Reward redemption records against point balances
      columns:
      - name: document_key
        type: String
        constraints: redemption::{redemption_id}
      - name: redemption_id
        type: String
        constraints: NOT NULL
      - name: guest_id
        type: String
        constraints: NOT NULL
      - name: reward_type
        type: String
        constraints: NOT NULL
      - name: points_spent
        type: Number
        constraints: NOT NULL
      - name: status
        type: String
        constraints: NOT NULL
      - name: redeemed_at
        type: ISO8601 String
        constraints: NOT NULL
      indexes:
      - name: idx_redeem_guest
        columns: guest_id
        type: N1QL GSI
svc-media-gallery:
