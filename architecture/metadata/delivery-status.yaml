# ===========================================================================
# Delivery Status — NovaTrek Adventures
# ===========================================================================
# Tracks deployment progress for each microservice across delivery waves.
# Updated as services progress through build → deploy → prod stages.
# ===========================================================================

waves:
  0:
    name: Foundation
    description: Shared infrastructure — no microservices
    status: deployed
    deployed_date: '2026-03-10'
    resources:
      - crnovatrekdev (Container Registry, eastus2)
      - sb-novatrek-dev (Service Bus, eastus2, 8 queues)
      - log-novatrek-dev (Log Analytics, eastus2)
      - stnovatrekdev (Storage Account, eastus2, 3 containers)
      - appi-novatrek-dev (Application Insights, eastus2)
      - cae-novatrek-dev (Container Apps Environment, eastus2)
      - kv-novatrek-dev (Key Vault, eastus2)
      - id-novatrek-dev (Managed Identity, eastus2)
      - pg-novatrek-dev-* (PostgreSQL Flexible Server, centralus, 19 databases)
  1:
    name: Guest Identity and Product Catalog
    description: Core data services with no upstream dependencies
    status: deployed
    deployed_date: '2026-03-10'
    services:
      - ca-svc-guest-profiles (Container App, eastus2)
      - ca-svc-trip-catalog (Container App, eastus2)
      - ca-svc-trail-management (Container App, eastus2)
  2:
    name: Booking and Payments
    description: Transaction core — reservations and payment processing
    status: in-progress
    started_date: '2026-03-14'
  3:
    name: Day-of-Adventure Operations
    description: Check-in flow — the most complex orchestration
    status: not-started
  4:
    name: Guide and Transport Operations
    description: Guide management, transport logistics, location services
    status: not-started
  5:
    name: Analytics, Loyalty, and Media
    description: Supporting services for reporting and engagement
    status: not-started
  6:
    name: External Integrations
    description: Partner integrations, weather, procurement, emergency
    status: not-started
  7:
    name: New Capabilities
    description: Ticket-driven new services (reviews, tracking, referrals)
    status: not-started

