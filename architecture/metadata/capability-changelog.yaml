# NovaTrek Adventures — Capability Changelog
# SINGLE SOURCE OF TRUTH for all capability changes driven by solution designs.
# Each entry maps a ticket/solution to the capabilities it shaped.
# L3 capabilities emerge here; L1 and L2 are defined in capabilities.yaml.
#
# DATA MODEL:
# - This file is the authoritative record of which capabilities each solution affects.
# - tickets.yaml does NOT duplicate capability mappings for solved tickets.
# - Solution capabilities.md files reference this changelog, not the other way around.
# - Generators derive all capability-solution relationships from this file.

entries:

  - ticket: NTK-10001
    date: 2025-02-01
    solution: _NTK-10001-add-elevation-to-trail-response
    summary: Add elevation profile data to trail API response
    capabilities:
      - id: CAP-2.4
        impact: enhanced
        description: Trail response now includes elevation gain/loss and elevation profile array
        l3_capabilities:
          - name: Elevation Profile Data
            description: Structured elevation gain, loss, and distance-indexed profile points in trail API response

  - ticket: NTK-10002
    date: 2025-02-10
    solution: _NTK-10002-adventure-category-classification
    summary: Configuration-driven adventure category classification for check-in UI patterns
    capabilities:
      - id: CAP-2.1
        impact: enhanced
        description: Check-in UI now renders different flows based on adventure category (Pattern 1/2/3)
        l3_capabilities:
          - name: Pattern-Based Check-In Flows
            description: Three distinct check-in UI patterns (Basic, Guided, Full Service) driven by adventure category
          - name: Safe Default Classification
            description: Unknown or unmapped categories default to Pattern 3 (Full Service) for safety
      - id: CAP-1.2
        impact: enhanced
        description: Adventure catalog exposes category classification for consumer services
        l3_capabilities:
          - name: Adventure Category Taxonomy
            description: YAML-driven classification of 25 adventure types into 3 check-in patterns
    decisions:
      - ADR-004
      - ADR-005

  - ticket: NTK-10003
    date: 2025-02-12
    solution: _NTK-10003-unregistered-guest-self-checkin
    summary: Enable unregistered walk-up guests to self-check-in via kiosks
    capabilities:
      - id: CAP-2.1
        impact: enhanced
        description: Check-in flow now supports walk-up guests without prior reservation
        l3_capabilities:
          - name: Reservation Lookup Orchestration
            description: Four-field identity verification (name, confirmation code, date, party size) for kiosk access
          - name: Session-Scoped Kiosk Access
            description: JWT-based 30-minute session tokens for kiosk interactions
      - id: CAP-1.1
        impact: enhanced
        description: Temporary guest profiles created for unregistered walk-up guests
        l3_capabilities:
          - name: Temporary Guest Profiles
            description: Minimal-PII temporary profiles that merge when guest registers
      - id: CAP-1.3
        impact: enhanced
        description: Just-in-time reservation creation for walk-up guests
    decisions:
      - ADR-006
      - ADR-007
      - ADR-008
      - ADR-009

  - ticket: NTK-10004
    date: 2025-02-05
    solution: _NTK-10004-guide-schedule-overwrite-bug
    summary: Fix concurrent schedule update overwrites with optimistic locking
    capabilities:
      - id: CAP-2.2
        impact: fixed
        description: Schedule updates now use PATCH semantics with optimistic locking to prevent data loss
        l3_capabilities:
          - name: Optimistic Locking on Daily Schedule
            description: Version-based concurrency control (_rev field) prevents concurrent overwrites
          - name: PATCH Semantics for Schedule Updates
            description: Field-level merge replaces full entity replacement on schedule endpoints
    decisions:
      - ADR-010
      - ADR-011

  - ticket: NTK-10005
    date: 2025-02-08
    solution: _NTK-10005-wristband-rfid-field
    summary: Add RFID wristband field to check-in record for adventure tracking
    capabilities:
      - id: CAP-2.1
        impact: enhanced
        description: Check-in record now captures wristband RFID tag ID for location tracking
        l3_capabilities:
          - name: Wristband RFID Capture
            description: Optional RFID tag ID (hex, 8-16 chars) validated and stored at check-in with uniqueness constraint

  - ticket: NTK-10008
    date: 2026-03-06
    solution: _NTK-10008-guest-reviews-and-ratings
    summary: Guest reviews and ratings platform with moderation pipeline
    capabilities:
      - id: CAP-1.7
        impact: new
        description: New svc-reviews service enables guest review submission, moderation, and aggregated ratings
        l3_capabilities:
          - name: Reservation-Gated Review Submission
            description: Reviews authenticated via COMPLETED reservation status — prevents fake reviews
          - name: Moderation Pipeline
            description: Reviews enter PENDING_MODERATION and require approval (automated or manual) before publication
          - name: Aggregated Rating Summaries
            description: Pre-computed per-trip and per-guide average ratings with distribution histograms
          - name: Category Ratings
            description: Optional per-category breakdown (safety, guide quality, value, scenery, difficulty accuracy)
          - name: Community Curation
            description: Helpful vote mechanism allows guests to surface the most useful reviews
      - id: CAP-1.2
        impact: enhanced
        description: Trip catalog pages display aggregated guest ratings from svc-reviews
        l3_capabilities:
          - name: Social Proof on Trip Pages
            description: Trip detail pages show average rating, review count, and rating distribution
    decisions:
      - ADR-NTK10008-001
      - ADR-NTK10008-002
      - ADR-NTK10008-003

  - ticket: NTK-10006
    date: 2026-03-13
    solution: _NTK-10006-real-time-adventure-tracking
    summary: Real-time GPS adventure tracking with automated emergency alerting
    capabilities:
      - id: CAP-3.3
        impact: enhanced
        description: >-
          Emergency response now triggered automatically by GPS signals (SOS button activation
          and geofence boundary violations) via svc-adventure-tracking; no longer dependent
          solely on radio reports from guides
        l3_capabilities:
          - name: Automated SOS Emergency Trigger
            description: >-
              SOS signal from wristband device creates emergency incident in svc-emergency-response
              within 60 seconds; rescue dispatch begins without human initiation
          - name: Geofence Violation Alerting
            description: >-
              Adventure parties crossing defined GPS boundaries trigger a safety officer alert
              with 5-minute acknowledgment window before automatic emergency escalation
          - name: Real-Time Adventure Session Visibility
            description: >-
              Operations dashboard displays live GPS positions of all active adventure parties
              via svc-adventure-tracking session and telemetry APIs
      - id: CAP-3.2
        impact: enhanced
        description: >-
          Incident reports in svc-safety-compliance now link to GPS telemetry sessions in
          svc-adventure-tracking; compliance officers can retrieve the full position history
          for insurance investigations and regulatory reporting
        l3_capabilities:
          - name: GPS Telemetry Trail for Incident Investigation
            description: >-
              90-day retained position history linked from incident records; provides GPS
              evidence trail for insurance claims and regulatory compliance
      - id: CAP-2.1
        impact: enhanced
        description: >-
          svc-check-in extended with ADVENTURE_STARTED status transition that activates a
          tracking session in svc-adventure-tracking; tracking is now part of the check-in
          departure workflow
        l3_capabilities:
          - name: Adventure Tracking Session Activation
            description: >-
              Guide-initiated ADVENTURE_STARTED transition in svc-check-in automatically
              activates a GPS tracking session with all party wristband devices registered
    decisions:
      - ADR-NTK10006-001
      - ADR-NTK10006-002
      - ADR-NTK10006-003

  - ticket: NTK-10009
    date: 2026-03-06
    solution: _NTK-10009-refund-dispute-management
    summary: Structured refund dispute workflows with policy engine and tiered escalation
    capabilities:
      - id: CAP-5.5
        impact: enhanced
        description: svc-payments extended with dispute lifecycle, YAML-driven refund policy engine, and three-tier escalation
        l3_capabilities:
          - name: Dispute Lifecycle Management
            description: Full dispute lifecycle (OPENED, UNDER_REVIEW, ESCALATED, RESOLVED) with audit trail
          - name: YAML-Driven Refund Policy Engine
            description: Codified cancellation windows and refund percentages evaluated automatically per ADR-004 pattern
          - name: Three-Tier Escalation
            description: Auto-approve (policy-eligible), agent review (edge cases), manager escalation (high-value)
          - name: Chargeback Ingestion
            description: Payment processor chargeback webhooks create dispute records auto-escalated to manager tier
      - id: CAP-5.4
        impact: enhanced
        description: Dispute resolution records provide structured audit trail for financial reconciliation
        l3_capabilities:
          - name: Dispute Audit Trail
            description: All resolution decisions include policy evaluation, resolver identity, justification, and outcome
    decisions:
      - ADR-NTK10009-001
      - ADR-NTK10009-002
      - ADR-NTK10009-003
