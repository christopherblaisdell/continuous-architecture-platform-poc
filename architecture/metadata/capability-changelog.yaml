# NovaTrek Adventures — Capability Changelog
# SINGLE SOURCE OF TRUTH for all capability changes driven by solution designs.
# Each entry maps a ticket/solution to the capabilities it shaped.
# L3 capabilities emerge here; L1 and L2 are defined in capabilities.yaml.
#
# DATA MODEL:
# - This file is the authoritative record of which capabilities each solution affects.
# - tickets.yaml does NOT duplicate capability mappings for solved tickets.
# - Solution capabilities.md files reference this changelog, not the other way around.
# - Generators derive all capability-solution relationships from this file.

entries:

  - ticket: NTK-10001
    date: 2025-02-01
    solution: _NTK-10001-add-elevation-to-trail-response
    summary: Add elevation profile data to trail API response
    capabilities:
      - id: CAP-2.4
        impact: enhanced
        description: Trail response now includes elevation gain/loss and elevation profile array
        l3_capabilities:
          - name: Elevation Profile Data
            description: Structured elevation gain, loss, and distance-indexed profile points in trail API response

  - ticket: NTK-10002
    date: 2025-02-10
    solution: _NTK-10002-adventure-category-classification
    summary: Configuration-driven adventure category classification for check-in UI patterns
    capabilities:
      - id: CAP-2.1
        impact: enhanced
        description: Check-in UI now renders different flows based on adventure category (Pattern 1/2/3)
        l3_capabilities:
          - name: Pattern-Based Check-In Flows
            description: Three distinct check-in UI patterns (Basic, Guided, Full Service) driven by adventure category
          - name: Safe Default Classification
            description: Unknown or unmapped categories default to Pattern 3 (Full Service) for safety
      - id: CAP-1.2
        impact: enhanced
        description: Adventure catalog exposes category classification for consumer services
        l3_capabilities:
          - name: Adventure Category Taxonomy
            description: YAML-driven classification of 25 adventure types into 3 check-in patterns
    decisions:
      - ADR-004
      - ADR-005

  - ticket: NTK-10003
    date: 2025-02-12
    solution: _NTK-10003-unregistered-guest-self-checkin
    summary: Enable unregistered walk-up guests to self-check-in via kiosks
    capabilities:
      - id: CAP-2.1
        impact: enhanced
        description: Check-in flow now supports walk-up guests without prior reservation
        l3_capabilities:
          - name: Reservation Lookup Orchestration
            description: Four-field identity verification (name, confirmation code, date, party size) for kiosk access
          - name: Session-Scoped Kiosk Access
            description: JWT-based 30-minute session tokens for kiosk interactions
      - id: CAP-1.1
        impact: enhanced
        description: Temporary guest profiles created for unregistered walk-up guests
        l3_capabilities:
          - name: Temporary Guest Profiles
            description: Minimal-PII temporary profiles that merge when guest registers
      - id: CAP-1.3
        impact: enhanced
        description: Just-in-time reservation creation for walk-up guests
    decisions:
      - ADR-006
      - ADR-007
      - ADR-008
      - ADR-009

  - ticket: NTK-10004
    date: 2025-02-05
    solution: _NTK-10004-guide-schedule-overwrite-bug
    summary: Fix concurrent schedule update overwrites with optimistic locking
    capabilities:
      - id: CAP-2.2
        impact: fixed
        description: Schedule updates now use PATCH semantics with optimistic locking to prevent data loss
        l3_capabilities:
          - name: Optimistic Locking on Daily Schedule
            description: Version-based concurrency control (_rev field) prevents concurrent overwrites
          - name: PATCH Semantics for Schedule Updates
            description: Field-level merge replaces full entity replacement on schedule endpoints
    decisions:
      - ADR-010
      - ADR-011

  - ticket: NTK-10005
    date: 2025-02-08
    solution: _NTK-10005-wristband-rfid-field
    summary: Add RFID wristband field to check-in record for adventure tracking
    capabilities:
      - id: CAP-2.1
        impact: enhanced
        description: Check-in record now captures wristband RFID tag ID for location tracking
        l3_capabilities:
          - name: Wristband RFID Capture
            description: Optional RFID tag ID (hex, 8-16 chars) validated and stored at check-in with uniqueness constraint
