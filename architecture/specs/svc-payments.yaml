openapi: 3.0.3
info:
  title: NovaTrek Payments Service
  description: |
    Manages payments, refunds, and billing for adventure bookings at NovaTrek Adventures.
    Handles payment processing, refund workflows, and financial reporting for all reservation transactions.
  version: 1.0.0
  contact:
    name: NovaTrek Platform Team
    email: platform@novatrek.example.com

servers:
  - url: https://api.novatrek.example.com/payments/v1
    description: Production
  - url: https://api-staging.novatrek.example.com/payments/v1
    description: Staging

security:
  - bearerAuth: []

tags:
  - name: Payments
    description: Payment processing and retrieval
  - name: Refunds
    description: Refund operations
  - name: Reporting
    description: Financial reporting and summaries

paths:
  /payments:
    post:
      operationId: processPayment
      summary: Process a payment
      description: Initiates payment processing for a reservation. The payment is authorized and captured based on the selected method.
      tags: [Payments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
      responses:
        '201':
          description: Payment initiated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Duplicate payment for reservation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /payments/{payment_id}:
    get:
      operationId: getPayment
      summary: Retrieve payment details
      description: Returns full details of a specific payment including processor reference and status history.
      tags: [Payments]
      parameters:
        - $ref: '#/components/parameters/PaymentId'
      responses:
        '200':
          description: Payment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /payments/{payment_id}/refund:
    post:
      operationId: refundPayment
      summary: Initiate a refund
      description: |
        Creates a refund for the specified payment. Supports full or partial refunds.
        Partial refunds can be issued multiple times up to the original payment amount.
      tags: [Refunds]
      parameters:
        - $ref: '#/components/parameters/PaymentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundRequest'
      responses:
        '201':
          description: Refund initiated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Refund'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Refund amount exceeds remaining balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /guests/{guest_id}/payment-history:
    get:
      operationId: getGuestPaymentHistory
      summary: Retrieve payment history for a guest
      description: Returns paginated payment history for a specific guest, ordered by most recent first.
      tags: [Payments]
      parameters:
        - name: guest_id
          in: path
          required: true
          description: Unique guest identifier (from guest profile service)
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          description: Filter by payment status
          schema:
            $ref: '#/components/schemas/PaymentStatus'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Paginated payment history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentHistoryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /payments/daily-summary:
    get:
      operationId: getDailySummary
      summary: Get daily payment summary
      description: Returns an aggregated summary of payments processed on a given date, broken down by method and status.
      tags: [Reporting]
      parameters:
        - name: date
          in: query
          required: true
          description: The date for the summary (ISO 8601)
          schema:
            type: string
            format: date
            example: "2026-02-28"
        - name: currency
          in: query
          description: Filter by currency code
          schema:
            type: string
            example: USD
      responses:
        '200':
          description: Daily summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailySummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PaymentId:
      name: payment_id
      in: path
      required: true
      description: Unique payment identifier
      schema:
        type: string
        format: uuid
    Limit:
      name: limit
      in: query
      description: Maximum number of results to return
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Offset:
      name: offset
      in: query
      description: Number of results to skip for pagination
      schema:
        type: integer
        minimum: 0
        default: 0

  schemas:
    PaymentRequest:
      type: object
      required: [reservation_id, guest_id, amount, currency, method]
      properties:
        reservation_id:
          type: string
          format: uuid
          description: Reservation identifier (cross-ref svc-reservations)
        guest_id:
          type: string
          format: uuid
          description: Guest identifier
        amount:
          type: number
          format: double
          minimum: 0.01
          description: Payment amount
          example: 249.99
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
          description: ISO 4217 currency code
          example: USD
        method:
          $ref: '#/components/schemas/PaymentMethod'
        payment_token:
          type: string
          description: Tokenized payment instrument from the payment vault
        idempotency_key:
          type: string
          description: Client-supplied key to prevent duplicate charges
          example: "ord-abc123-attempt1"

    Payment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        reservation_id:
          type: string
          format: uuid
          description: Associated reservation (cross-ref svc-reservations)
        guest_id:
          type: string
          format: uuid
        amount:
          type: number
          format: double
          example: 249.99
        currency:
          type: string
          example: USD
        method:
          $ref: '#/components/schemas/PaymentMethod'
        status:
          $ref: '#/components/schemas/PaymentStatus'
        processor_reference:
          type: string
          description: External reference from the payment processor
          example: "ch_3Nk8aJ2eZvKYloR"
        refunded_amount:
          type: number
          format: double
          description: Total amount refunded against this payment
          default: 0
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PaymentMethod:
      type: string
      enum:
        - CREDIT_CARD
        - DEBIT_CARD
        - BANK_TRANSFER
        - GIFT_CARD
        - PARTNER_VOUCHER

    PaymentStatus:
      type: string
      enum:
        - PENDING
        - AUTHORIZED
        - CAPTURED
        - FAILED
        - REFUNDED
        - PARTIALLY_REFUNDED

    RefundRequest:
      type: object
      required: [amount, reason]
      properties:
        amount:
          type: number
          format: double
          minimum: 0.01
          description: Amount to refund (partial or full)
        reason:
          type: string
          maxLength: 500
          description: Reason for the refund
          example: "Trip cancelled due to weather"
        initiated_by:
          type: string
          description: Operator or system that initiated the refund

    Refund:
      type: object
      properties:
        id:
          type: string
          format: uuid
        payment_id:
          type: string
          format: uuid
        amount:
          type: number
          format: double
        reason:
          type: string
        status:
          type: string
          enum: [PENDING, PROCESSED, FAILED]
        processor_reference:
          type: string
        initiated_by:
          type: string
        created_at:
          type: string
          format: date-time

    PaymentHistoryResponse:
      type: object
      properties:
        payments:
          type: array
          items:
            $ref: '#/components/schemas/Payment'
        total_count:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    DailySummary:
      type: object
      properties:
        date:
          type: string
          format: date
        total_transactions:
          type: integer
        total_captured:
          type: number
          format: double
        total_refunded:
          type: number
          format: double
        currency:
          type: string
        breakdown_by_method:
          type: array
          items:
            type: object
            properties:
              method:
                $ref: '#/components/schemas/PaymentMethod'
              count:
                type: integer
              total:
                type: number
                format: double

    ErrorResponse:
      type: object
      properties:
        error_code:
          type: string
          example: INVALID_REQUEST
        message:
          type: string
          example: The request body is invalid
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              issue:
                type: string

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnprocessableEntity:
      description: Request understood but cannot be processed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
