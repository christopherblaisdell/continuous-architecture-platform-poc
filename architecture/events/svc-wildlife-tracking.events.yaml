asyncapi: 3.0.0
info:
  title: svc-wildlife-tracking Events
  version: 1.0.0
  description: Domain events published by the NovaTrek Wildlife Tracking Service
  contact:
    name: NovaTrek Safety and Compliance Team

defaultContentType: application/json

channels:
  wildlifeAlertIssued:
    address: novatrek.safety.wildlife-alert.issued
    messages:
      wildlifeAlertIssued:
        $ref: '#/components/messages/WildlifeAlertIssued'

operations:
  publishWildlifeAlertIssued:
    action: send
    channel:
      $ref: '#/channels/wildlifeAlertIssued'
    summary: Published when a dangerous wildlife alert is issued for trails in a region

components:
  messages:
    WildlifeAlertIssued:
      name: WildlifeAlertIssued
      title: Wildlife Alert Issued
      summary: A wildlife alert has been issued affecting one or more adventure trails
      contentType: application/json
      payload:
        $ref: '#/components/schemas/WildlifeAlertIssuedPayload'

  schemas:
    WildlifeAlertIssuedPayload:
      type: object
      required:
        - event_id
        - event_type
        - timestamp
        - alert_id
        - species_name
        - threat_level
        - affected_trail_ids
      properties:
        event_id:
          type: string
          format: uuid
          description: Unique identifier for this event instance
        event_type:
          type: string
          const: wildlife_alert.issued
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the alert was issued
        alert_id:
          type: string
          format: uuid
          description: ID of the wildlife alert
        sighting_id:
          type: string
          format: uuid
          nullable: true
          description: Originating sighting ID if triggered by a report
        species_name:
          type: string
          description: Common name of the species involved
        threat_level:
          type: string
          enum: [low, moderate, high, extreme]
          description: Threat level classification
        affected_trail_ids:
          type: array
          items:
            type: string
            format: uuid
          description: Trail IDs affected by this alert
        recommended_action:
          type: string
          enum: [monitor, reroute, close_trail, evacuate]
          description: Recommended response action
        radius_meters:
          type: number
          format: double
          description: Alert radius around the sighting location
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: When the alert auto-expires if not manually cancelled
