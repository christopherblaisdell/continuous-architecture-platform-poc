site_name: "AI-Assisted Architecture — POC Results"
site_description: "POC results: add a $39/month AI subscription to VS Code for architecture workflows instead of building a custom platform"
site_author: "Christopher Blaisdell"

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: amber
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.instant.prefetch
    - content.tabs.link
    - toc.integrate
  icon:
    logo: material/robot-outline
  font:
    text: Inter
    code: Fira Code

nav:
  - Home: index.md
  - "The Pitch":
    - The Problem: problem.md
    - The Proposal: proposal.md
    - The Proof: proof.md
    - The Ask: the-ask.md
  - "The Evidence":
    - Cost Analysis: cost-evidence.md
    - Output Quality: quality-evidence.md
    - "Roo Code + Kong": roo-kong-failures.md
    - Microsoft Foundry: foundry-analysis.md
    - Roadmap: roadmap.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.critic
  - pymdownx.mark

extra_css:
  - stylesheets/presentation.css

extra_javascript:
  - javascripts/site-name-link.js

extra:
  generator: false
