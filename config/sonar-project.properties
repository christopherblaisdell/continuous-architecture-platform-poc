# SonarCloud Configuration for NovaTrek Services
# Plugin added to all services: id("org.sonarqube") version "5.1.0.4882"
# CI passes -Dsonar.projectKey and -Dsonar.organization per service.

sonar.host.url=https://sonarcloud.io
sonar.organization=christopherblaisdell

# Coverage thresholds (mirrors config/test-standards.yaml)
sonar.coverage.exclusions=**/config/**,**/model/**,**/*Application.java
sonar.cpd.exclusions=**/model/**

# Quality gate conditions
# These are configured in SonarCloud UI but documented here for reference:
# - Line coverage >= 80% (BLOCKER)
# - Branch coverage >= 70% (BLOCKER)
# - Duplicated lines < 3% (MAJOR)
# - Maintainability rating >= A (MAJOR)
# - Security rating >= A (BLOCKER)

# JaCoCo report path
sonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml

# PITest mutation report
sonar.pitest.reportPaths=build/reports/pitest/mutations.xml
