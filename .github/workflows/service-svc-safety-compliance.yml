name: "svc-safety-compliance"

on:
  push:
    branches: [main]
    paths:
      - 'services/svc-safety-compliance/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-safety-compliance.yml'
  pull_request:
    paths:
      - 'services/svc-safety-compliance/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-safety-compliance.yml'

jobs:
  ci:
    uses: ./.github/workflows/service-ci.yml
    with:
      service-name: svc-safety-compliance
    secrets: inherit
