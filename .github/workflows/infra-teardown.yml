# ===========================================================================
# Infrastructure Teardown — NovaTrek Adventures Platform
# ===========================================================================
# Manual-trigger-only workflow to destroy non-production environments.
# Requires typing "DESTROY" as confirmation to prevent accidents.
# ===========================================================================

name: "Infrastructure Teardown"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to tear down'
        required: true
        type: choice
        options: [dev, ephemeral-all]
      confirmation:
        description: 'Type DESTROY to confirm'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  teardown:
    name: "Teardown Environment"
    if: inputs.confirmation == 'DESTROY'
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Teardown dev environment
        if: inputs.environment == 'dev'
        run: |
          echo "Destroying rg-novatrek-dev..."
          az group delete --name rg-novatrek-dev --yes --no-wait
          echo "Deletion initiated (async)."

      - name: Teardown all ephemeral environments
        if: inputs.environment == 'ephemeral-all'
        run: |
          echo "Finding ephemeral resource groups..."
          for RG in $(az group list --query "[?tags.ephemeral=='true'].name" -o tsv); do
            echo "Deleting ${RG}..."
            az group delete --name "${RG}" --yes --no-wait
          done
          echo "All ephemeral environments queued for deletion."
