# ===========================================================================
# Ephemeral Environment — PR-based Preview Environments
# ===========================================================================
# Creates a full environment on PR open, destroys it on PR close.
# Posts a comment with live URLs for review.
# ===========================================================================

name: "Ephemeral Environment"

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'services/**'
      - 'infra/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  PR_NUMBER: ${{ github.event.pull_request.number }}

jobs:
  # ---------------------------------------------------------------------------
  # Deploy ephemeral environment
  # ---------------------------------------------------------------------------
  deploy:
    name: "Deploy PR-${{ github.event.pull_request.number }}"
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create ephemeral resource group
        run: |
          az group create \
            --name "rg-novatrek-pr-${{ env.PR_NUMBER }}" \
            --location eastus2 \
            --tags "pr=${{ env.PR_NUMBER }}" "ephemeral=true" "project=novatrek-adventures"

      - name: Deploy minimal infrastructure
        run: |
          # Generate a random password for ephemeral PostgreSQL
          EPHEMERAL_PW=$(openssl rand -base64 24 | tr -d '/+=')

          az deployment group create \
            --resource-group "rg-novatrek-pr-${{ env.PR_NUMBER }}" \
            --template-file infra/platform.bicep \
            --parameters infra/parameters/ephemeral.platform.bicepparam \
            --parameters environment=ephemeral \
            --parameters postgresAdminPassword="${EPHEMERAL_PW}" \
            --name "deploy-pr-${{ env.PR_NUMBER }}-$(date +%Y%m%d-%H%M%S)"

      - name: Post PR comment with URLs
        uses: actions/github-script@v7
        with:
          script: |
            const prNum = context.payload.pull_request.number;
            const body = `## Ephemeral Environment Deployed

            | Resource | Endpoint |
            |----------|----------|
            | ACA Environment | \`cae-novatrek-ephemeral\` |
            | Resource Group | \`rg-novatrek-pr-${prNum}\` |

            This environment will be **automatically destroyed** when this PR is closed or merged.

            **Cost**: ~$0.50-2.00 for the lifetime of this PR.`;

            github.rest.issues.createComment({
              ...context.repo,
              issue_number: prNum,
              body
            });

  # ---------------------------------------------------------------------------
  # Teardown ephemeral environment
  # ---------------------------------------------------------------------------
  teardown:
    name: "Teardown PR-${{ github.event.pull_request.number }}"
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Destroy ephemeral environment
        run: |
          echo "Destroying rg-novatrek-pr-${{ env.PR_NUMBER }}..."
          az group delete \
            --name "rg-novatrek-pr-${{ env.PR_NUMBER }}" \
            --yes --no-wait
          echo "Deletion initiated."
