name: "svc-check-in"

on:
  push:
    branches: [main]
    paths:
      - 'services/svc-check-in/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-check-in.yml'
      - 'config/adventure-classification.yaml'
  pull_request:
    paths:
      - 'services/svc-check-in/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-check-in.yml'
      - 'config/adventure-classification.yaml'

jobs:
  ci:
    uses: ./.github/workflows/service-ci.yml
    with:
      service-name: svc-check-in
    secrets: inherit
