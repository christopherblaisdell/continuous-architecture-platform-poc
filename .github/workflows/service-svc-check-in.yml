# ===========================================================================
# svc-check-in — CI/CD Orchestrator
# ===========================================================================
# Builds, tests, scans, and deploys the check-in microservice.
# Triggers on changes to the service code or adventure classification config.
# ===========================================================================

name: "svc-check-in"

on:
  push:
    branches: [main]
    paths:
      - 'services/svc-check-in/**'
      - 'config/adventure-classification.yaml'
  pull_request:
    paths:
      - 'services/svc-check-in/**'

permissions:
  contents: read
  id-token: write

jobs:
  ci:
    uses: ./.github/workflows/service-ci.yml
    with:
      service-name: svc-check-in
    secrets: inherit

  migrate-dev:
    needs: ci
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/db-migrate.yml
    with:
      service-name: svc-check-in
      environment: dev
      schema-name: checkin
    secrets: inherit

  cd-dev:
    needs: [ci, migrate-dev]
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/service-cd.yml
    with:
      service-name: svc-check-in
      environment: dev
      image-tag: ${{ needs.ci.outputs.image-tag }}
    secrets: inherit

  migrate-prod:
    needs: cd-dev
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/db-migrate.yml
    with:
      service-name: svc-check-in
      environment: prod
      schema-name: checkin
    secrets: inherit

  cd-prod:
    needs: [ci, cd-dev, migrate-prod]
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/service-cd.yml
    with:
      service-name: svc-check-in
      environment: prod
      image-tag: ${{ needs.ci.outputs.image-tag }}
    secrets: inherit
