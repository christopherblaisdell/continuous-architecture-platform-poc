name: "svc-emergency-response"

on:
  push:
    branches: [main]
    paths:
      - 'services/svc-emergency-response/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-emergency-response.yml'
  pull_request:
    paths:
      - 'services/svc-emergency-response/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-emergency-response.yml'

jobs:
  ci:
    uses: ./.github/workflows/service-ci.yml
    with:
      service-name: svc-emergency-response
    secrets: inherit
