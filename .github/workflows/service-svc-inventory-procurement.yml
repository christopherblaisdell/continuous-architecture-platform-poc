name: "svc-inventory-procurement"

on:
  push:
    branches: [main]
    paths:
      - 'services/svc-inventory-procurement/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-inventory-procurement.yml'
  pull_request:
    paths:
      - 'services/svc-inventory-procurement/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-inventory-procurement.yml'

jobs:
  ci:
    uses: ./.github/workflows/service-ci.yml
    with:
      service-name: svc-inventory-procurement
    secrets: inherit
