# ===========================================================================
# svc-guest-profiles — CI/CD Orchestrator
# ===========================================================================
# Builds, tests, scans, and deploys the guest profiles microservice.
# ===========================================================================

name: "svc-guest-profiles"

on:
  push:
    branches: [main]
    paths:
      - 'services/svc-guest-profiles/**'
  pull_request:
    paths:
      - 'services/svc-guest-profiles/**'

jobs:
  ci:
    uses: ./.github/workflows/service-ci.yml
    with:
      service-name: svc-guest-profiles
    secrets: inherit

  migrate-dev:
    needs: ci
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/db-migrate.yml
    with:
      service-name: svc-guest-profiles
      environment: dev
    secrets: inherit

  cd-dev:
    needs: [ci, migrate-dev]
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/service-cd.yml
    with:
      service-name: svc-guest-profiles
      environment: dev
      image-tag: ${{ needs.ci.outputs.image-tag }}
    secrets: inherit

  migrate-prod:
    needs: cd-dev
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/db-migrate.yml
    with:
      service-name: svc-guest-profiles
      environment: prod
    secrets: inherit

  cd-prod:
    needs: [ci, cd-dev, migrate-prod]
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/service-cd.yml
    with:
      service-name: svc-guest-profiles
      environment: prod
      image-tag: ${{ needs.ci.outputs.image-tag }}
    secrets: inherit
