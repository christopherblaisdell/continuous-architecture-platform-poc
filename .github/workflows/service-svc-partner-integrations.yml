name: "svc-partner-integrations"

on:
  push:
    branches: [main]
    paths:
      - 'services/svc-partner-integrations/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-partner-integrations.yml'
  pull_request:
    paths:
      - 'services/svc-partner-integrations/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-partner-integrations.yml'

jobs:
  ci:
    uses: ./.github/workflows/service-ci.yml
    with:
      service-name: svc-partner-integrations
    secrets: inherit
