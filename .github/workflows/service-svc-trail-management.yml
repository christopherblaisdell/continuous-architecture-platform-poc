name: "svc-trail-management"

on:
  push:
    branches: [main]
    paths:
      - 'services/svc-trail-management/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-trail-management.yml'
  pull_request:
    paths:
      - 'services/svc-trail-management/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-trail-management.yml'

jobs:
  ci:
    uses: ./.github/workflows/service-ci.yml
    with:
      service-name: svc-trail-management
    secrets: inherit
