name: "svc-reservations"

on:
  push:
    branches: [main]
    paths:
      - 'services/svc-reservations/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-reservations.yml'
  pull_request:
    paths:
      - 'services/svc-reservations/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-reservations.yml'

jobs:
  ci:
    uses: ./.github/workflows/service-ci.yml
    with:
      service-name: svc-reservations
    secrets: inherit
