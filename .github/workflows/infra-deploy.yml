# ===========================================================================
# Infrastructure Deploy — NovaTrek Adventures Platform
# ===========================================================================
# Deploys platform infrastructure (ACA, PostgreSQL, Service Bus, etc.)
# using Bicep modules. Runs what-if on PRs, deploys on merge to main.
# ===========================================================================

name: "Infrastructure Deploy"

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '!infra/deploy.sh'
      - '!infra/README.md'
  pull_request:
    paths:
      - 'infra/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, prod]

permissions:
  id-token: write
  contents: read

env:
  TEMPLATE_FILE: infra/platform.bicep

jobs:
  # ---------------------------------------------------------------------------
  # Validate — runs on every push and PR
  # ---------------------------------------------------------------------------
  validate:
    name: "Validate Bicep"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Lint Bicep
        run: az bicep build --file ${{ env.TEMPLATE_FILE }} --stdout > /dev/null

      - name: What-If Preview
        run: |
          ENV="${{ inputs.environment || 'dev' }}"
          az deployment group what-if \
            --resource-group "rg-novatrek-${ENV}" \
            --template-file "${{ env.TEMPLATE_FILE }}" \
            --parameters "infra/parameters/${ENV}.platform.bicepparam" \
            --parameters postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}"

  # ---------------------------------------------------------------------------
  # Deploy — only on merge to main or manual dispatch
  # ---------------------------------------------------------------------------
  deploy:
    name: "Deploy Infrastructure"
    needs: validate
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Resource Group
        run: |
          ENV="${{ inputs.environment || 'dev' }}"
          az group create \
            --name "rg-novatrek-${ENV}" \
            --location eastus2 \
            --tags project=novatrek-adventures environment="${ENV}" managedBy=bicep

      - name: Deploy Infrastructure
        run: |
          ENV="${{ inputs.environment || 'dev' }}"
          az deployment group create \
            --resource-group "rg-novatrek-${ENV}" \
            --template-file "${{ env.TEMPLATE_FILE }}" \
            --parameters "infra/parameters/${ENV}.platform.bicepparam" \
            --parameters postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
            --name "deploy-$(date +%Y%m%d-%H%M%S)"

      - name: Show Deployment Outputs
        run: |
          ENV="${{ inputs.environment || 'dev' }}"
          az containerapp env show \
            --name "cae-novatrek-${ENV}" \
            --resource-group "rg-novatrek-${ENV}" \
            --query "{defaultDomain: properties.defaultDomain, provisioningState: properties.provisioningState}" \
            --output table
