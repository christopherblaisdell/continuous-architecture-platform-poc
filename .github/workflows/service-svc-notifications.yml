name: "svc-notifications"

on:
  push:
    branches: [main]
    paths:
      - 'services/svc-notifications/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-notifications.yml'
  pull_request:
    paths:
      - 'services/svc-notifications/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-notifications.yml'

jobs:
  ci:
    uses: ./.github/workflows/service-ci.yml
    with:
      service-name: svc-notifications
    secrets: inherit
