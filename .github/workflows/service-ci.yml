# ===========================================================================
# Service CI — Reusable Build, Test, and Scan Workflow
# ===========================================================================
# Called by each per-service workflow. Builds Java service, runs unit tests,
# verifies coverage thresholds, runs SonarCloud analysis, and scans deps.
# ===========================================================================

name: "Service CI (Reusable)"

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
        description: 'Service name (e.g., svc-check-in)'
      java-version:
        required: false
        type: string
        default: '21'
      working-directory:
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  build:
    name: "Build ${{ inputs.service-name }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java-version }}
          cache: 'gradle'

      - name: Build and test
        working-directory: ${{ inputs.working-directory || format('services/{0}', inputs.service-name) }}
        run: ./gradlew build test

      - name: Verify coverage thresholds (JaCoCo)
        working-directory: ${{ inputs.working-directory || format('services/{0}', inputs.service-name) }}
        run: ./gradlew jacocoTestCoverageVerification

      - name: Run contract tests (Spring Cloud Contract)
        working-directory: ${{ inputs.working-directory || format('services/{0}', inputs.service-name) }}
        run: ./gradlew contractTest
        continue-on-error: true

      - name: Mutation testing report (PITest — advisory)
        working-directory: ${{ inputs.working-directory || format('services/{0}', inputs.service-name) }}
        run: ./gradlew pitest
        continue-on-error: true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ inputs.service-name }}
          path: |
            ${{ inputs.working-directory || format('services/{0}', inputs.service-name) }}/build/reports/tests/
            ${{ inputs.working-directory || format('services/{0}', inputs.service-name) }}/build/reports/jacoco/
            ${{ inputs.working-directory || format('services/{0}', inputs.service-name) }}/build/reports/pitest/

      - name: SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: env.SONAR_TOKEN != ''
        working-directory: ${{ inputs.working-directory || format('services/{0}', inputs.service-name) }}
        run: ./gradlew sonar -Dsonar.projectKey=christopherblaisdell_continuous-architecture-platform-poc -Dsonar.organization=christopherblaisdell -Dsonar.host.url=https://sonarcloud.io
        continue-on-error: true

      - name: OWASP dependency check
        working-directory: ${{ inputs.working-directory || format('services/{0}', inputs.service-name) }}
        run: ./gradlew dependencyCheckAnalyze
        continue-on-error: true
