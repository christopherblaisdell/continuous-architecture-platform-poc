name: "svc-reviews"

on:
  push:
    branches: [main]
    paths:
      - 'services/svc-reviews/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-reviews.yml'
  pull_request:
    paths:
      - 'services/svc-reviews/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-reviews.yml'

jobs:
  ci:
    uses: ./.github/workflows/service-ci.yml
    with:
      service-name: svc-reviews
    secrets: inherit
