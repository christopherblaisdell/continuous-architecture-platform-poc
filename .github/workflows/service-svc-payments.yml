name: "svc-payments"

on:
  push:
    branches: [main]
    paths:
      - 'services/svc-payments/**'
  pull_request:
    paths:
      - 'services/svc-payments/**'

jobs:
  ci:
    uses: ./.github/workflows/service-ci.yml
    with:
      service-name: svc-payments
    secrets: inherit

  cd-dev:
    needs: ci
    if: github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    uses: ./.github/workflows/service-cd.yml
    with:
      service-name: svc-payments
      environment: dev
    secrets: inherit

  migrate-dev:
    needs: cd-dev
    if: github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    uses: ./.github/workflows/db-migrate.yml
    with:
      service-name: svc-payments
      environment: dev
    secrets: inherit

  cd-prod:
    needs: [ci, cd-dev, migrate-dev]
    if: github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    uses: ./.github/workflows/service-cd.yml
    with:
      service-name: svc-payments
      environment: prod
    secrets: inherit

  migrate-prod:
    needs: cd-prod
    if: github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    uses: ./.github/workflows/db-migrate.yml
    with:
      service-name: svc-payments
      environment: prod
    secrets: inherit
