name: "svc-payments"

on:
  push:
    branches: [main]
    paths:
      - 'services/svc-payments/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-payments.yml'
  pull_request:
    paths:
      - 'services/svc-payments/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-payments.yml'

jobs:
  ci:
    uses: ./.github/workflows/service-ci.yml
    with:
      service-name: svc-payments
    secrets: inherit
