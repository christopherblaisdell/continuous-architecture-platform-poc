name: "svc-analytics"

on:
  push:
    branches: [main]
    paths:
      - 'services/svc-analytics/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-analytics.yml'
  pull_request:
    paths:
      - 'services/svc-analytics/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-analytics.yml'

jobs:
  ci:
    uses: ./.github/workflows/service-ci.yml
    with:
      service-name: svc-analytics
    secrets: inherit
