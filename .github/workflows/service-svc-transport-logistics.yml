name: "svc-transport-logistics"

on:
  push:
    branches: [main]
    paths:
      - 'services/svc-transport-logistics/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-transport-logistics.yml'
  pull_request:
    paths:
      - 'services/svc-transport-logistics/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-transport-logistics.yml'

jobs:
  ci:
    uses: ./.github/workflows/service-ci.yml
    with:
      service-name: svc-transport-logistics
    secrets: inherit
