name: "svc-loyalty-rewards"

on:
  push:
    branches: [main]
    paths:
      - 'services/svc-loyalty-rewards/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-loyalty-rewards.yml'
  pull_request:
    paths:
      - 'services/svc-loyalty-rewards/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-loyalty-rewards.yml'

jobs:
  ci:
    uses: ./.github/workflows/service-ci.yml
    with:
      service-name: svc-loyalty-rewards
    secrets: inherit
