name: "svc-location-services"

on:
  push:
    branches: [main]
    paths:
      - 'services/svc-location-services/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-location-services.yml'
  pull_request:
    paths:
      - 'services/svc-location-services/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-location-services.yml'

jobs:
  ci:
    uses: ./.github/workflows/service-ci.yml
    with:
      service-name: svc-location-services
    secrets: inherit
