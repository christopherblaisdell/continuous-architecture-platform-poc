# ===========================================================================
# Validate Solution Design PRs
# ===========================================================================
# Runs on PRs that touch architecture/solutions/ or architecture/metadata/
# Validates YAML syntax, solution folder structure, and portal build.
# ===========================================================================

name: Validate Solution Design

on:
  pull_request:
    branches: [main]
    paths:
      - 'architecture/solutions/**'
      - 'architecture/metadata/**'
      - 'architecture/calm/**'
      - 'decisions/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Solution
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install dependencies
        run: pip install -r requirements-docs.txt

      - name: Validate YAML metadata
        run: |
          python3 -c "
          import yaml, sys, glob
          errors = 0
          for f in glob.glob('architecture/metadata/*.yaml'):
              try:
                  with open(f) as fh:
                      yaml.safe_load(fh)
                  print(f'PASS: {f}')
              except yaml.YAMLError as e:
                  print(f'FAIL: {f} — {e}')
                  errors += 1
          sys.exit(errors)
          "

      - name: Validate solution folder structure
        run: |
          python3 -c "
          import os, sys
          errors = 0
          solutions_dir = 'architecture/solutions'
          for entry in sorted(os.listdir(solutions_dir)):
              sol_dir = os.path.join(solutions_dir, entry)
              if not os.path.isdir(sol_dir) or not entry.startswith('_NTK-'):
                  continue
              # Check for master document
              has_master = any(f.endswith('-solution-design.md') for f in os.listdir(sol_dir))
              if not has_master:
                  print(f'FAIL: {entry} — missing master document (*-solution-design.md)')
                  errors += 1
              # Check for capabilities folder
              caps_path = os.path.join(sol_dir, '3.solution', 'c.capabilities', 'capabilities.md')
              if not os.path.exists(caps_path):
                  print(f'FAIL: {entry} — missing 3.solution/c.capabilities/capabilities.md')
                  errors += 1
              else:
                  print(f'PASS: {entry}')
          sys.exit(errors)
          "

      - name: Verify data isolation
        run: bash portal/scripts/utilities/audit-data-isolation.sh

      - name: Validate CALM topology
        run: python3 architecture/scripts/validate-calm.py

      - name: Install PlantUML
        run: sudo apt-get update && sudo apt-get install -y plantuml

      - name: Build portal (validates generators and cross-links)
        run: bash portal/scripts/generate-all.sh

  # -------------------------------------------------------------------
  # Update ticket status based on branch/PR state
  # -------------------------------------------------------------------
  sync-branch-status:
    runs-on: ubuntu-latest
    name: Sync Branch Status
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Sync ticket status from branches
        env:
          VIKUNJA_URL: ${{ vars.VIKUNJA_URL }}
          VIKUNJA_TOKEN: ${{ secrets.VIKUNJA_TOKEN }}
        run: python3 architecture/scripts/sync-branch-status.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet architecture/metadata/tickets.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit status updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add architecture/metadata/tickets.yaml
          git commit -m "chore: sync ticket status from branch state [skip ci]"
          git push
