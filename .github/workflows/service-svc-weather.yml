name: "svc-weather"

on:
  push:
    branches: [main]
    paths:
      - 'services/svc-weather/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-weather.yml'
  pull_request:
    paths:
      - 'services/svc-weather/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-weather.yml'

jobs:
  ci:
    uses: ./.github/workflows/service-ci.yml
    with:
      service-name: svc-weather
    secrets: inherit
