name: "svc-scheduling-orchestrator"

on:
  push:
    branches: [main]
    paths:
      - 'services/svc-scheduling-orchestrator/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-scheduling-orchestrator.yml'
  pull_request:
    paths:
      - 'services/svc-scheduling-orchestrator/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-scheduling-orchestrator.yml'

jobs:
  ci:
    uses: ./.github/workflows/service-ci.yml
    with:
      service-name: svc-scheduling-orchestrator
    secrets: inherit
