# ===========================================================================
# Documentation Quality Gates
# ===========================================================================
# Runs on PRs that touch Markdown content, configuration, or this workflow.
#
# Gates:
#   markdown-lint    — markdownlint-cli2 with project-level config
#   spell-check      — cspell with NovaTrek-specific word list
#   content-policy   — custom script: brand names, PII patterns, placeholders
# ===========================================================================

name: Documentation Quality

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.md'
      - '.markdownlint-cli2.jsonc'
      - 'cspell.json'
      - 'portal/scripts/utilities/content-policy-check.py'
      - '.github/workflows/docs-quality.yml'
  push:
    branches: [main]
    paths:
      - '.markdownlint-cli2.jsonc'
      - 'cspell.json'
      - 'portal/scripts/utilities/content-policy-check.py'
      - '.github/workflows/docs-quality.yml'

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Gate 1: Markdown lint
  # ---------------------------------------------------------------------------
  markdown-lint:
    runs-on: ubuntu-latest
    name: Markdown Lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2

      - name: Run markdownlint
        run: |
          markdownlint-cli2 \
            "decisions/**/*.md" \
            "architecture/solutions/**/*.md" \
            "portal/docs/**/*.md" \
            "README.md"

  # ---------------------------------------------------------------------------
  # Gate 2: Spell check
  # ---------------------------------------------------------------------------
  spell-check:
    runs-on: ubuntu-latest
    name: Spell Check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install cspell
        run: npm install -g cspell

      - name: Run cspell
        run: |
          cspell \
            "decisions/**/*.md" \
            "architecture/solutions/**/*.md" \
            "portal/docs/*.md" \
            "portal/docs/handbook/**/*.md" \
            "portal/docs/standards/solution-design/**/*.md" \
            "portal/docs/security/**/*.md" \
            "README.md"

  # ---------------------------------------------------------------------------
  # Gate 3: Content policy
  # ---------------------------------------------------------------------------
  content-policy:
    runs-on: ubuntu-latest
    name: Content Policy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run content policy check
        run: python3 portal/scripts/utilities/content-policy-check.py
