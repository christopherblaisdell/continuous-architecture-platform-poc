# ===========================================================================
# Snyk Security Scanning
# ===========================================================================
# Runs three Snyk scans on every PR and push to main:
#   1. Dependency scan — requirements-docs.txt (Python packages)
#   2. Code scan — portal/scripts/ (Python generator scripts)
#   3. IaC scan — staticwebapp.config.json, infra/*.bicep, .github/workflows/
#
# All three scans must pass before a PR can be merged.
# Requires SNYK_TOKEN secret to be configured in the repository.
#
# NOTE: snyk/actions sub-actions do not publish semver tags — they are
# referenced by commit SHA in production for supply chain security.
# The @master references below should be replaced with pinned SHAs once
# a stable integration baseline is established. See snyk/actions on GitHub
# for the current HEAD SHA to pin.
# ===========================================================================

name: Snyk Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  # -------------------------------------------------------------------------
  # Snyk Dependency Scan
  # Scans Python packages in requirements-docs.txt for known CVEs.
  # Even though these packages only run at build time, a compromised build
  # dependency could inject malicious content into the generated HTML.
  # -------------------------------------------------------------------------
  dependency-scan:
    runs-on: ubuntu-latest
    name: Snyk Dependency Scan
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Snyk dependency scan
        uses: snyk/actions/python-3.12@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=requirements-docs.txt

      - name: Upload Snyk dependency results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk.sarif
        continue-on-error: true

  # -------------------------------------------------------------------------
  # Snyk Code Analysis
  # Static analysis of Python generator scripts for security issues:
  #   - Path traversal (generators process file paths from YAML input)
  #   - Unsafe deserialization (generators parse YAML metadata)
  #   - Injection risks (generators produce HTML output)
  #   - Hardcoded secrets or credentials
  # -------------------------------------------------------------------------
  code-scan:
    runs-on: ubuntu-latest
    name: Snyk Code Analysis
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Snyk code analysis
        uses: snyk/actions/python-3.12@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --severity-threshold=high portal/scripts/

      - name: Upload Snyk code results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk.sarif
        continue-on-error: true

  # -------------------------------------------------------------------------
  # Snyk Infrastructure-as-Code Scan
  # Scans configuration files for security misconfigurations:
  #   - staticwebapp.config.json: overly permissive CSP, missing security headers
  #   - infra/*.bicep: Azure resource misconfigurations
  #   - .github/workflows/*.yml: overly broad permissions, unpinned action versions
  # -------------------------------------------------------------------------
  iac-scan:
    runs-on: ubuntu-latest
    name: Snyk IaC Scan
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Snyk IaC scan on staticwebapp.config.json
        uses: snyk/actions/iac@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
          file: portal/staticwebapp.config.json

      - name: Upload Snyk IaC results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk.sarif
        continue-on-error: true
