name: Confluence Drift Check

on:
  schedule:
    - cron: '0 6 * * 1-5'  # Weekdays 6 AM UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  drift-check:
    name: Check for manual edits on Confluence
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate Confluence staging
        run: python3 portal/scripts/confluence-prepare.py

      - name: Run drift check
        env:
          CONFLUENCE_BASE_URL: ${{ vars.CONFLUENCE_BASE_URL }}
          CONFLUENCE_USERNAME: ${{ secrets.CONFLUENCE_USERNAME }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          CONFLUENCE_SPACE: ${{ vars.CONFLUENCE_SPACE }}
        run: python3 portal/scripts/confluence-drift-check.py --staging-dir portal/confluence
