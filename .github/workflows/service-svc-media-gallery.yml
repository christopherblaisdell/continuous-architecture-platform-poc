# ===========================================================================
# svc-media-gallery — CI/CD Orchestrator
# ===========================================================================
# Builds, tests, scans, and deploys the media gallery microservice.
# ===========================================================================

name: "svc-media-gallery"

on:
  push:
    branches: [main]
    paths:
      - 'services/svc-media-gallery/**'
  pull_request:
    paths:
      - 'services/svc-media-gallery/**'

jobs:
  ci:
    uses: ./.github/workflows/service-ci.yml
    with:
      service-name: svc-media-gallery
    secrets: inherit

  migrate-dev:
    needs: ci
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/db-migrate.yml
    with:
      service-name: svc-media-gallery
      environment: dev
    secrets: inherit

  cd-dev:
    needs: [ci, migrate-dev]
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/service-cd.yml
    with:
      service-name: svc-media-gallery
      environment: dev
      image-tag: ${{ needs.ci.outputs.image-tag }}
    secrets: inherit

  migrate-prod:
    needs: cd-dev
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/db-migrate.yml
    with:
      service-name: svc-media-gallery
      environment: prod
    secrets: inherit

  cd-prod:
    needs: [ci, cd-dev, migrate-prod]
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/service-cd.yml
    with:
      service-name: svc-media-gallery
      environment: prod
      image-tag: ${{ needs.ci.outputs.image-tag }}
    secrets: inherit
