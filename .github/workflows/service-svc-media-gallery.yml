name: "svc-media-gallery"

on:
  push:
    branches: [main]
    paths:
      - 'services/svc-media-gallery/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-media-gallery.yml'
  pull_request:
    paths:
      - 'services/svc-media-gallery/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-media-gallery.yml'

jobs:
  ci:
    uses: ./.github/workflows/service-ci.yml
    with:
      service-name: svc-media-gallery
    secrets: inherit
