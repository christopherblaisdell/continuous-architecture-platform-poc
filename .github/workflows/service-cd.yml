# ===========================================================================
# Service CD — Reusable Build, Push, and Deploy Workflow
# ===========================================================================
# Builds Docker image, pushes to ACR, scans for vulnerabilities, and
# deploys to Azure Container Apps. Called by per-service orchestrator
# workflows after CI completes.
# ===========================================================================

name: "Service CD (Reusable)"

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
        description: 'Service name (e.g., svc-check-in)'
      environment:
        required: true
        type: string
        description: 'Target environment (dev, prod)'
      working-directory:
        required: false
        type: string
        default: ''

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: "Deploy ${{ inputs.service-name }} → ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push Docker image
        id: meta
        run: |
          TAG="${{ github.sha }}"
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.service-name }}:${TAG}"
          docker build -t "${IMAGE}" ${{ inputs.working-directory || format('services/{0}', inputs.service-name) }}
          docker push "${IMAGE}"
          echo "image-tag=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.image-tag }}
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          format: 'table'

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name "ca-${{ inputs.service-name }}" \
            --resource-group "rg-novatrek-${{ inputs.environment }}" \
            --image "${{ steps.meta.outputs.image-tag }}" \
            --set-env-vars "SPRING_PROFILES_ACTIVE=${{ inputs.environment }}"

      - name: Verify deployment health
        run: |
          FQDN=$(az containerapp show \
            --name "ca-${{ inputs.service-name }}" \
            --resource-group "rg-novatrek-${{ inputs.environment }}" \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          echo "Checking health at https://${FQDN}/actuator/health"

          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${FQDN}/actuator/health" || true)
            if [ "${STATUS}" = "200" ]; then
              echo "Service healthy after ${i} attempts"
              exit 0
            fi
            echo "Waiting for health check... (attempt ${i}/30)"
            sleep 10
          done
          echo "Health check failed after 5 minutes"
          exit 1
