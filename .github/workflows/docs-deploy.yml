# ===========================================================================
# Deploy Documentation to Azure Static Web Apps
# ===========================================================================
# Triggers:
#   - Push to main: builds and deploys to production
#   - Pull request to main: builds and deploys to staging preview
# ===========================================================================

name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - 'decisions/**'
      - 'research/**'
      - 'phases/**'
      - 'architecture/**'
      - 'portal/scripts/**'
      - 'portal/mkdocs.yml'
      - 'portal/staticwebapp.config.json'
      - 'presentation/**'
      - 'README.md'
      - 'staticwebapp.config.json'
      - '.github/workflows/docs-deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - 'decisions/**'
      - 'research/**'
      - 'phases/**'
      - 'architecture/**'
      - 'portal/scripts/**'
      - 'portal/mkdocs.yml'
      - 'portal/staticwebapp.config.json'
      - 'presentation/**'
      - 'README.md'
      - 'staticwebapp.config.json'

permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------------
  # Build MkDocs site
  # -------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    name: Build Documentation
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history required for git-revision-date plugin

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install dependencies
        run: pip install -r requirements-docs.txt

      - name: Install PlantUML
        run: sudo apt-get update && sudo apt-get install -y plantuml

      - name: Generate artifacts and build site
        run: bash portal/scripts/generate-all.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: portal/site/
          retention-days: 1

  # -------------------------------------------------------------------------
  # Security scanning (Snyk dependency, code, and IaC analysis)
  # -------------------------------------------------------------------------
  security-scan:
    runs-on: ubuntu-latest
    name: Security Scan (Snyk)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install dependencies
        run: pip install -r requirements-docs.txt

      - name: Snyk dependency scan
        uses: snyk/actions/python-3.12@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=requirements-docs.txt

      - name: Snyk code analysis
        uses: snyk/actions/python-3.12@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --severity-threshold=high portal/scripts/

      - name: Snyk IaC scan
        uses: snyk/actions/iac@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
          file: portal/staticwebapp.config.json

  # -------------------------------------------------------------------------
  # Deploy to Azure Static Web Apps
  # -------------------------------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Azure
    needs: [build, security-scan]
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    environment:
      name: ${{ github.event_name == 'push' && 'production' || 'staging' }}
      url: ${{ steps.deploy.outputs.static_web_app_url }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: site/

      - name: Deploy to Azure Static Web Apps
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: site
          skip_app_build: true
          # For PRs, Azure SWA automatically creates a staging environment

  # -------------------------------------------------------------------------
  # Close staging environment when PR is closed
  # -------------------------------------------------------------------------
  close-staging:
    runs-on: ubuntu-latest
    name: Close Staging Environment
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    steps:
      - name: Close staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close

  # -------------------------------------------------------------------------
  # Validate Confluence output (dry-run on PRs)
  # -------------------------------------------------------------------------
  validate-confluence:
    runs-on: ubuntu-latest
    name: Validate Confluence Output
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Prepare Confluence pages
        run: python3 portal/scripts/confluence-prepare.py

      - name: Install mark
        run: |
          curl -sL https://github.com/kovetskiy/mark/releases/latest/download/mark_linux_amd64 \
            -o /usr/local/bin/mark
          chmod +x /usr/local/bin/mark

      - name: Dry-run Confluence publish
        run: |
          mark \
            --base-url "${{ vars.CONFLUENCE_BASE_URL }}" \
            --username "${{ secrets.CONFLUENCE_USERNAME }}" \
            --password "${{ secrets.CONFLUENCE_API_TOKEN }}" \
            --files "portal/confluence/**/*.md" \
            --dry-run \
            --color

  # -------------------------------------------------------------------------
  # Publish to Confluence (on push to main)
  # -------------------------------------------------------------------------
  publish-confluence:
    runs-on: ubuntu-latest
    name: Publish to Confluence
    needs: [build, deploy]
    if: github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install pyyaml requests

      - name: Prepare Confluence pages
        run: python3 portal/scripts/confluence-prepare.py

      - name: Install mark
        run: |
          curl -sL https://github.com/kovetskiy/mark/releases/latest/download/mark_linux_amd64 \
            -o /usr/local/bin/mark
          chmod +x /usr/local/bin/mark

      - name: Publish to Confluence
        run: |
          mark \
            --base-url "${{ vars.CONFLUENCE_BASE_URL }}" \
            --username "${{ secrets.CONFLUENCE_USERNAME }}" \
            --password "${{ secrets.CONFLUENCE_API_TOKEN }}" \
            --files "portal/confluence/**/*.md" \
            --color \
            --ci

      - name: Lock published pages
        run: |
          python3 portal/scripts/confluence-lock-pages.py \
            --base-url "${{ vars.CONFLUENCE_BASE_URL }}" \
            --username "${{ secrets.CONFLUENCE_USERNAME }}" \
            --api-token "${{ secrets.CONFLUENCE_API_TOKEN }}" \
            --space "ARCH" \
            --label "auto-generated"

  # -------------------------------------------------------------------------
  # Build and deploy Presentation site
  # -------------------------------------------------------------------------
  deploy-presentation:
    runs-on: ubuntu-latest
    name: Deploy Presentation Site
    needs: build
    if: github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install dependencies
        run: pip install -r requirements-docs.txt

      - name: Build presentation site
        run: cd presentation && python3 -m mkdocs build

      - name: Deploy presentation to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_PRESENTATION_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: presentation/site
          skip_app_build: true
