name: "svc-wildlife-tracking"

on:
  push:
    branches: [main]
    paths:
      - 'services/svc-wildlife-tracking/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-wildlife-tracking.yml'
  pull_request:
    paths:
      - 'services/svc-wildlife-tracking/**'
      - '.github/workflows/service-ci.yml'
      - '.github/workflows/service-svc-wildlife-tracking.yml'

jobs:
  ci:
    uses: ./.github/workflows/service-ci.yml
    with:
      service-name: svc-wildlife-tracking
    secrets: inherit
