server:
  port: 8085

spring:
  application:
    name: svc-scheduling-orchestrator
  datasource:
    url: jdbc:postgresql://localhost:5432/novatrek_scheduling
    username: ${DB_USERNAME:novatrek}
    password: ${DB_PASSWORD:novatrek}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

novatrek:
  services:
    guide-management-url: ${GUIDE_MANAGEMENT_URL:http://localhost:8083}
    trip-catalog-url: ${TRIP_CATALOG_URL:http://localhost:8084}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.novatrek.scheduling: INFO
    org.springframework.web: WARN
