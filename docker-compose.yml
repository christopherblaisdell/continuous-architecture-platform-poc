# ===========================================================================
# NovaTrek Adventures — Local Development Environment
# ===========================================================================
# Runs PostgreSQL + Redis locally so developers can work without Azure.
# Usage:
#   docker compose up -d          # Start all services
#   docker compose down           # Stop all services
#   docker compose down -v        # Stop and remove volumes (reset data)
# ===========================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 15 with PostGIS (mirrors Azure Flexible Server)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgis/postgis:15-3.4
    container_name: novatrek-postgres
    environment:
      POSTGRES_USER: novatrekadmin
      POSTGRES_PASSWORD: localdev123
      POSTGRES_DB: novatrek_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./architecture/scripts/init-schemas.sql:/docker-entrypoint-initdb.d/01-init-schemas.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novatrekadmin -d novatrek_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis 7 (mirrors Azure Cache for Redis)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: novatrek-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
