<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operations Dashboard - Safety Incident Board — Excalidraw Editor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background: #fafafa; }
        .toolbar {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 16px; background: #fff; border-bottom: 1px solid #e0e0e0;
        }
        .toolbar h1 { font-size: 16px; color: #333; flex: 1; }
        .toolbar button {
            padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px;
            font-weight: 600; cursor: pointer;
        }
        .btn-save { background: #4CAF50; color: white; }
        .btn-save:hover { background: #388E3C; }
        .btn-back { background: #f5f5f5; color: #333; border: 1px solid #ddd !important; }
        .btn-back:hover { background: #eee; }
        .canvas-wrap {
            position: absolute; top: 49px; left: 0; right: 0; bottom: 0;
            overflow: hidden; background: #fff;
        }
        svg { display: block; width: 100%; height: 100%; }
        .pan-zoom {
            transform-origin: 0 0; cursor: grab;
        }
        .pan-zoom:active { cursor: grabbing; }
    </style>
</head>
<body>
    <div class="toolbar">
        <button class="btn-back" onclick="history.back()">&larr; Back</button>

 "width": 700, "height": 50, "backgroundColor": "#E8F5E9", "strokeColor": "#E0E0E0"}, {"type": "text", "id": "r3_id", "x": 275, "y": 335, "text": "INC-040", "fontSize": 12, "strokeColor": "#333333"}, {"type": "rectangle", "id": "r3_sev_badge", "x": 345, "y": 330, "width": 50, "height": 22, "backgroundColor": "#4CAF50", "strokeColor": "#4CAF50"}, {"type": "text", "id": "r3_sev", "x": 355, "y": 334, "text": "Low", "fontSize": 11, "strokeColor": "#FFFFFF"}, {"type": "text", "id": "r3_desc", "x": 445, "y": 328, "text": "Minor trail obstruction\nfallen branch, Sunset Loop", "fontSize": 11, "strokeColor": "#333333"}, {"type": "text", "id": "r3_guest", "x": 635, "y": 335, "text": "N/A", "fontSize": 12, "strokeColor": "#999999"}, {"type": "text", "id": "r3_guide", "x": 755, "y": 335, "text": "A. Patel", "fontSize": 12, "strokeColor": "#333333"}, {"type": "text", "id": "r3_status", "x": 885, "y": 335, "text": "Resolved", "fontSize": 12, "strokeColor": "#2E7D32"}, {"type": "rectangle", "id": "detail_panel", "x": 260, "y": 395, "width": 700, "height": 285, "backgroundColor": "#FFFFFF", "strokeColor": "#E0E0E0"}, {"type": "text", "id": "detail_title", "x": 275, "y": 405, "text": "Incident Detail - INC-042", "fontSize": 14, "strokeColor": "#333333"}, {"type": "text", "id": "detail_data", "x": 275, "y": 435, "text": "Reported:      2026-03-19 09:45 AM\nLocation:      Ridge Trail, marker 14\nSeverity:      Critical\nGuest:         James Williams (guest-4821)\nGuide:         Maria Chen\nDescription:   Guest twisted ankle on steep descent.\n               Assessed on-site, moderate swelling.\n               Medical transport requested.", "fontSize": 12, "strokeColor": "#555555"}, {"type": "rectangle", "id": "notify_btn", "x": 275, "y": 600, "width": 160, "height": 35, "backgroundColor": "#FF9800", "strokeColor": "#FF9800"}, {"type": "text", "id": "notify_btn_text", "x": 300, "y": 608, "text": "Send Alert", "fontSize": 13, "strokeColor": "#FFFFFF"}, {"type": "rectangle", "id": "resolve_btn", "x": 460, "y": 600, "width": 160, "height": 35, "backgroundColor": "#4CAF50", "strokeColor": "#4CAF50"}, {"type": "text", "id": "resolve_btn_text", "x": 490, "y": 608, "text": "Resolve", "fontSize": 13, "strokeColor": "#FFFFFF"}, {"type": "rectangle", "id": "report_btn", "x": 645, "y": 600, "width": 180, "height": 35, "backgroundColor": "#1565C0", "strokeColor": "#1565C0"}, {"type": "text", "id": "report_btn_text", "x": 660, "y": 608, "text": "Regulatory Report", "fontSize": 13, "strokeColor": "#FFFFFF"}], "appState": {"name": "Operations Dashboard - Safety Incident Board", "currentItemBackgroundColor": "#ffffff", "currentItemOpacity": 100, "fileTitle": "safety-incident-board", "gridMode": false}};
        const elements = data.elements || [];

        // Bounding box
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        elements.forEach(e => {
            const x = e.x || 0, y = e.y || 0, w = e.width || 0, h = e.height || 0;
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x + w > maxX) maxX = x + w;
            if (y + h > maxY) maxY = y + h;
        });
        if (!isFinite(minX)) { minX = 0; minY = 0; maxX = 800; maxY = 600; }
        const pad = 40;
        const vw = maxX - minX + pad * 2, vh = maxY - minY + pad * 2;

        function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

        let svgParts = ['<svg xmlns="http://www.w3.org/2000/svg" viewBox="' + (minX-pad) + ' ' + (minY-pad) + ' ' + vw + ' ' + vh + '">'];
        svgParts.push('<rect x="'+(minX-pad)+'" y="'+(minY-pad)+'" width="'+vw+'" height="'+vh+'" fill="#fafafa"/>');

        elements.forEach(e => {
            const t = e.type, x = e.x||0, y = e.y||0, w = e.width||100, h = e.height||50;
            const sc = e.strokeColor||"#000", bg = e.backgroundColor||"#fff";
            if (t === "rectangle") {
                svgParts.push('<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+bg+'" stroke="'+sc+'" stroke-width="2" rx="4"/>');
            } else if (t === "ellipse") {
                svgParts.push('<ellipse cx="'+(x+w/2)+'" cy="'+(y+h/2)+'" rx="'+(w/2)+'" ry="'+(h/2)+'" fill="'+bg+'" stroke="'+sc+'" stroke-width="2"/>');
            } else if (t === "text") {
                const fs = e.fontSize||16;
                const lines = (e.text||"").split("\n");
                lines.forEach((line, i) => {
                    svgParts.push('<text x="'+x+'" y="'+(y+fs+i*(fs*1.2))+'" font-size="'+fs+'" fill="'+sc+'" font-family="sans-serif">'+esc(line)+'</text>');
                });
            } else if (t === "line") {
                const pts = e.points || [[0,0],[w,h]];
                if (pts.length >= 2) {
                    svgParts.push('<line x1="'+(x+pts[0][0])+'" y1="'+(y+pts[0][1])+'" x2="'+(x+pts[pts.length-1][0])+'" y2="'+(y+pts[pts.length-1][1])+'" stroke="'+sc+'" stroke-width="2"/>');
                }
            }
        });
        svgParts.push('</svg>');

        const pz = document.getElementById("panZoom");
        pz.innerHTML = svgParts.join("");

        // Pan & zoom
        let scale = 1, tx = 0, ty = 0, dragging = false, lastX, lastY;
        function applyTransform() { pz.style.transform = "translate("+tx+"px,"+ty+"px) scale("+scale+")"; }

        const wrap = document.getElementById("canvasWrap");
        wrap.addEventListener("wheel", e => {
            e.preventDefault();
            const r = wrap.getBoundingClientRect();
            const mx = e.clientX - r.left, my = e.clientY - r.top;
            const oldScale = scale;
            scale *= e.deltaY < 0 ? 1.1 : 0.9;
            scale = Math.max(0.1, Math.min(10, scale));
            tx = mx - (mx - tx) * scale / oldScale;
            ty = my - (my - ty) * scale / oldScale;
            applyTransform();
        }, { passive: false });

        wrap.addEventListener("mousedown", e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
        window.addEventListener("mousemove", e => {
            if (!dragging) return;
            tx += e.clientX - lastX; ty += e.clientY - lastY;
            lastX = e.clientX; lastY = e.clientY;
            applyTransform();
        });
        window.addEventListener("mouseup", () => { dragging = false; });

        // Save button — downloads original .excalidraw JSON
        document.getElementById("saveBtn").addEventListener("click", () => {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "safety-incident-board.excalidraw";
            a.click();
            URL.revokeObjectURL(a.href);
        });
    </script>
</body>
