<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transport Dispatch — Excalidraw Editor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background: #fafafa; }
        .toolbar {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 16px; background: #fff; border-bottom: 1px solid #e0e0e0;
        }
        .toolbar h1 { font-size: 16px; color: #333; flex: 1; }
        .toolbar button {
            padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px;
            font-weight: 600; cursor: pointer;
        }
        .btn-save { background: #4CAF50; color: white; }
        .btn-save:hover { background: #388E3C; }
        .btn-back { background: #f5f5f5; color: #333; border: 1px solid #ddd !important; }
        .btn-back:hover { background: #eee; }
        .canvas-wrap {
            position: absolute; top: 49px; left: 0; right: 0; bottom: 0;
            overflow: hidden; background: #fff;
        }
        svg { display: block; width: 100%; height: 100%; }
        .pan-zoom {
            transform-origin: 0 0; cursor: grab;
        }
        .pan-zoom:active { cursor: grabbing; }
    </style>
</head>
<body>
    <div class="toolbar">
        <button class="btn-back" onclick="history.back()">&larr; Back</button>
        <h1>Transport Dispatch</h1>
        <button class="btn-save" id="saveBtn">&#x2B07; Save .excalidraw</button>
    </div>
    <div class="canvas-wrap" id="canvasWrap">
        <div class="pan-zoom" id="panZoom"></div>
    </div>
    <script>
        // Render Excalidraw elements as interactive SVG with zoom/pan
        const data = {"type": "excalidraw", "version": 2, "source": "https://marketplace.visualstudio.com/items?itemName=pomdtr.excalidraw-editor", "elements": [{"type": "rectangle", "id": "sidebar", "x": 0, "y": 0, "width": 240, "height": 700, "backgroundColor": "#2C3E50", "strokeColor": "#2C3E50", "version": 2, "versionNonce": 700425307, "index": "a0", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773952080259, "link": null, "locked": false}, {"type": "rectangle", "id": "main_header", "x": 240, "y": 0, "width": 760, "height": 60, "backgroundColor": "#FFFFFF", "strokeColor": "#E0E0E0", "version": 2, "versionNonce": 733552347, "index": "a8", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773952080259, "link": null, "locked": false}, {"type": "rectangle", "id": "new_request_btn", "x": 830, "y": 12, "width": 150, "height": 35, "backgroundColor": "#1565C0", "strokeColor": "#1565C0", "version": 2, "versionNonce": 579242875, "index": "aA", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773952080259, "link": null, "locked": false}, {"type": "rectangle", "id": "map_area", "x": 260, "y": 80, "width": 480, "height": 300, "backgroundColor": "#E8F5E9", "strokeColor": "#4CAF50", "version": 2, "versionNonce": 37577755, "index": "aC", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773952080259, "link": null, "locked": false}, {"type": "rectangle", "id": "vehicle_panel", "x": 760, "y": 80, "width": 240, "height": 300, "backgroundColor": "#FFFFFF", "strokeColor": "#E0E0E0", "version": 2, "versionNonce": 808457333, "index": "aF", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773952080259, "link": null, "locked": false}, {"type": "rectangle", "id": "v1_card", "x": 770, "y": 120, "width": 215, "height": 65, "backgroundColor": "#E8F5E9", "strokeColor": "#4CAF50", "version": 2, "versionNonce": 1384103381, "index": "aH", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773952080259, "link": null, "locked": false}, {"type": "rectangle", "id": "v2_card", "x": 770, "y": 195, "width": 215, "height": 65, "backgroundColor": "#FFF3E0", "strokeColor": "#FF9800", "version": 2, "versionNonce": 1406352181, "index": "aJ", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773952080259, "link": null, "locked": false}, {"type": "rectangle", "id": "v3_card", "x": 770, "y": 270, "width": 215, "height": 65, "backgroundColor": "#E3F2FD", "strokeColor": "#2196F3", "version": 2, "versionNonce": 1284508821, "index": "aL", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773952080259, "link": null, "locked": false}, {"type": "rectangle", "id": "requests_hdr", "x": 260, "y": 400, "width": 700, "height": 35, "backgroundColor": "#F5F5F5", "strokeColor": "#E0E0E0", "version": 2, "versionNonce": 745255413, "index": "aN", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773952080259, "link": null, "locked": false}, {"type": "rectangle", "id": "req_row_1", "x": 260, "y": 435, "width": 700, "height": 40, "backgroundColor": "#FFFFFF", "strokeColor": "#E0E0E0", "version": 2, "versionNonce": 1893694907, "index": "aU", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773952080259, "link": null, "locked": false}, {"type": "rectangle", "id": "req_row_2", "x": 260, "y": 475, "width": 700, "height": 40, "backgroundColor": "#FFF3E0", "strokeColor": "#E0E0E0", "version": 2, "versionNonce": 234514325, "index": "ab", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773952080259, "link": null, "locked": false}, {"type": "rectangle", "id": "req_row_3", "x": 260, "y": 515, "width": 700, "height": 40, "backgroundColor": "#FFFFFF", "strokeColor": "#E0E0E0", "version": 2, "versionNonce": 442781211, "index": "ai", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773952080259, "link": null, "locked": false}, {"type": "rectangle", "id": "route_detail", "x": 260, "y": 580, "width": 700, "height": 100, "backgroundColor": "#FFFFFF", "strokeColor": "#E0E0E0", "version": 2, "versionNonce": 517714229, "index": "ap", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773952080259, "link": null, "locked": false}, {"type": "rectangle", "id": "dispatch_btn", "x": 275, "y": 645, "width": 140, "height": 30, "backgroundColor": "#4CAF50", "strokeColor": "#4CAF50", "version": 2, "versionNonce": 1581849915, "index": "as", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773952080259, "link": null, "locked": false}], "appState": {"gridSize": 20, "gridStep": 5, "gridModeEnabled": false, "viewBackgroundColor": "#ffffff"}, "files": {}};
        const elements = data.elements || [];

        // Bounding box
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        elements.forEach(e => {
            const x = e.x || 0, y = e.y || 0, w = e.width || 0, h = e.height || 0;
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x + w > maxX) maxX = x + w;
            if (y + h > maxY) maxY = y + h;
        });
        if (!isFinite(minX)) { minX = 0; minY = 0; maxX = 800; maxY = 600; }
        const pad = 40;
        const vw = maxX - minX + pad * 2, vh = maxY - minY + pad * 2;

        function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

        let svgParts = ['<svg xmlns="http://www.w3.org/2000/svg" viewBox="' + (minX-pad) + ' ' + (minY-pad) + ' ' + vw + ' ' + vh + '">'];
        svgParts.push('<rect x="'+(minX-pad)+'" y="'+(minY-pad)+'" width="'+vw+'" height="'+vh+'" fill="#fafafa"/>');

        elements.forEach(e => {
            const t = e.type, x = e.x||0, y = e.y||0, w = e.width||100, h = e.height||50;
            const sc = e.strokeColor||"#000", bg = e.backgroundColor||"#fff";
            if (t === "rectangle") {
                svgParts.push('<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+bg+'" stroke="'+sc+'" stroke-width="2" rx="4"/>');
            } else if (t === "ellipse") {
                svgParts.push('<ellipse cx="'+(x+w/2)+'" cy="'+(y+h/2)+'" rx="'+(w/2)+'" ry="'+(h/2)+'" fill="'+bg+'" stroke="'+sc+'" stroke-width="2"/>');
            } else if (t === "text") {
                const fs = e.fontSize||16;
                const lines = (e.text||"").split("\n");
                lines.forEach((line, i) => {
                    svgParts.push('<text x="'+x+'" y="'+(y+fs+i*(fs*1.2))+'" font-size="'+fs+'" fill="'+sc+'" font-family="sans-serif">'+esc(line)+'</text>');
                });
            } else if (t === "line") {
                const pts = e.points || [[0,0],[w,h]];
                if (pts.length >= 2) {
                    svgParts.push('<line x1="'+(x+pts[0][0])+'" y1="'+(y+pts[0][1])+'" x2="'+(x+pts[pts.length-1][0])+'" y2="'+(y+pts[pts.length-1][1])+'" stroke="'+sc+'" stroke-width="2"/>');
                }
            }
        });
        svgParts.push('</svg>');

        const pz = document.getElementById("panZoom");
        pz.innerHTML = svgParts.join("");

        // Pan & zoom
        let scale = 1, tx = 0, ty = 0, dragging = false, lastX, lastY;
        function applyTransform() { pz.style.transform = "translate("+tx+"px,"+ty+"px) scale("+scale+")"; }

        const wrap = document.getElementById("canvasWrap");
        wrap.addEventListener("wheel", e => {
            e.preventDefault();
            const r = wrap.getBoundingClientRect();
            const mx = e.clientX - r.left, my = e.clientY - r.top;
            const oldScale = scale;
            scale *= e.deltaY < 0 ? 1.1 : 0.9;
            scale = Math.max(0.1, Math.min(10, scale));
            tx = mx - (mx - tx) * scale / oldScale;
            ty = my - (my - ty) * scale / oldScale;
            applyTransform();
        }, { passive: false });

        wrap.addEventListener("mousedown", e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
        window.addEventListener("mousemove", e => {
            if (!dragging) return;
            tx += e.clientX - lastX; ty += e.clientY - lastY;
            lastX = e.clientX; lastY = e.clientY;
            applyTransform();
        });
        window.addEventListener("mouseup", () => { dragging = false; });

        // Save button — downloads original .excalidraw JSON
        document.getElementById("saveBtn").addEventListener("click", () => {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "transport-dispatch.excalidraw";
            a.click();
            URL.revokeObjectURL(a.href);
        });
    </script>
</body>
</html>
