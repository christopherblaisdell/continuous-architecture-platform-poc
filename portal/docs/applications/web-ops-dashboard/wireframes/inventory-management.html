d", "x": 275, "y": 500, "width": 100, "height": 30, "backgroundColor": "#FFFFFF", "strokeColor": "#BDBDBD"}, {"type": "text", "id": "order_qty_value", "x": 285, "y": 507, "text": "20", "fontSize": 12, "strokeColor": "#333333"}, {"type": "text", "id": "order_priority_label", "x": 275, "y": 545, "text": "Priority:", "fontSize": 12, "strokeColor": "#666666"}, {"type": "rectangle", "id": "order_priority_field", "x": 275, "y": 565, "width": 150, "height": 30, "backgroundColor": "#FFFFFF", "strokeColor": "#BDBDBD"}, {"type": "text", "id": "order_priority_value", "x": 285, "y": 572, "text": "Urgent", "fontSize": 12, "strokeColor": "#C62828"}, {"type": "rectangle", "id": "submit_order_btn", "x": 275, "y": 620, "width": 160, "height": 35, "backgroundColor": "#1565C0", "strokeColor": "#1565C0"}, {"type": "text", "id": "submit_order_text", "x": 300, "y": 628, "text": "Submit Order", "fontSize": 13, "strokeColor": "#FFFFFF"}, {"type": "rectangle", "id": "recent_orders", "x": 620, "y": 370, "width": 340, "height": 310, "backgroundColor": "#FFFFFF", "strokeColor": "#E0E0E0"}, {"type": "text", "id": "recent_title", "x": 635, "y": 380, "text": "Recent Purchase Orders", "fontSize": 14, "strokeColor": "#333333"}, {"type": "text", "id": "po_1", "x": 635, "y": 415, "text": "PO-2026-0312  Hydration Packs x25\nStatus: Shipped  |  ETA: March 21", "fontSize": 11, "strokeColor": "#555555"}, {"type": "text", "id": "po_2", "x": 635, "y": 460, "text": "PO-2026-0298  Trekking Poles x30\nStatus: Processing  |  ETA: March 25", "fontSize": 11, "strokeColor": "#555555"}, {"type": "text", "id": "po_3", "x": 635, "y": 505, "text": "PO-2026-0285  First Aid Kits x50\nStatus: Delivered  |  March 15", "fontSize": 11, "strokeColor": "#555555"}], "appState": {"name": "Operations Dashboard - Inventory Management", "currentItemBackgroundColor": "#ffffff", "currentItemOpacity": 100, "fileTitle": "inventory-management", "gridMode": false}};
        const elements = data.elements || [];

        // Bounding box
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        elements.forEach(e => {
            const x = e.x || 0, y = e.y || 0, w = e.width || 0, h = e.height || 0;
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x + w > maxX) maxX = x + w;
            if (y + h > maxY) maxY = y + h;
        });
        if (!isFinite(minX)) { minX = 0; minY = 0; maxX = 800; maxY = 600; }
        const pad = 40;
        const vw = maxX - minX + pad * 2, vh = maxY - minY + pad * 2;

        function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

        let svgParts = ['<svg xmlns="http://www.w3.org/2000/svg" viewBox="' + (minX-pad) + ' ' + (minY-pad) + ' ' + vw + ' ' + vh + '">'];
        svgParts.push('<rect x="'+(minX-pad)+'" y="'+(minY-pad)+'" width="'+vw+'" height="'+vh+'" fill="#fafafa"/>');

        elements.forEach(e => {
            const t = e.type, x = e.x||0, y = e.y||0, w = e.width||100, h = e.height||50;
            const sc = e.strokeColor||"#000", bg = e.backgroundColor||"#fff";
            if (t === "rectangle") {
                svgParts.push('<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+bg+'" stroke="'+sc+'" stroke-width="2" rx="4"/>');
            } else if (t === "ellipse") {
                svgParts.push('<ellipse cx="'+(x+w/2)+'" cy="'+(y+h/2)+'" rx="'+(w/2)+'" ry="'+(h/2)+'" fill="'+bg+'" stroke="'+sc+'" stroke-width="2"/>');
            } else if (t === "text") {
                const fs = e.fontSize||16;
                const lines = (e.text||"").split("\n");
                lines.forEach((line, i) => {
                    svgParts.push('<text x="'+x+'" y="'+(y+fs+i*(fs*1.2))+'" font-size="'+fs+'" fill="'+sc+'" font-family="sans-serif">'+esc(line)+'</text>');
                });
            } else if (t === "line") {
                const pts = e.points || [[0,0],[w,h]];
                if (pts.length >= 2) {
                    svgParts.push('<line x1="'+(x+pts[0][0])+'" y1="'+(y+pts[0][1])+'" x2="'+(x+pts[pts.length-1][0])+'" y2="'+(y+pts[pts.length-1][1])+'" stroke="'+sc+'" stroke-width="2"/>');
                }
            }
        });
        svgParts.push('</svg>');

        const pz = document.getElementById("panZoom");
        pz.innerHTML = svgParts.join("");

        // Pan & zoom
        let scale = 1, tx = 0, ty = 0, dragging = false, lastX, lastY;
        function applyTransform() { pz.style.transform = "translate("+tx+"px,"+ty+"px) scale("+scale+")"; }

        const wrap = document.getElementById("canvasWrap");
        wrap.addEventListener("wheel", e => {
            e.preventDefault();
            const r = wrap.getBoundingClientRect();
            const mx = e.clientX - r.left, my = e.clientY - r.top;
            const oldScale = scale;
            scale *= e.deltaY < 0 ? 1.1 : 0.9;
            scale = Math.max(0.1, Math.min(10, scale));
            tx = mx - (mx - tx) * scale / oldScale;
            ty = my - (my - ty) * scale / oldScale;
            applyTransform();
        }, { passive: false });

        wrap.addEventListener("mousedown", e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
        window.addEventListener("mousemove", e => {
            if (!dragging) return;
            tx += e.clientX - lastX; ty += e.clientY - lastY;
            lastX = e.clientX; lastY = e.clientY;
            applyTransform();
        });
        window.addEventListener("mouseup", () => { dragging = false; });

        // Save button — downloads original .excalidraw JSON
        document.getElementById("saveBtn").addEventListener("click", () => {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "inventory-management.excalidraw";
            a.click();
            URL.revokeObjectURL(a.href);
        });
    </script>
