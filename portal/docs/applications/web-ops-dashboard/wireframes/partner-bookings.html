            overflow: hidden; background: #fff;

        svg { display: block; width: 100%; height: 100%; }
        .pan-zoom {
            transform-origin: 0 0; cursor: grab;

sts", "x": 655, "y": 388, "text": "6", "fontSize": 12, "strokeColor": "#333333"}, {"type": "text", "id": "b3_amount", "x": 715, "y": 388, "text": "$540", "fontSize": 12, "strokeColor": "#333333"}, {"type": "text", "id": "b3_payment", "x": 800, "y": 388, "text": "Disputed", "fontSize": 12, "strokeColor": "#C62828"}, {"type": "text", "id": "b3_action", "x": 900, "y": 388, "text": "[Review]", "fontSize": 12, "strokeColor": "#1565C0"}, {"type": "rectangle", "id": "reconciliation_panel", "x": 260, "y": 445, "width": 340, "height": 235, "backgroundColor": "#FFFFFF", "strokeColor": "#E0E0E0"}, {"type": "text", "id": "recon_title", "x": 275, "y": 455, "text": "Commission Reconciliation", "fontSize": 14, "strokeColor": "#333333"}, {"type": "text", "id": "recon_data", "x": 275, "y": 485, "text": "Partner          Bookings  Commission  Paid\n\nTravelMax           42      $6,300    $5,880\nAdventureHub        31      $4,650    $4,650\nExploreMore         22      $3,960    $3,520\nWildTrails          18      $2,340    $2,340\nSummit Partners     12      $1,170    $1,170", "fontSize": 11, "strokeColor": "#555555"}, {"type": "rectangle", "id": "export_btn", "x": 275, "y": 640, "width": 130, "height": 30, "backgroundColor": "#1565C0", "strokeColor": "#1565C0"}, {"type": "text", "id": "export_text", "x": 295, "y": 648, "text": "Export CSV", "fontSize": 12, "strokeColor": "#FFFFFF"}, {"type": "rectangle", "id": "payment_panel", "x": 620, "y": 445, "width": 340, "height": 235, "backgroundColor": "#FFFFFF", "strokeColor": "#E0E0E0"}, {"type": "text", "id": "payment_title", "x": 635, "y": 455, "text": "Payment Status - PB-4210", "fontSize": 14, "strokeColor": "#333333"}, {"type": "text", "id": "payment_data", "x": 635, "y": 490, "text": "Partner:       TravelMax\nBooking Total: $480.00\nCommission:    $72.00 (15%)\nNet Amount:    $408.00\n\nPayment ID:    PAY-8821\nStatus:        Awaiting Partner Payment\nDue Date:      March 25, 2026", "fontSize": 12, "strokeColor": "#555555"}, {"type": "rectangle", "id": "mark_paid_btn", "x": 635, "y": 640, "width": 130, "height": 30, "backgroundColor": "#4CAF50", "strokeColor": "#4CAF50"}, {"type": "text", "id": "mark_paid_text", "x": 653, "y": 648, "text": "Mark Paid", "fontSize": 12, "strokeColor": "#FFFFFF"}], "appState": {"name": "Operations Dashboard - Partner Bookings", "currentItemBackgroundColor": "#ffffff", "currentItemOpacity": 100, "fileTitle": "partner-bookings", "gridMode": false}};
        const elements = data.elements || [];

        // Bounding box
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        elements.forEach(e => {
            const x = e.x || 0, y = e.y || 0, w = e.width || 0, h = e.height || 0;
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x + w > maxX) maxX = x + w;
            if (y + h > maxY) maxY = y + h;
        });
        if (!isFinite(minX)) { minX = 0; minY = 0; maxX = 800; maxY = 600; }
        const pad = 40;
        const vw = maxX - minX + pad * 2, vh = maxY - minY + pad * 2;

        function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

        let svgParts = ['<svg xmlns="http://www.w3.org/2000/svg" viewBox="' + (minX-pad) + ' ' + (minY-pad) + ' ' + vw + ' ' + vh + '">'];
        svgParts.push('<rect x="'+(minX-pad)+'" y="'+(minY-pad)+'" width="'+vw+'" height="'+vh+'" fill="#fafafa"/>');

        elements.forEach(e => {
            const t = e.type, x = e.x||0, y = e.y||0, w = e.width||100, h = e.height||50;
            const sc = e.strokeColor||"#000", bg = e.backgroundColor||"#fff";
            if (t === "rectangle") {
                svgParts.push('<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+bg+'" stroke="'+sc+'" stroke-width="2" rx="4"/>');
            } else if (t === "ellipse") {
                svgParts.push('<ellipse cx="'+(x+w/2)+'" cy="'+(y+h/2)+'" rx="'+(w/2)+'" ry="'+(h/2)+'" fill="'+bg+'" stroke="'+sc+'" stroke-width="2"/>');
            } else if (t === "text") {
                const fs = e.fontSize||16;
                const lines = (e.text||"").split("\n");
                lines.forEach((line, i) => {
                    svgParts.push('<text x="'+x+'" y="'+(y+fs+i*(fs*1.2))+'" font-size="'+fs+'" fill="'+sc+'" font-family="sans-serif">'+esc(line)+'</text>');
                });
            } else if (t === "line") {
                const pts = e.points || [[0,0],[w,h]];
                if (pts.length >= 2) {
                    svgParts.push('<line x1="'+(x+pts[0][0])+'" y1="'+(y+pts[0][1])+'" x2="'+(x+pts[pts.length-1][0])+'" y2="'+(y+pts[pts.length-1][1])+'" stroke="'+sc+'" stroke-width="2"/>');
                }
            }
        });
        svgParts.push('</svg>');

        const pz = document.getElementById("panZoom");
        pz.innerHTML = svgParts.join("");

        // Pan & zoom
        let scale = 1, tx = 0, ty = 0, dragging = false, lastX, lastY;
        function applyTransform() { pz.style.transform = "translate("+tx+"px,"+ty+"px) scale("+scale+")"; }

        const wrap = document.getElementById("canvasWrap");
        wrap.addEventListener("wheel", e => {
            e.preventDefault();
            const r = wrap.getBoundingClientRect();
            const mx = e.clientX - r.left, my = e.clientY - r.top;
            const oldScale = scale;
            scale *= e.deltaY < 0 ? 1.1 : 0.9;
            scale = Math.max(0.1, Math.min(10, scale));
            tx = mx - (mx - tx) * scale / oldScale;
            ty = my - (my - ty) * scale / oldScale;
            applyTransform();
        }, { passive: false });

        wrap.addEventListener("mousedown", e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
        window.addEventListener("mousemove", e => {
            if (!dragging) return;
            tx += e.clientX - lastX; ty += e.clientY - lastY;
            lastX = e.clientX; lastY = e.clientY;
            applyTransform();
        });
        window.addEventListener("mouseup", () => { dragging = false; });

        // Save button — downloads original .excalidraw JSON
        document.getElementById("saveBtn").addEventListener("click", () => {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "partner-bookings.excalidraw";
            a.click();
            URL.revokeObjectURL(a.href);
        });
    </script>
