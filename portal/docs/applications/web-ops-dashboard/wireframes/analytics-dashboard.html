<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operations Dashboard - Analytics Dashboard — Excalidraw Editor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background: #fafafa; }
        .toolbar {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 16px; background: #fff; border-bottom: 1px solid #e0e0e0;
        }
        .toolbar h1 { font-size: 16px; color: #333; flex: 1; }
        .toolbar button {
            padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px;
            font-weight: 600; cursor: pointer;
        }
        .btn-save { background: #4CAF50; color: white; }
        .btn-save:hover { background: #388E3C; }
        .btn-back { background: #f5f5f5; color: #333; border: 1px solid #ddd !important; }
        .btn-back:hover { background: #eee; }
        .canvas-wrap {
            position: absolute; top: 49px; left: 0; right: 0; bottom: 0;
            overflow: hidden; background: #fff;
        }
        svg { display: block; width: 100%; height: 100%; }
        .pan-zoom {
            transform-origin: 0 0; cursor: grab;
        }
        .pan-zoom:active { cursor: grabbing; }
    </style>
</head>
<body>
    <div class="toolbar">
        <button class="btn-back" onclick="history.back()">&larr; Back</button>
        <h1>Operations Dashboard - Analytics Dashboard</h1>
        <button class="btn-save" id="saveBtn">&#x2B07; Save .excalidraw</button>
    </div>
    <div class="canvas-wrap" id="canvasWrap">
        <div class="pan-zoom" id="panZoom"></div>
    </div>
    <script>
        // Render Excalidraw elements as interactive SVG with zoom/pan
        const data = {"type": "excalidraw", "version": 2, "source": "https://excalidraw.com", "elements": [{"type": "rectangle", "id": "sidebar", "x": 0, "y": 0, "width": 240, "height": 700, "backgroundColor": "#2C3E50", "strokeColor": "#2C3E50"}, {"type": "text", "id": "sidebar_title", "x": 15, "y": 15, "text": "Operations Dashboard", "fontSize": 16, "strokeColor": "#FFFFFF"}, {"type": "text", "id": "menu_1", "x": 15, "y": 80, "text": "Daily Schedule", "fontSize": 14, "strokeColor": "#CCCCCC"}, {"type": "text", "id": "menu_2", "x": 15, "y": 120, "text": "Check-In Station", "fontSize": 14, "strokeColor": "#CCCCCC"}, {"type": "text", "id": "menu_3", "x": 15, "y": 160, "text": "Guide Assignment", "fontSize": 14, "strokeColor": "#CCCCCC"}, {"type": "text", "id": "menu_4", "x": 15, "y": 200, "text": "Safety Incidents", "fontSize": 14, "strokeColor": "#CCCCCC"}, {"type": "text", "id": "menu_5", "x": 15, "y": 240, "text": "Inventory", "fontSize": 14, "strokeColor": "#CCCCCC"}, {"type": "text", "id": "menu_6", "x": 15, "y": 280, "text": "Transport Dispatch", "fontSize": 14, "strokeColor": "#CCCCCC"}, {"type": "text", "id": "menu_active", "x": 15, "y": 320, "text": "Analytics", "fontSize": 14, "strokeColor": "#4CAF50"}, {"type": "text", "id": "menu_8", "x": 15, "y": 360, "text": "Partner Bookings", "fontSize": 14, "strokeColor": "#CCCCCC"}, {"type": "rectangle", "id": "main_header", "x": 240, "y": 0, "width": 760, "height": 60, "backgroundColor": "#FFFFFF", "strokeColor": "#E0E0E0"}, {"type": "text", "id": "main_title", "x": 260, "y": 15, "text": "Analytics Dashboard", "fontSize": 18, "strokeColor": "#333333"}, {"type": "rectangle", "id": "date_range", "x": 700, "y": 12, "width": 250, "height": 35, "backgroundColor": "#FFFFFF", "strokeColor": "#BDBDBD"}, {"type": "text", "id": "date_range_text", "x": 715, "y": 20, "text": "Mar 1 - Mar 19, 2026", "fontSize": 13, "strokeColor": "#333333"}, {"type": "rectangle", "id": "kpi_bookings", "x": 260, "y": 80, "width": 170, "height": 100, "backgroundColor": "#E3F2FD", "strokeColor": "#2196F3"}, {"type": "text", "id": "kpi_bookings_label", "x": 275, "y": 90, "text": "Total Bookings", "fontSize": 12, "strokeColor": "#1565C0"}, {"type": "text", "id": "kpi_bookings_value", "x": 300, "y": 120, "text": "1,247", "fontSize": 24, "strokeColor": "#1565C0"}, {"type": "text", "id": "kpi_bookings_delta", "x": 300, "y": 155, "text": "+12% vs prior period", "fontSize": 10, "strokeColor": "#4CAF50"}, {"type": "rectangle", "id": "kpi_revenue", "x": 450, "y": 80, "width": 170, "height": 100, "backgroundColor": "#E8F5E9", "strokeColor": "#4CAF50"}, {"type": "text", "id": "kpi_revenue_label", "x": 465, "y": 90, "text": "Revenue", "fontSize": 12, "strokeColor": "#2E7D32"}, {"type": "text", "id": "kpi_revenue_value", "x": 475, "y": 120, "text": "$284,500", "fontSize": 22, "strokeColor": "#2E7D32"}, {"type": "text", "id": "kpi_revenue_delta", "x": 485, "y": 155, "text": "+8% vs prior period", "fontSize": 10, "strokeColor": "#4CAF50"}, {"type": "rectangle", "id": "kpi_utilization", "x": 640, "y": 80, "width": 170, "height": 100, "backgroundColor": "#FFF3E0", "strokeColor": "#FF9800"}, {"type": "text", "id": "kpi_util_label", "x": 655, "y": 90, "text": "Capacity Utilization", "fontSize": 12, "strokeColor": "#E65100"}, {"type": "text", "id": "kpi_util_value", "x": 695, "y": 120, "text": "73%", "fontSize": 24, "strokeColor": "#E65100"}, {"type": "text", "id": "kpi_util_delta", "x": 680, "y": 155, "text": "-2% vs prior period", "fontSize": 10, "strokeColor": "#FF9800"}, {"type": "rectangle", "id": "kpi_satisfaction", "x": 830, "y": 80, "width": 170, "height": 100, "backgroundColor": "#F3E5F5", "strokeColor": "#9C27B0"}, {"type": "text", "id": "kpi_sat_label", "x": 845, "y": 90, "text": "Guest Satisfaction", "fontSize": 12, "strokeColor": "#6A1B9A"}, {"type": "text", "id": "kpi_sat_value", "x": 875, "y": 120, "text": "4.6 / 5", "fontSize": 22, "strokeColor": "#6A1B9A"}, {"type": "text", "id": "kpi_sat_delta", "x": 875, "y": 155, "text": "+0.2 vs prior", "fontSize": 10, "strokeColor": "#4CAF50"}, {"type": "rectangle", "id": "chart_bookings", "x": 260, "y": 200, "width": 360, "height": 220, "backgroundColor": "#FFFFFF", "strokeColor": "#E0E0E0"}, {"type": "text", "id": "chart_bookings_title", "x": 275, "y": 210, "text": "Booking Trends (Daily)", "fontSize": 14, "strokeColor": "#333333"}, {"type": "text", "id": "chart_bookings_placeholder", "x": 365, "y": 310, "text": "[ Line Chart ]\nBookings per day\nwith trend line", "fontSize": 12, "strokeColor": "#999999"}, {"type": "rectangle", "id": "chart_revenue", "x": 640, "y": 200, "width": 360, "height": 220, "backgroundColor": "#FFFFFF", "strokeColor": "#E0E0E0"}, {"type": "text", "id": "chart_revenue_title", "x": 655, "y": 210, "text": "Revenue by Adventure Type", "fontSize": 14, "strokeColor": "#333333"}, {"type": "text", "id": "chart_revenue_placeholder", "x": 745, "y": 310, "text": "[ Bar Chart ]\nRevenue breakdown\nby category", "fontSize": 12, "strokeColor": "#999999"}, {"type": "rectangle", "id": "chart_util", "x": 260, "y": 440, "width": 360, "height": 220, "backgroundColor": "#FFFFFF", "strokeColor": "#E0E0E0"}, {"type": "text", "id": "chart_util_title", "x": 275, "y": 450, "text": "Guide Utilization Heatmap", "fontSize": 14, "strokeColor": "#333333"}, {"type": "text", "id": "chart_util_placeholder", "x": 365, "y": 550, "text": "[ Heatmap ]\nGuide hours by\nday of week", "fontSize": 12, "strokeColor": "#999999"}, {"type": "rectangle", "id": "table_top", "x": 640, "y": 440, "width": 360, "height": 220, "backgroundColor": "#FFFFFF", "strokeColor": "#E0E0E0"}, {"type": "text", "id": "table_top_title", "x": 655, "y": 450, "text": "Top Adventures by Revenue", "fontSize": 14, "strokeColor": "#333333"}, {"type": "text", "id": "table_top_data", "x": 655, "y": 480, "text": "1. Mountain Rappelling     $42,800\n2. River Kayaking Exped.   $38,200\n3. Canopy Zipline Tour     $35,600\n4. Sunrise Peak Hike       $28,400\n5. Wildlife Safari Walk    $24,100", "fontSize": 12, "strokeColor": "#555555"}, {"type": "text", "id": "snowflake_badge", "x": 655, "y": 620, "text": "Data source: Snowflake Data Cloud", "fontSize": 10, "strokeColor": "#999999"}], "appState": {"name": "Operations Dashboard - Analytics Dashboard", "currentItemBackgroundColor": "#ffffff", "currentItemOpacity": 100, "fileTitle": "analytics-dashboard", "gridMode": false}};
        const elements = data.elements || [];

        // Bounding box
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        elements.forEach(e => {
            const x = e.x || 0, y = e.y || 0, w = e.width || 0, h = e.height || 0;
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x + w > maxX) maxX = x + w;
            if (y + h > maxY) maxY = y + h;
        });
        if (!isFinite(minX)) { minX = 0; minY = 0; maxX = 800; maxY = 600; }
        const pad = 40;
        const vw = maxX - minX + pad * 2, vh = maxY - minY + pad * 2;

        function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

        let svgParts = ['<svg xmlns="http://www.w3.org/2000/svg" viewBox="' + (minX-pad) + ' ' + (minY-pad) + ' ' + vw + ' ' + vh + '">'];
        svgParts.push('<rect x="'+(minX-pad)+'" y="'+(minY-pad)+'" width="'+vw+'" height="'+vh+'" fill="#fafafa"/>');

        elements.forEach(e => {
            const t = e.type, x = e.x||0, y = e.y||0, w = e.width||100, h = e.height||50;
            const sc = e.strokeColor||"#000", bg = e.backgroundColor||"#fff";
            if (t === "rectangle") {
                svgParts.push('<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+bg+'" stroke="'+sc+'" stroke-width="2" rx="4"/>');
            } else if (t === "ellipse") {
                svgParts.push('<ellipse cx="'+(x+w/2)+'" cy="'+(y+h/2)+'" rx="'+(w/2)+'" ry="'+(h/2)+'" fill="'+bg+'" stroke="'+sc+'" stroke-width="2"/>');
            } else if (t === "text") {
                const fs = e.fontSize||16;
                const lines = (e.text||"").split("\n");
                lines.forEach((line, i) => {
                    svgParts.push('<text x="'+x+'" y="'+(y+fs+i*(fs*1.2))+'" font-size="'+fs+'" fill="'+sc+'" font-family="sans-serif">'+esc(line)+'</text>');
                });
            } else if (t === "line") {
                const pts = e.points || [[0,0],[w,h]];
                if (pts.length >= 2) {
                    svgParts.push('<line x1="'+(x+pts[0][0])+'" y1="'+(y+pts[0][1])+'" x2="'+(x+pts[pts.length-1][0])+'" y2="'+(y+pts[pts.length-1][1])+'" stroke="'+sc+'" stroke-width="2"/>');
                }
            }
        });
        svgParts.push('</svg>');

        const pz = document.getElementById("panZoom");
        pz.innerHTML = svgParts.join("");

        // Pan & zoom
        let scale = 1, tx = 0, ty = 0, dragging = false, lastX, lastY;
        function applyTransform() { pz.style.transform = "translate("+tx+"px,"+ty+"px) scale("+scale+")"; }

        const wrap = document.getElementById("canvasWrap");
        wrap.addEventListener("wheel", e => {
            e.preventDefault();
            const r = wrap.getBoundingClientRect();
            const mx = e.clientX - r.left, my = e.clientY - r.top;
            const oldScale = scale;
            scale *= e.deltaY < 0 ? 1.1 : 0.9;
            scale = Math.max(0.1, Math.min(10, scale));
            tx = mx - (mx - tx) * scale / oldScale;
            ty = my - (my - ty) * scale / oldScale;
            applyTransform();
        }, { passive: false });

        wrap.addEventListener("mousedown", e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
        window.addEventListener("mousemove", e => {
            if (!dragging) return;
            tx += e.clientX - lastX; ty += e.clientY - lastY;
            lastX = e.clientX; lastY = e.clientY;
            applyTransform();
        });
        window.addEventListener("mouseup", () => { dragging = false; });

        // Save button — downloads original .excalidraw JSON
        document.getElementById("saveBtn").addEventListener("click", () => {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "analytics-dashboard.excalidraw";
            a.click();
            URL.revokeObjectURL(a.href);
        });
    </script>
</body>
</html>
