<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operations Dashboard - Check-In Station — Excalidraw Editor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background: #fafafa; }
        .toolbar {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 16px; background: #fff; border-bottom: 1px solid #e0e0e0;
        }
        .toolbar h1 { font-size: 16px; color: #333; flex: 1; }
        .toolbar button {
            padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px;
            font-weight: 600; cursor: pointer;
        }
        .btn-save { background: #4CAF50; color: white; }
        .btn-save:hover { background: #388E3C; }
        .btn-back { background: #f5f5f5; color: #333; border: 1px solid #ddd !important; }
        .btn-back:hover { background: #eee; }
        .canvas-wrap {
            position: absolute; top: 49px; left: 0; right: 0; bottom: 0;
            overflow: hidden; background: #fff;
        }
        svg { display: block; width: 100%; height: 100%; }
        .pan-zoom {
            transform-origin: 0 0; cursor: grab;
        }
        .pan-zoom:active { cursor: grabbing; }
    </style>
</head>
<body>
    <div class="toolbar">
        <button class="btn-back" onclick="history.back()">&larr; Back</button>
        <h1>Operations Dashboard - Check-In Station</h1>
        <button class="btn-save" id="saveBtn">&#x2B07; Save .excalidraw</button>
    </div>
    <div class="canvas-wrap" id="canvasWrap">
        <div class="pan-zoom" id="panZoom"></div>
    </div>
    <script>
        // Render Excalidraw elements as interactive SVG with zoom/pan
        const data = {"type": "excalidraw", "version": 2, "source": "https://excalidraw.com", "elements": [{"type": "rectangle", "id": "sidebar", "x": 0, "y": 0, "width": 240, "height": 700, "backgroundColor": "#2C3E50", "strokeColor": "#2C3E50"}, {"type": "text", "id": "sidebar_title", "x": 15, "y": 15, "text": "Operations Dashboard", "fontSize": 16, "strokeColor": "#FFFFFF"}, {"type": "text", "id": "menu_1", "x": 15, "y": 80, "text": "Daily Schedule", "fontSize": 14, "strokeColor": "#CCCCCC"}, {"type": "text", "id": "menu_active", "x": 15, "y": 120, "text": "Check-In Station", "fontSize": 14, "strokeColor": "#4CAF50"}, {"type": "text", "id": "menu_3", "x": 15, "y": 160, "text": "Guide Assignment", "fontSize": 14, "strokeColor": "#CCCCCC"}, {"type": "text", "id": "menu_4", "x": 15, "y": 200, "text": "Safety Incidents", "fontSize": 14, "strokeColor": "#CCCCCC"}, {"type": "rectangle", "id": "main_header", "x": 240, "y": 0, "width": 760, "height": 60, "backgroundColor": "#FFFFFF", "strokeColor": "#E0E0E0"}, {"type": "text", "id": "main_title", "x": 260, "y": 15, "text": "Check-In Station", "fontSize": 18, "strokeColor": "#333333"}, {"type": "rectangle", "id": "search_bar", "x": 260, "y": 80, "width": 400, "height": 40, "backgroundColor": "#FFFFFF", "strokeColor": "#BDBDBD"}, {"type": "text", "id": "search_placeholder", "x": 275, "y": 90, "text": "Scan QR code or enter reservation ID...", "fontSize": 13, "strokeColor": "#9E9E9E"}, {"type": "rectangle", "id": "search_btn", "x": 670, "y": 80, "width": 100, "height": 40, "backgroundColor": "#1565C0", "strokeColor": "#1565C0"}, {"type": "text", "id": "search_btn_text", "x": 695, "y": 90, "text": "Lookup", "fontSize": 13, "strokeColor": "#FFFFFF"}, {"type": "rectangle", "id": "reservation_panel", "x": 260, "y": 140, "width": 350, "height": 220, "backgroundColor": "#FFFFFF", "strokeColor": "#E0E0E0"}, {"type": "text", "id": "res_title", "x": 275, "y": 150, "text": "Reservation Details", "fontSize": 14, "strokeColor": "#333333"}, {"type": "text", "id": "res_data", "x": 275, "y": 180, "text": "Confirmation:  RES-2026-4821\nAdventure:     Sunrise Peak Hike\nDate:          March 19, 2026\nGuests:        2 adults\nPattern:       Pattern 2 (Guided)\nStatus:        Confirmed", "fontSize": 12, "strokeColor": "#555555"}, {"type": "rectangle", "id": "guest_panel", "x": 630, "y": 140, "width": 350, "height": 220, "backgroundColor": "#FFFFFF", "strokeColor": "#E0E0E0"}, {"type": "text", "id": "guest_title", "x": 645, "y": 150, "text": "Guest Identity Verification", "fontSize": 14, "strokeColor": "#333333"}, {"type": "text", "id": "guest_data", "x": 645, "y": 180, "text": "Name:          Sarah Johnson\nEmail:         sarah.j@example.com\nPhone:         +1 (555) 234-5678\nLoyalty Tier:   Gold Member", "fontSize": 12, "strokeColor": "#555555"}, {"type": "rectangle", "id": "verify_btn", "x": 645, "y": 300, "width": 140, "height": 35, "backgroundColor": "#4CAF50", "strokeColor": "#4CAF50"}, {"type": "text", "id": "verify_btn_text", "x": 665, "y": 308, "text": "Identity Verified", "fontSize": 12, "strokeColor": "#FFFFFF"}, {"type": "rectangle", "id": "checklist_panel", "x": 260, "y": 380, "width": 350, "height": 300, "backgroundColor": "#FFFFFF", "strokeColor": "#E0E0E0"}, {"type": "text", "id": "checklist_title", "x": 275, "y": 390, "text": "Check-In Checklist", "fontSize": 14, "strokeColor": "#333333"}, {"type": "text", "id": "check_1", "x": 275, "y": 425, "text": "[x]  Reservation verified", "fontSize": 13, "strokeColor": "#4CAF50"}, {"type": "text", "id": "check_2", "x": 275, "y": 455, "text": "[x]  Guest identity confirmed", "fontSize": 13, "strokeColor": "#4CAF50"}, {"type": "text", "id": "check_3", "x": 275, "y": 485, "text": "[x]  Waiver signed (2026-03-18)", "fontSize": 13, "strokeColor": "#4CAF50"}, {"type": "text", "id": "check_4", "x": 275, "y": 515, "text": "[ ]  Gear package assigned", "fontSize": 13, "strokeColor": "#FF9800"}, {"type": "text", "id": "check_5", "x": 275, "y": 545, "text": "[ ]  Wristband issued", "fontSize": 13, "strokeColor": "#FF9800"}, {"type": "rectangle", "id": "complete_btn", "x": 275, "y": 590, "width": 200, "height": 45, "backgroundColor": "#E0E0E0", "strokeColor": "#BDBDBD"}, {"type": "text", "id": "complete_btn_text", "x": 310, "y": 602, "text": "Complete Check-In", "fontSize": 14, "strokeColor": "#999999"}, {"type": "rectangle", "id": "gear_panel", "x": 630, "y": 380, "width": 350, "height": 300, "backgroundColor": "#FFFFFF", "strokeColor": "#E0E0E0"}, {"type": "text", "id": "gear_title", "x": 645, "y": 390, "text": "Gear Assignment", "fontSize": 14, "strokeColor": "#333333"}, {"type": "text", "id": "gear_data", "x": 645, "y": 425, "text": "Recommended Gear Package:\n\n  Hiking boots (Size 9)\n  Trekking poles (pair)\n  Hydration pack (2L)\n  Safety helmet\n  First aid kit (personal)", "fontSize": 12, "strokeColor": "#555555"}, {"type": "rectangle", "id": "assign_gear_btn", "x": 645, "y": 580, "width": 160, "height": 35, "backgroundColor": "#1565C0", "strokeColor": "#1565C0"}, {"type": "text", "id": "assign_gear_btn_text", "x": 675, "y": 588, "text": "Assign Gear", "fontSize": 12, "strokeColor": "#FFFFFF"}, {"type": "rectangle", "id": "wristband_btn", "x": 830, "y": 580, "width": 140, "height": 35, "backgroundColor": "#FF9800", "strokeColor": "#FF9800"}, {"type": "text", "id": "wristband_btn_text", "x": 848, "y": 588, "text": "Issue Wristband", "fontSize": 12, "strokeColor": "#FFFFFF"}], "appState": {"name": "Operations Dashboard - Check-In Station", "currentItemBackgroundColor": "#ffffff", "currentItemOpacity": 100, "fileTitle": "check-in-station", "gridMode": false}};
        const elements = data.elements || [];

        // Bounding box
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        elements.forEach(e => {
            const x = e.x || 0, y = e.y || 0, w = e.width || 0, h = e.height || 0;
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x + w > maxX) maxX = x + w;
            if (y + h > maxY) maxY = y + h;
        });
        if (!isFinite(minX)) { minX = 0; minY = 0; maxX = 800; maxY = 600; }
        const pad = 40;
        const vw = maxX - minX + pad * 2, vh = maxY - minY + pad * 2;

        function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

        let svgParts = ['<svg xmlns="http://www.w3.org/2000/svg" viewBox="' + (minX-pad) + ' ' + (minY-pad) + ' ' + vw + ' ' + vh + '">'];
        svgParts.push('<rect x="'+(minX-pad)+'" y="'+(minY-pad)+'" width="'+vw+'" height="'+vh+'" fill="#fafafa"/>');

        elements.forEach(e => {
            const t = e.type, x = e.x||0, y = e.y||0, w = e.width||100, h = e.height||50;
            const sc = e.strokeColor||"#000", bg = e.backgroundColor||"#fff";
            if (t === "rectangle") {
                svgParts.push('<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+bg+'" stroke="'+sc+'" stroke-width="2" rx="4"/>');
            } else if (t === "ellipse") {
                svgParts.push('<ellipse cx="'+(x+w/2)+'" cy="'+(y+h/2)+'" rx="'+(w/2)+'" ry="'+(h/2)+'" fill="'+bg+'" stroke="'+sc+'" stroke-width="2"/>');
            } else if (t === "text") {
                const fs = e.fontSize||16;
                const lines = (e.text||"").split("\n");
                lines.forEach((line, i) => {
                    svgParts.push('<text x="'+x+'" y="'+(y+fs+i*(fs*1.2))+'" font-size="'+fs+'" fill="'+sc+'" font-family="sans-serif">'+esc(line)+'</text>');
                });
            } else if (t === "line") {
                const pts = e.points || [[0,0],[w,h]];
                if (pts.length >= 2) {
                    svgParts.push('<line x1="'+(x+pts[0][0])+'" y1="'+(y+pts[0][1])+'" x2="'+(x+pts[pts.length-1][0])+'" y2="'+(y+pts[pts.length-1][1])+'" stroke="'+sc+'" stroke-width="2"/>');
                }
            }
        });
        svgParts.push('</svg>');

        const pz = document.getElementById("panZoom");
        pz.innerHTML = svgParts.join("");

        // Pan & zoom
        let scale = 1, tx = 0, ty = 0, dragging = false, lastX, lastY;
        function applyTransform() { pz.style.transform = "translate("+tx+"px,"+ty+"px) scale("+scale+")"; }

        const wrap = document.getElementById("canvasWrap");
        wrap.addEventListener("wheel", e => {
            e.preventDefault();
            const r = wrap.getBoundingClientRect();
            const mx = e.clientX - r.left, my = e.clientY - r.top;
            const oldScale = scale;
            scale *= e.deltaY < 0 ? 1.1 : 0.9;
            scale = Math.max(0.1, Math.min(10, scale));
            tx = mx - (mx - tx) * scale / oldScale;
            ty = my - (my - ty) * scale / oldScale;
            applyTransform();
        }, { passive: false });

        wrap.addEventListener("mousedown", e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
        window.addEventListener("mousemove", e => {
            if (!dragging) return;
            tx += e.clientX - lastX; ty += e.clientY - lastY;
            lastX = e.clientX; lastY = e.clientY;
            applyTransform();
        });
        window.addEventListener("mouseup", () => { dragging = false; });

        // Save button — downloads original .excalidraw JSON
        document.getElementById("saveBtn").addEventListener("click", () => {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "check-in-station.excalidraw";
            a.click();
            URL.revokeObjectURL(a.href);
        });
    </script>
</body>
</html>
