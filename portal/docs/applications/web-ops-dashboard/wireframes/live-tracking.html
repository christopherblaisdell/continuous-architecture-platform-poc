<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operations Dashboard - Live Tracking — Excalidraw Editor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background: #fafafa; }
        .toolbar {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 16px; background: #fff; border-bottom: 1px solid #e0e0e0;
        }
        .toolbar h1 { font-size: 16px; color: #333; flex: 1; }
        .toolbar button {
            padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px;
            font-weight: 600; cursor: pointer;
        }
        .btn-save { background: #4CAF50; color: white; }
        .btn-save:hover { background: #388E3C; }
        .btn-back { background: #f5f5f5; color: #333; border: 1px solid #ddd !important; }
        .btn-back:hover { background: #eee; }
        .canvas-wrap {
            position: absolute; top: 49px; left: 0; right: 0; bottom: 0;
            overflow: hidden; background: #fff;
        }
        svg { display: block; width: 100%; height: 100%; }
        .pan-zoom {
            transform-origin: 0 0; cursor: grab;
        }
        .pan-zoom:active { cursor: grabbing; }
    </style>
</head>
<body>
    <div class="toolbar">
        <button class="btn-back" onclick="history.back()">&larr; Back</button>
        <h1>Operations Dashboard - Live Tracking</h1>
        <button class="btn-save" id="saveBtn">&#x2B07; Save .excalidraw</button>
    </div>
    <div class="canvas-wrap" id="canvasWrap">
        <div class="pan-zoom" id="panZoom"></div>
    </div>
    <script>
        // Render Excalidraw elements as interactive SVG with zoom/pan
        const data = {"type": "excalidraw", "version": 2, "source": "https://excalidraw.com", "elements": [{"type": "rectangle", "id": "sidebar", "x": 0, "y": 0, "width": 240, "height": 600, "backgroundColor": "#2C3E50", "strokeColor": "#2C3E50"}, {"type": "text", "id": "sidebar_title", "x": 15, "y": 15, "text": "Operations Dashboard", "fontSize": 16, "strokeColor": "#FFFFFF"}, {"type": "text", "id": "menu_active", "x": 15, "y": 80, "text": "Live Tracking", "fontSize": 14, "strokeColor": "#4CAF50"}, {"type": "text", "id": "menu_2", "x": 15, "y": 120, "text": "Adventures Today", "fontSize": 14, "strokeColor": "#CCCCCC"}, {"type": "text", "id": "menu_3", "x": 15, "y": 160, "text": "Alerts & Incidents", "fontSize": 14, "strokeColor": "#CCCCCC"}, {"type": "rectangle", "id": "main_header", "x": 240, "y": 0, "width": 560, "height": 60, "backgroundColor": "#FFFFFF", "strokeColor": "#E0E0E0"}, {"type": "text", "id": "main_title", "x": 260, "y": 15, "text": "Live Adventure Tracking - 15 Active Adventures", "fontSize": 18, "strokeColor": "#333333"}, {"type": "rectangle", "id": "map_area", "x": 240, "y": 80, "width": 560, "height": 350, "backgroundColor": "#E8F5E9", "strokeColor": "#4CAF50"}, {"type": "text", "id": "map_placeholder", "x": 400, "y": 250, "text": "[ Live Map with Guest Positions ]", "fontSize": 14, "strokeColor": "#666666"}, {"type": "rectangle", "id": "stats_area", "x": 240, "y": 450, "width": 560, "height": 150, "backgroundColor": "#FFFFFF", "strokeColor": "#E0E0E0"}, {"type": "rectangle", "id": "stat_box_1", "x": 260, "y": 470, "width": 130, "height": 100, "backgroundColor": "#E3F2FD", "strokeColor": "#2196F3"}, {"type": "text", "id": "stat_label_1", "x": 275, "y": 485, "text": "Guests on Trail", "fontSize": 12, "strokeColor": "#1565C0"}, {"type": "text", "id": "stat_value_1", "x": 310, "y": 520, "text": "245", "fontSize": 20, "strokeColor": "#1565C0"}, {"type": "rectangle", "id": "stat_box_2", "x": 420, "y": 470, "width": 130, "height": 100, "backgroundColor": "#FCE4EC", "strokeColor": "#E91E63"}, {"type": "text", "id": "stat_label_2", "x": 440, "y": 485, "text": "Critical Alerts", "fontSize": 12, "strokeColor": "#AD1457"}, {"type": "text", "id": "stat_value_2", "x": 465, "y": 520, "text": "2", "fontSize": 20, "strokeColor": "#AD1457"}, {"type": "rectangle", "id": "stat_box_3", "x": 580, "y": 470, "width": 200, "height": 100, "backgroundColor": "#FFF3E0", "strokeColor": "#FF9800"}, {"type": "text", "id": "stat_label_3", "x": 600, "y": 485, "text": "Avg Response Time", "fontSize": 12, "strokeColor": "#E65100"}, {"type": "text", "id": "stat_value_3", "x": 650, "y": 520, "text": "4.2 min", "fontSize": 20, "strokeColor": "#E65100"}], "appState": {"name": "Operations Dashboard - Live Tracking", "viewport": {"enableVaporMode": false, "isResizing": false, "offset": {"x": 0, "y": 0}}, "currentItemBackgroundColor": "#ffffff", "currentItemOpacity": 100, "fileTitle": "ops-dashboard-tracking", "gridMode": false}};
        const elements = data.elements || [];

        // Bounding box
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        elements.forEach(e => {
            const x = e.x || 0, y = e.y || 0, w = e.width || 0, h = e.height || 0;
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x + w > maxX) maxX = x + w;
            if (y + h > maxY) maxY = y + h;
        });
        if (!isFinite(minX)) { minX = 0; minY = 0; maxX = 800; maxY = 600; }
        const pad = 40;
        const vw = maxX - minX + pad * 2, vh = maxY - minY + pad * 2;

        function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

        let svgParts = ['<svg xmlns="http://www.w3.org/2000/svg" viewBox="' + (minX-pad) + ' ' + (minY-pad) + ' ' + vw + ' ' + vh + '">'];
        svgParts.push('<rect x="'+(minX-pad)+'" y="'+(minY-pad)+'" width="'+vw+'" height="'+vh+'" fill="#fafafa"/>');

        elements.forEach(e => {
            const t = e.type, x = e.x||0, y = e.y||0, w = e.width||100, h = e.height||50;
            const sc = e.strokeColor||"#000", bg = e.backgroundColor||"#fff";
            if (t === "rectangle") {
                svgParts.push('<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+bg+'" stroke="'+sc+'" stroke-width="2" rx="4"/>');
            } else if (t === "ellipse") {
                svgParts.push('<ellipse cx="'+(x+w/2)+'" cy="'+(y+h/2)+'" rx="'+(w/2)+'" ry="'+(h/2)+'" fill="'+bg+'" stroke="'+sc+'" stroke-width="2"/>');
            } else if (t === "text") {
                const fs = e.fontSize||16;
                const lines = (e.text||"").split("\n");
                lines.forEach((line, i) => {
                    svgParts.push('<text x="'+x+'" y="'+(y+fs+i*(fs*1.2))+'" font-size="'+fs+'" fill="'+sc+'" font-family="sans-serif">'+esc(line)+'</text>');
                });
            } else if (t === "line") {
                const pts = e.points || [[0,0],[w,h]];
                if (pts.length >= 2) {
                    svgParts.push('<line x1="'+(x+pts[0][0])+'" y1="'+(y+pts[0][1])+'" x2="'+(x+pts[pts.length-1][0])+'" y2="'+(y+pts[pts.length-1][1])+'" stroke="'+sc+'" stroke-width="2"/>');
                }
            }
        });
        svgParts.push('</svg>');

        const pz = document.getElementById("panZoom");
        pz.innerHTML = svgParts.join("");

        // Pan & zoom
        let scale = 1, tx = 0, ty = 0, dragging = false, lastX, lastY;
        function applyTransform() { pz.style.transform = "translate("+tx+"px,"+ty+"px) scale("+scale+")"; }

        const wrap = document.getElementById("canvasWrap");
        wrap.addEventListener("wheel", e => {
            e.preventDefault();
            const r = wrap.getBoundingClientRect();
            const mx = e.clientX - r.left, my = e.clientY - r.top;
            const oldScale = scale;
            scale *= e.deltaY < 0 ? 1.1 : 0.9;
            scale = Math.max(0.1, Math.min(10, scale));
            tx = mx - (mx - tx) * scale / oldScale;
            ty = my - (my - ty) * scale / oldScale;
            applyTransform();
        }, { passive: false });

        wrap.addEventListener("mousedown", e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
        window.addEventListener("mousemove", e => {
            if (!dragging) return;
            tx += e.clientX - lastX; ty += e.clientY - lastY;
            lastX = e.clientX; lastY = e.clientY;
            applyTransform();
        });
        window.addEventListener("mouseup", () => { dragging = false; });

        // Save button — downloads original .excalidraw JSON
        document.getElementById("saveBtn").addEventListener("click", () => {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "live-tracking.excalidraw";
            a.click();
            URL.revokeObjectURL(a.href);
        });
    </script>
</body>
</html>
