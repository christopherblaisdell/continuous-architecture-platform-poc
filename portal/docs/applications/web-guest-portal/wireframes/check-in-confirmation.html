<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Check-In Confirmation Flow — Excalidraw Editor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background: #fafafa; }
        .toolbar {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 16px; background: #fff; border-bottom: 1px solid #e0e0e0;
        }
        .toolbar h1 { font-size: 16px; color: #333; flex: 1; }
        .toolbar button {
            padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px;
            font-weight: 600; cursor: pointer;
        }
        .btn-save { background: #4CAF50; color: white; }
        .btn-save:hover { background: #388E3C; }
        .btn-back { background: #f5f5f5; color: #333; border: 1px solid #ddd !important; }
        .btn-back:hover { background: #eee; }
        .canvas-wrap {
            position: absolute; top: 49px; left: 0; right: 0; bottom: 0;
            overflow: hidden; background: #fff;
        }
        svg { display: block; width: 100%; height: 100%; }
        .pan-zoom {
            transform-origin: 0 0; cursor: grab;
        }
        .pan-zoom:active { cursor: grabbing; }
    </style>
</head>
<body>
    <div class="toolbar">
        <button class="btn-back" onclick="history.back()">&larr; Back</button>
        <h1>Guest Check-In Confirmation Flow</h1>
        <button class="btn-save" id="saveBtn">&#x2B07; Save .excalidraw</button>
    </div>
    <div class="canvas-wrap" id="canvasWrap">
        <div class="pan-zoom" id="panZoom"></div>
    </div>
    <script>
        // Render Excalidraw elements as interactive SVG with zoom/pan
        const data = {"type": "excalidraw", "version": 2, "source": "https://excalidraw.com", "elements": [{"type": "rectangle", "id": "header", "x": 0, "y": 0, "width": 800, "height": 60, "backgroundColor": "#4C63D2", "strokeColor": "#4C63D2"}, {"type": "text", "id": "header_text", "x": 20, "y": 15, "text": "Check-In Confirmation", "fontSize": 24, "strokeColor": "#FFFFFF"}, {"type": "rectangle", "id": "content_area", "x": 40, "y": 100, "width": 720, "height": 300, "backgroundColor": "#FFFFFF", "strokeColor": "#E0E0E0"}, {"type": "text", "id": "confirmation_title", "x": 60, "y": 120, "text": "Adventure: Sunrise Ridge Trail", "fontSize": 18, "strokeColor": "#333333"}, {"type": "rectangle", "id": "info_box", "x": 60, "y": 160, "width": 300, "height": 100, "backgroundColor": "#F5F5F5", "strokeColor": "#CCCCCC"}, {"type": "text", "id": "guest_label", "x": 80, "y": 180, "text": "Guest: Alex Chen", "fontSize": 14, "strokeColor": "#666666"}, {"type": "text", "id": "time_label", "x": 80, "y": 210, "text": "Check-in: 08:30 AM", "fontSize": 14, "strokeColor": "#666666"}, {"type": "text", "id": "group_label", "x": 80, "y": 240, "text": "Group Size: 4 guests", "fontSize": 14, "strokeColor": "#666666"}, {"type": "rectangle", "id": "safety_box", "x": 400, "y": 160, "width": 300, "height": 100, "backgroundColor": "#FFF3E0", "strokeColor": "#FFB74D"}, {"type": "text", "id": "safety_label", "x": 420, "y": 180, "text": "Safety Briefing: COMPLETED", "fontSize": 14, "strokeColor": "#E65100"}, {"type": "text", "id": "waiver_label", "x": 420, "y": 210, "text": "Waivers: SIGNED", "fontSize": 14, "strokeColor": "#E65100"}, {"type": "text", "id": "wristband_label", "x": 420, "y": 240, "text": "Wristband: #3F8A1D", "fontSize": 14, "strokeColor": "#E65100"}, {"type": "rectangle", "id": "button_start", "x": 340, "y": 430, "width": 150, "height": 50, "backgroundColor": "#4CAF50", "strokeColor": "#2E7D32"}, {"type": "text", "id": "button_start_text", "x": 365, "y": 460, "text": "START ADVENTURE", "fontSize": 14, "strokeColor": "#FFFFFF"}, {"type": "rectangle", "id": "button_edit", "x": 520, "y": 430, "width": 100, "height": 50, "backgroundColor": "#E8E8E8", "strokeColor": "#999999"}, {"type": "text", "id": "button_edit_text", "x": 535, "y": 460, "text": "EDIT", "fontSize": 14, "strokeColor": "#333333"}], "appState": {"name": "Guest Check-In Confirmation Flow", "viewport": {"enableVaporMode": false, "isResizing": false, "offset": {"x": 0, "y": 0}}, "currentItemBackgroundColor": "#ffffff", "currentItemEndArrowType": null, "currentItemEndBinding": null, "currentItemFillStyle": "hachure", "currentItemFontFamily": 1, "currentItemFontSize": 16, "currentItemLeftArrowType": null, "currentItemOpacity": 100, "currentItemRoughness": 1, "currentItemStrokeColor": "#000000", "currentItemStrokeSharpness": "sharp", "currentItemStrokeStyle": "solid", "currentItemStrokeWidth": 2, "currentItemTextAlign": "left", "currentItemVerticalAlign": "top", "editingElement": null, "editingGroupId": null, "fileTitle": "check-in-web-portal", "gridMode": false, "gridModeEnabled": false, "gridSize": 20, "lastPointerDownWith": "mouse", "objectsSnapModeEnabled": false, "openSidebar": true, "collaborators": [], "showStockImages": false, "toast": null}};
        const elements = data.elements || [];

        // Bounding box
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        elements.forEach(e => {
            const x = e.x || 0, y = e.y || 0, w = e.width || 0, h = e.height || 0;
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x + w > maxX) maxX = x + w;
            if (y + h > maxY) maxY = y + h;
        });
        if (!isFinite(minX)) { minX = 0; minY = 0; maxX = 800; maxY = 600; }
        const pad = 40;
        const vw = maxX - minX + pad * 2, vh = maxY - minY + pad * 2;

        function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

        let svgParts = ['<svg xmlns="http://www.w3.org/2000/svg" viewBox="' + (minX-pad) + ' ' + (minY-pad) + ' ' + vw + ' ' + vh + '">'];
        svgParts.push('<rect x="'+(minX-pad)+'" y="'+(minY-pad)+'" width="'+vw+'" height="'+vh+'" fill="#fafafa"/>');

        elements.forEach(e => {
            const t = e.type, x = e.x||0, y = e.y||0, w = e.width||100, h = e.height||50;
            const sc = e.strokeColor||"#000", bg = e.backgroundColor||"#fff";
            if (t === "rectangle") {
                svgParts.push('<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+bg+'" stroke="'+sc+'" stroke-width="2" rx="4"/>');
            } else if (t === "ellipse") {
                svgParts.push('<ellipse cx="'+(x+w/2)+'" cy="'+(y+h/2)+'" rx="'+(w/2)+'" ry="'+(h/2)+'" fill="'+bg+'" stroke="'+sc+'" stroke-width="2"/>');
            } else if (t === "text") {
                const fs = e.fontSize||16;
                const lines = (e.text||"").split("\n");
                lines.forEach((line, i) => {
                    svgParts.push('<text x="'+x+'" y="'+(y+fs+i*(fs*1.2))+'" font-size="'+fs+'" fill="'+sc+'" font-family="sans-serif">'+esc(line)+'</text>');
                });
            } else if (t === "line") {
                const pts = e.points || [[0,0],[w,h]];
                if (pts.length >= 2) {
                    svgParts.push('<line x1="'+(x+pts[0][0])+'" y1="'+(y+pts[0][1])+'" x2="'+(x+pts[pts.length-1][0])+'" y2="'+(y+pts[pts.length-1][1])+'" stroke="'+sc+'" stroke-width="2"/>');
                }
            }
        });
        svgParts.push('</svg>');

        const pz = document.getElementById("panZoom");
        pz.innerHTML = svgParts.join("");

        // Pan & zoom
        let scale = 1, tx = 0, ty = 0, dragging = false, lastX, lastY;
        function applyTransform() { pz.style.transform = "translate("+tx+"px,"+ty+"px) scale("+scale+")"; }

        const wrap = document.getElementById("canvasWrap");
        wrap.addEventListener("wheel", e => {
            e.preventDefault();
            const r = wrap.getBoundingClientRect();
            const mx = e.clientX - r.left, my = e.clientY - r.top;
            const oldScale = scale;
            scale *= e.deltaY < 0 ? 1.1 : 0.9;
            scale = Math.max(0.1, Math.min(10, scale));
            tx = mx - (mx - tx) * scale / oldScale;
            ty = my - (my - ty) * scale / oldScale;
            applyTransform();
        }, { passive: false });

        wrap.addEventListener("mousedown", e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
        window.addEventListener("mousemove", e => {
            if (!dragging) return;
            tx += e.clientX - lastX; ty += e.clientY - lastY;
            lastX = e.clientX; lastY = e.clientY;
            applyTransform();
        });
        window.addEventListener("mouseup", () => { dragging = false; });

        // Save button — downloads original .excalidraw JSON
        document.getElementById("saveBtn").addEventListener("click", () => {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "check-in-confirmation.excalidraw";
            a.click();
            URL.revokeObjectURL(a.href);
        });
    </script>
</body>
</html>
