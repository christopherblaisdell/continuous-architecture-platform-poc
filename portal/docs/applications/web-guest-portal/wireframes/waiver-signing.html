<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waiver Signing — Excalidraw Editor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background: #fafafa; }
        .toolbar {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 16px; background: #fff; border-bottom: 1px solid #e0e0e0;
        }
        .toolbar h1 { font-size: 16px; color: #333; flex: 1; }
        .toolbar button {
            padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px;
            font-weight: 600; cursor: pointer;
        }
        .btn-save { background: #4CAF50; color: white; }
        .btn-save:hover { background: #388E3C; }
        .btn-back { background: #f5f5f5; color: #333; border: 1px solid #ddd !important; }
        .btn-back:hover { background: #eee; }
        .canvas-wrap {
            position: absolute; top: 49px; left: 0; right: 0; bottom: 0;
            overflow: hidden; background: #fff;
        }
        svg { display: block; width: 100%; height: 100%; }
        .pan-zoom {
            transform-origin: 0 0; cursor: grab;
        }
        .pan-zoom:active { cursor: grabbing; }
    </style>
</head>
<body>
    <div class="toolbar">
        <button class="btn-back" onclick="history.back()">&larr; Back</button>
        <h1>Waiver Signing</h1>
        <button class="btn-save" id="saveBtn">&#x2B07; Save .excalidraw</button>
    </div>
    <div class="canvas-wrap" id="canvasWrap">
        <div class="pan-zoom" id="panZoom"></div>
    </div>
    <script>
        // Render Excalidraw elements as interactive SVG with zoom/pan
        const data = {"type": "excalidraw", "version": 2, "source": "https://excalidraw.com", "elements": [{"type": "rectangle", "id": "nav_bar", "x": 0, "y": 0, "width": 900, "height": 56, "backgroundColor": "#2563eb", "strokeColor": "#2563eb"}, {"type": "text", "id": "nav_logo", "x": 20, "y": 14, "text": "NovaTrek Adventures", "fontSize": 20, "strokeColor": "#FFFFFF"}, {"type": "text", "id": "nav_links", "x": 500, "y": 18, "text": "Trips    My Bookings    Profile    Loyalty", "fontSize": 14, "strokeColor": "#FFFFFF"}, {"type": "text", "id": "page_title", "x": 50, "y": 80, "text": "Safety Waiver Signing", "fontSize": 24, "strokeColor": "#1e293b"}, {"type": "rectangle", "id": "trip_banner", "x": 50, "y": 125, "width": 800, "height": 50, "backgroundColor": "#dbeafe", "strokeColor": "#bfdbfe"}, {"type": "text", "id": "trip_banner_text", "x": 75, "y": 138, "text": "Trip: Desert Canyon Expedition  |  March 25, 2026  |  Confirmation: RES-2026-0042", "fontSize": 13, "strokeColor": "#1e40af"}, {"type": "rectangle", "id": "waiver_panel", "x": 50, "y": 195, "width": 560, "height": 480, "backgroundColor": "#FFFFFF", "strokeColor": "#e2e8f0"}, {"type": "text", "id": "waiver_num", "x": 75, "y": 210, "text": "Waiver 1 of 2: General Activity Waiver", "fontSize": 16, "strokeColor": "#1e293b"}, {"type": "rectangle", "id": "waiver_text_area", "x": 75, "y": 245, "width": 500, "height": 200, "backgroundColor": "#f8fafc", "strokeColor": "#e2e8f0"}, {"type": "text", "id": "waiver_body", "x": 90, "y": 260, "text": "RELEASE OF LIABILITY AND ASSUMPTION OF RISK\n\nBy signing this waiver, I acknowledge that I am voluntarily\nparticipating in outdoor adventure activities organized by\nNovaTrek Adventures. I understand and accept that these\nactivities involve inherent risks including but not limited\nto: falls, physical exhaustion, weather conditions, and\nwildlife encounters.\n\nI agree to follow all safety instructions provided by\nNovaTrek guides and staff...", "fontSize": 11, "strokeColor": "#475569"}, {"type": "text", "id": "scroll_hint", "x": 530, "y": 435, "text": "scroll v", "fontSize": 11, "strokeColor": "#94a3b8"}, {"type": "text", "id": "read_confirm", "x": 75, "y": 465, "text": "[x] I have read and understand the full waiver", "fontSize": 13, "strokeColor": "#334155"}, {"type": "text", "id": "sig_label", "x": 75, "y": 500, "text": "Digital Signature", "fontSize": 13, "strokeColor": "#475569"}, {"type": "rectangle", "id": "sig_box", "x": 75, "y": 520, "width": 400, "height": 80, "backgroundColor": "#f8fafc", "strokeColor": "#cbd5e1"}, {"type": "text", "id": "sig_hint", "x": 185, "y": 545, "text": "[ Sign here using your mouse or touch ]", "fontSize": 12, "strokeColor": "#94a3b8"}, {"type": "rectangle", "id": "clear_btn", "x": 490, "y": 520, "width": 80, "height": 32, "backgroundColor": "#FFFFFF", "strokeColor": "#e2e8f0"}, {"type": "text", "id": "clear_btn_text", "x": 510, "y": 528, "text": "Clear", "fontSize": 12, "strokeColor": "#475569"}, {"type": "text", "id": "date_label", "x": 75, "y": 618, "text": "Date: March 20, 2026 (auto-filled)", "fontSize": 12, "strokeColor": "#64748b"}, {"type": "rectangle", "id": "next_btn", "x": 75, "y": 645, "width": 200, "height": 44, "backgroundColor": "#2563eb", "strokeColor": "#1d4ed8"}, {"type": "text", "id": "next_btn_text", "x": 105, "y": 659, "text": "Sign and Continue", "fontSize": 14, "strokeColor": "#FFFFFF"}, {"type": "rectangle", "id": "sidebar", "x": 630, "y": 195, "width": 250, "height": 300, "backgroundColor": "#f8fafc", "strokeColor": "#e2e8f0"}, {"type": "text", "id": "sidebar_title", "x": 650, "y": 210, "text": "Required Waivers", "fontSize": 15, "strokeColor": "#1e293b"}, {"type": "text", "id": "waiver_1_status", "x": 650, "y": 248, "text": "General Activity Waiver", "fontSize": 13, "strokeColor": "#2563eb"}, {"type": "text", "id": "waiver_1_sub", "x": 650, "y": 268, "text": "In progress...", "fontSize": 11, "strokeColor": "#64748b"}, {"type": "text", "id": "waiver_2_status", "x": 650, "y": 305, "text": "High-Risk Activity Addendum", "fontSize": 13, "strokeColor": "#94a3b8"}, {"type": "text", "id": "waiver_2_sub", "x": 650, "y": 325, "text": "Pending", "fontSize": 11, "strokeColor": "#94a3b8"}, {"type": "rectangle", "id": "docusign_badge", "x": 650, "y": 455, "width": 180, "height": 28, "backgroundColor": "#FFFFFF", "strokeColor": "#e2e8f0"}, {"type": "text", "id": "docusign_text", "x": 665, "y": 461, "text": "Verified by DocuSign", "fontSize": 12, "strokeColor": "#64748b"}], "appState": {"viewBackgroundColor": "#f1f5f9"}};
        const elements = data.elements || [];

        // Bounding box
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        elements.forEach(e => {
            const x = e.x || 0, y = e.y || 0, w = e.width || 0, h = e.height || 0;
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x + w > maxX) maxX = x + w;
            if (y + h > maxY) maxY = y + h;
        });
        if (!isFinite(minX)) { minX = 0; minY = 0; maxX = 800; maxY = 600; }
        const pad = 40;
        const vw = maxX - minX + pad * 2, vh = maxY - minY + pad * 2;

        function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

        let svgParts = ['<svg xmlns="http://www.w3.org/2000/svg" viewBox="' + (minX-pad) + ' ' + (minY-pad) + ' ' + vw + ' ' + vh + '">'];
        svgParts.push('<rect x="'+(minX-pad)+'" y="'+(minY-pad)+'" width="'+vw+'" height="'+vh+'" fill="#fafafa"/>');

        elements.forEach(e => {
            const t = e.type, x = e.x||0, y = e.y||0, w = e.width||100, h = e.height||50;
            const sc = e.strokeColor||"#000", bg = e.backgroundColor||"#fff";
            if (t === "rectangle") {
                svgParts.push('<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+bg+'" stroke="'+sc+'" stroke-width="2" rx="4"/>');
            } else if (t === "ellipse") {
                svgParts.push('<ellipse cx="'+(x+w/2)+'" cy="'+(y+h/2)+'" rx="'+(w/2)+'" ry="'+(h/2)+'" fill="'+bg+'" stroke="'+sc+'" stroke-width="2"/>');
            } else if (t === "text") {
                const fs = e.fontSize||16;
                const lines = (e.text||"").split("\n");
                lines.forEach((line, i) => {
                    svgParts.push('<text x="'+x+'" y="'+(y+fs+i*(fs*1.2))+'" font-size="'+fs+'" fill="'+sc+'" font-family="sans-serif">'+esc(line)+'</text>');
                });
            } else if (t === "line") {
                const pts = e.points || [[0,0],[w,h]];
                if (pts.length >= 2) {
                    svgParts.push('<line x1="'+(x+pts[0][0])+'" y1="'+(y+pts[0][1])+'" x2="'+(x+pts[pts.length-1][0])+'" y2="'+(y+pts[pts.length-1][1])+'" stroke="'+sc+'" stroke-width="2"/>');
                }
            }
        });
        svgParts.push('</svg>');

        const pz = document.getElementById("panZoom");
        pz.innerHTML = svgParts.join("");

        // Pan & zoom
        let scale = 1, tx = 0, ty = 0, dragging = false, lastX, lastY;
        function applyTransform() { pz.style.transform = "translate("+tx+"px,"+ty+"px) scale("+scale+")"; }

        const wrap = document.getElementById("canvasWrap");
        wrap.addEventListener("wheel", e => {
            e.preventDefault();
            const r = wrap.getBoundingClientRect();
            const mx = e.clientX - r.left, my = e.clientY - r.top;
            const oldScale = scale;
            scale *= e.deltaY < 0 ? 1.1 : 0.9;
            scale = Math.max(0.1, Math.min(10, scale));
            tx = mx - (mx - tx) * scale / oldScale;
            ty = my - (my - ty) * scale / oldScale;
            applyTransform();
        }, { passive: false });

        wrap.addEventListener("mousedown", e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
        window.addEventListener("mousemove", e => {
            if (!dragging) return;
            tx += e.clientX - lastX; ty += e.clientY - lastY;
            lastX = e.clientX; lastY = e.clientY;
            applyTransform();
        });
        window.addEventListener("mouseup", () => { dragging = false; });

        // Save button — downloads original .excalidraw JSON
        document.getElementById("saveBtn").addEventListener("click", () => {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "waiver-signing.excalidraw";
            a.click();
            URL.revokeObjectURL(a.href);
        });
    </script>
</body>
</html>
