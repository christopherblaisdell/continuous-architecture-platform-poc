<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservation Management — Excalidraw Editor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background: #fafafa; }
        .toolbar {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 16px; background: #fff; border-bottom: 1px solid #e0e0e0;
        }
        .toolbar h1 { font-size: 16px; color: #333; flex: 1; }
        .toolbar button {
            padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px;
            font-weight: 600; cursor: pointer;
        }
        .btn-save { background: #4CAF50; color: white; }
        .btn-save:hover { background: #388E3C; }
        .btn-back { background: #f5f5f5; color: #333; border: 1px solid #ddd !important; }
        .btn-back:hover { background: #eee; }
        .canvas-wrap {
            position: absolute; top: 49px; left: 0; right: 0; bottom: 0;
            overflow: hidden; background: #fff;
        }
        svg { display: block; width: 100%; height: 100%; }
        .pan-zoom {
            transform-origin: 0 0; cursor: grab;
        }
        .pan-zoom:active { cursor: grabbing; }
    </style>
</head>
<body>
    <div class="toolbar">
        <button class="btn-back" onclick="history.back()">&larr; Back</button>
        <h1>Reservation Management</h1>
        <button class="btn-save" id="saveBtn">&#x2B07; Save .excalidraw</button>
    </div>
    <div class="canvas-wrap" id="canvasWrap">
        <div class="pan-zoom" id="panZoom"></div>
    </div>
    <script>
        // Render Excalidraw elements as interactive SVG with zoom/pan
        const data = {"type": "excalidraw", "version": 2, "source": "https://marketplace.visualstudio.com/items?itemName=pomdtr.excalidraw-editor", "elements": [{"type": "rectangle", "id": "nav_bar", "x": 0, "y": 0, "width": 900, "height": 56, "backgroundColor": "#2563eb", "strokeColor": "#2563eb", "version": 2, "versionNonce": 1953767506, "index": "a0", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773954819992, "link": null, "locked": false}, {"type": "rectangle", "id": "tabs_bar", "x": 50, "y": 125, "width": 830, "height": 40, "backgroundColor": "#f8fafc", "strokeColor": "#e2e8f0", "version": 2, "versionNonce": 123843538, "index": "a4", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773954819992, "link": null, "locked": false}, {"type": "rectangle", "id": "res_1", "x": 50, "y": 185, "width": 830, "height": 160, "backgroundColor": "#FFFFFF", "strokeColor": "#e2e8f0", "version": 2, "versionNonce": 1268803410, "index": "a8", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773954819992, "link": null, "locked": false}, {"type": "rectangle", "id": "res_1_img", "x": 70, "y": 200, "width": 130, "height": 120, "backgroundColor": "#dbeafe", "strokeColor": "#bfdbfe", "version": 2, "versionNonce": 175763150, "index": "a9", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773954819992, "link": null, "locked": false}, {"type": "rectangle", "id": "res_1_status", "x": 220, "y": 233, "width": 90, "height": 22, "backgroundColor": "#dcfce7", "strokeColor": "#86efac", "version": 2, "versionNonce": 929577682, "index": "aC", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773954819992, "link": null, "locked": false}, {"type": "rectangle", "id": "res_1_modify", "x": 650, "y": 210, "width": 100, "height": 32, "backgroundColor": "#FFFFFF", "strokeColor": "#2563eb", "version": 2, "versionNonce": 377977230, "index": "aF", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773954819992, "link": null, "locked": false}, {"type": "rectangle", "id": "res_1_cancel", "x": 770, "y": 210, "width": 90, "height": 32, "backgroundColor": "#FFFFFF", "strokeColor": "#ef4444", "version": 2, "versionNonce": 851253198, "index": "aH", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773954819992, "link": null, "locked": false}, {"type": "rectangle", "id": "res_2", "x": 50, "y": 365, "width": 830, "height": 160, "backgroundColor": "#FFFFFF", "strokeColor": "#e2e8f0", "version": 2, "versionNonce": 1823997006, "index": "aL", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773954819992, "link": null, "locked": false}, {"type": "rectangle", "id": "res_2_img", "x": 70, "y": 380, "width": 130, "height": 120, "backgroundColor": "#fef3c7", "strokeColor": "#fde68a", "version": 2, "versionNonce": 1477392274, "index": "aM", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773954819992, "link": null, "locked": false}, {"type": "rectangle", "id": "res_2_status", "x": 220, "y": 413, "width": 120, "height": 22, "backgroundColor": "#fef3c7", "strokeColor": "#fbbf24", "version": 2, "versionNonce": 1067696334, "index": "aP", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773954819992, "link": null, "locked": false}, {"type": "rectangle", "id": "res_2_sign", "x": 650, "y": 390, "width": 130, "height": 32, "backgroundColor": "#f59e0b", "strokeColor": "#d97706", "version": 2, "versionNonce": 1682098386, "index": "aS", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773954819992, "link": null, "locked": false}, {"type": "rectangle", "id": "res_2_cancel", "x": 800, "y": 390, "width": 60, "height": 32, "backgroundColor": "#FFFFFF", "strokeColor": "#ef4444", "version": 2, "versionNonce": 1314250386, "index": "aU", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773954819992, "link": null, "locked": false}], "appState": {"gridSize": 20, "gridStep": 5, "gridModeEnabled": false, "viewBackgroundColor": "#f1f5f9"}, "files": {}};
        const elements = data.elements || [];

        // Bounding box
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        elements.forEach(e => {
            const x = e.x || 0, y = e.y || 0, w = e.width || 0, h = e.height || 0;
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x + w > maxX) maxX = x + w;
            if (y + h > maxY) maxY = y + h;
        });
        if (!isFinite(minX)) { minX = 0; minY = 0; maxX = 800; maxY = 600; }
        const pad = 40;
        const vw = maxX - minX + pad * 2, vh = maxY - minY + pad * 2;

        function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

        let svgParts = ['<svg xmlns="http://www.w3.org/2000/svg" viewBox="' + (minX-pad) + ' ' + (minY-pad) + ' ' + vw + ' ' + vh + '">'];
        svgParts.push('<rect x="'+(minX-pad)+'" y="'+(minY-pad)+'" width="'+vw+'" height="'+vh+'" fill="#fafafa"/>');

        elements.forEach(e => {
            const t = e.type, x = e.x||0, y = e.y||0, w = e.width||100, h = e.height||50;
            const sc = e.strokeColor||"#000", bg = e.backgroundColor||"#fff";
            if (t === "rectangle") {
                svgParts.push('<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+bg+'" stroke="'+sc+'" stroke-width="2" rx="4"/>');
            } else if (t === "ellipse") {
                svgParts.push('<ellipse cx="'+(x+w/2)+'" cy="'+(y+h/2)+'" rx="'+(w/2)+'" ry="'+(h/2)+'" fill="'+bg+'" stroke="'+sc+'" stroke-width="2"/>');
            } else if (t === "text") {
                const fs = e.fontSize||16;
                const lines = (e.text||"").split("\n");
                lines.forEach((line, i) => {
                    svgParts.push('<text x="'+x+'" y="'+(y+fs+i*(fs*1.2))+'" font-size="'+fs+'" fill="'+sc+'" font-family="sans-serif">'+esc(line)+'</text>');
                });
            } else if (t === "line") {
                const pts = e.points || [[0,0],[w,h]];
                if (pts.length >= 2) {
                    svgParts.push('<line x1="'+(x+pts[0][0])+'" y1="'+(y+pts[0][1])+'" x2="'+(x+pts[pts.length-1][0])+'" y2="'+(y+pts[pts.length-1][1])+'" stroke="'+sc+'" stroke-width="2"/>');
                }
            }
        });
        svgParts.push('</svg>');

        const pz = document.getElementById("panZoom");
        pz.innerHTML = svgParts.join("");

        // Pan & zoom
        let scale = 1, tx = 0, ty = 0, dragging = false, lastX, lastY;
        function applyTransform() { pz.style.transform = "translate("+tx+"px,"+ty+"px) scale("+scale+")"; }

        const wrap = document.getElementById("canvasWrap");
        wrap.addEventListener("wheel", e => {
            e.preventDefault();
            const r = wrap.getBoundingClientRect();
            const mx = e.clientX - r.left, my = e.clientY - r.top;
            const oldScale = scale;
            scale *= e.deltaY < 0 ? 1.1 : 0.9;
            scale = Math.max(0.1, Math.min(10, scale));
            tx = mx - (mx - tx) * scale / oldScale;
            ty = my - (my - ty) * scale / oldScale;
            applyTransform();
        }, { passive: false });

        wrap.addEventListener("mousedown", e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
        window.addEventListener("mousemove", e => {
            if (!dragging) return;
            tx += e.clientX - lastX; ty += e.clientY - lastY;
            lastX = e.clientX; lastY = e.clientY;
            applyTransform();
        });
        window.addEventListener("mouseup", () => { dragging = false; });

        // Save button — downloads original .excalidraw JSON
        document.getElementById("saveBtn").addEventListener("click", () => {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "reservation-management.excalidraw";
            a.click();
            URL.revokeObjectURL(a.href);
        });
    </script>
</body>
</html>
