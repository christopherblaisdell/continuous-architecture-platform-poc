<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Gallery — Excalidraw Editor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background: #fafafa; }
        .toolbar {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 16px; background: #fff; border-bottom: 1px solid #e0e0e0;
        }
        .toolbar h1 { font-size: 16px; color: #333; flex: 1; }
        .toolbar button {
            padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px;
            font-weight: 600; cursor: pointer;
        }
        .btn-save { background: #4CAF50; color: white; }
        .btn-save:hover { background: #388E3C; }
        .btn-back { background: #f5f5f5; color: #333; border: 1px solid #ddd !important; }
        .btn-back:hover { background: #eee; }
        .canvas-wrap {
            position: absolute; top: 49px; left: 0; right: 0; bottom: 0;
            overflow: hidden; background: #fff;
        }
        svg { display: block; width: 100%; height: 100%; }
        .pan-zoom {
            transform-origin: 0 0; cursor: grab;
        }
        .pan-zoom:active { cursor: grabbing; }
    </style>
</head>
<body>
    <div class="toolbar">
        <button class="btn-back" onclick="history.back()">&larr; Back</button>
        <h1>Trip Gallery</h1>
        <button class="btn-save" id="saveBtn">&#x2B07; Save .excalidraw</button>
    </div>
    <div class="canvas-wrap" id="canvasWrap">
        <div class="pan-zoom" id="panZoom"></div>
    </div>
    <script>
        // Render Excalidraw elements as interactive SVG with zoom/pan
        const data = {"type": "excalidraw", "version": 2, "source": "https://excalidraw.com", "elements": [{"type": "rectangle", "id": "nav_bar", "x": 0, "y": 0, "width": 900, "height": 56, "backgroundColor": "#2563eb", "strokeColor": "#2563eb"}, {"type": "text", "id": "nav_logo", "x": 20, "y": 14, "text": "NovaTrek Adventures", "fontSize": 20, "strokeColor": "#FFFFFF"}, {"type": "text", "id": "nav_links", "x": 500, "y": 18, "text": "Trips    My Bookings    Profile    Loyalty", "fontSize": 14, "strokeColor": "#FFFFFF"}, {"type": "text", "id": "page_title", "x": 50, "y": 80, "text": "Trip Gallery", "fontSize": 24, "strokeColor": "#1e293b"}, {"type": "rectangle", "id": "trip_filter_bar", "x": 50, "y": 125, "width": 800, "height": 44, "backgroundColor": "#FFFFFF", "strokeColor": "#e2e8f0"}, {"type": "text", "id": "filter_all", "x": 75, "y": 138, "text": "All Adventures", "fontSize": 13, "strokeColor": "#2563eb"}, {"type": "text", "id": "filter_dash", "x": 210, "y": 138, "text": "|", "fontSize": 13, "strokeColor": "#e2e8f0"}, {"type": "text", "id": "filter_sunrise", "x": 225, "y": 138, "text": "Sunrise Ridge Trail", "fontSize": 13, "strokeColor": "#64748b"}, {"type": "text", "id": "filter_dash2", "x": 390, "y": 138, "text": "|", "fontSize": 13, "strokeColor": "#e2e8f0"}, {"type": "text", "id": "filter_coastal", "x": 405, "y": 138, "text": "Coastal Cliff Walk", "fontSize": 13, "strokeColor": "#64748b"}, {"type": "text", "id": "filter_dash3", "x": 565, "y": 138, "text": "|", "fontSize": 13, "strokeColor": "#e2e8f0"}, {"type": "text", "id": "filter_forest", "x": 580, "y": 138, "text": "Forest Canopy Trek", "fontSize": 13, "strokeColor": "#64748b"}, {"type": "rectangle", "id": "share_btn", "x": 760, "y": 132, "width": 80, "height": 30, "backgroundColor": "#2563eb", "strokeColor": "#1d4ed8"}, {"type": "text", "id": "share_btn_text", "x": 780, "y": 139, "text": "Share", "fontSize": 12, "strokeColor": "#FFFFFF"}, {"type": "rectangle", "id": "photo_1", "x": 50, "y": 188, "width": 270, "height": 200, "backgroundColor": "#dbeafe", "strokeColor": "#bfdbfe"}, {"type": "text", "id": "photo_1_label", "x": 130, "y": 275, "text": "[ Photo ]", "fontSize": 14, "strokeColor": "#64748b"}, {"type": "rectangle", "id": "photo_1_overlay", "x": 50, "y": 348, "width": 270, "height": 40, "backgroundColor": "#1e293b", "strokeColor": "#1e293b"}, {"type": "text", "id": "photo_1_caption", "x": 65, "y": 357, "text": "Sunrise Ridge  |  Mar 10, 2026", "fontSize": 11, "strokeColor": "#FFFFFF"}, {"type": "rectangle", "id": "photo_2", "x": 340, "y": 188, "width": 270, "height": 200, "backgroundColor": "#dcfce7", "strokeColor": "#bbf7d0"}, {"type": "text", "id": "photo_2_label", "x": 420, "y": 275, "text": "[ Photo ]", "fontSize": 14, "strokeColor": "#64748b"}, {"type": "rectangle", "id": "photo_2_overlay", "x": 340, "y": 348, "width": 270, "height": 40, "backgroundColor": "#1e293b", "strokeColor": "#1e293b"}, {"type": "text", "id": "photo_2_caption", "x": 355, "y": 357, "text": "Coastal Cliff Walk  |  Feb 20, 2026", "fontSize": 11, "strokeColor": "#FFFFFF"}, {"type": "rectangle", "id": "photo_3", "x": 630, "y": 188, "width": 220, "height": 200, "backgroundColor": "#fef3c7", "strokeColor": "#fde68a"}, {"type": "text", "id": "photo_3_label", "x": 700, "y": 275, "text": "[ Video ]", "fontSize": 14, "strokeColor": "#64748b"}, {"type": "rectangle", "id": "photo_3_overlay", "x": 630, "y": 348, "width": 220, "height": 40, "backgroundColor": "#1e293b", "strokeColor": "#1e293b"}, {"type": "text", "id": "photo_3_caption", "x": 645, "y": 357, "text": "Forest Trek  |  Jan 15, 2026", "fontSize": 11, "strokeColor": "#FFFFFF"}, {"type": "rectangle", "id": "photo_4", "x": 50, "y": 408, "width": 220, "height": 200, "backgroundColor": "#e0e7ff", "strokeColor": "#c7d2fe"}, {"type": "text", "id": "photo_4_label", "x": 120, "y": 495, "text": "[ Photo ]", "fontSize": 14, "strokeColor": "#64748b"}, {"type": "rectangle", "id": "photo_4_overlay", "x": 50, "y": 568, "width": 220, "height": 40, "backgroundColor": "#1e293b", "strokeColor": "#1e293b"}, {"type": "text", "id": "photo_4_caption", "x": 65, "y": 577, "text": "Canyon Explorer  |  Nov 30, 2025", "fontSize": 11, "strokeColor": "#FFFFFF"}, {"type": "rectangle", "id": "photo_5", "x": 290, "y": 408, "width": 270, "height": 200, "backgroundColor": "#fce7f3", "strokeColor": "#fbcfe8"}, {"type": "text", "id": "photo_5_label", "x": 370, "y": 495, "text": "[ Photo ]", "fontSize": 14, "strokeColor": "#64748b"}, {"type": "rectangle", "id": "photo_5_overlay", "x": 290, "y": 568, "width": 270, "height": 40, "backgroundColor": "#1e293b", "strokeColor": "#1e293b"}, {"type": "text", "id": "photo_5_caption", "x": 305, "y": 577, "text": "Sunrise Ridge  |  Sep 15, 2025", "fontSize": 11, "strokeColor": "#FFFFFF"}, {"type": "rectangle", "id": "photo_6", "x": 580, "y": 408, "width": 270, "height": 200, "backgroundColor": "#ccfbf1", "strokeColor": "#99f6e4"}, {"type": "text", "id": "photo_6_label", "x": 660, "y": 495, "text": "[ Video ]", "fontSize": 14, "strokeColor": "#64748b"}, {"type": "rectangle", "id": "photo_6_overlay", "x": 580, "y": 568, "width": 270, "height": 40, "backgroundColor": "#1e293b", "strokeColor": "#1e293b"}, {"type": "text", "id": "photo_6_caption", "x": 595, "y": 577, "text": "Alpine Meadow Trek  |  Aug 5, 2025", "fontSize": 11, "strokeColor": "#FFFFFF"}, {"type": "text", "id": "load_more", "x": 370, "y": 635, "text": "Load more photos (18 remaining)", "fontSize": 13, "strokeColor": "#2563eb"}, {"type": "rectangle", "id": "share_modal_hint", "x": 660, "y": 635, "width": 180, "height": 28, "backgroundColor": "#f1f5f9", "strokeColor": "#e2e8f0"}, {"type": "text", "id": "share_modal_text", "x": 677, "y": 641, "text": "Select photos to share", "fontSize": 11, "strokeColor": "#64748b"}], "appState": {"viewBackgroundColor": "#f1f5f9"}};
        const elements = data.elements || [];

        // Bounding box
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        elements.forEach(e => {
            const x = e.x || 0, y = e.y || 0, w = e.width || 0, h = e.height || 0;
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x + w > maxX) maxX = x + w;
            if (y + h > maxY) maxY = y + h;
        });
        if (!isFinite(minX)) { minX = 0; minY = 0; maxX = 800; maxY = 600; }
        const pad = 40;
        const vw = maxX - minX + pad * 2, vh = maxY - minY + pad * 2;

        function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

        let svgParts = ['<svg xmlns="http://www.w3.org/2000/svg" viewBox="' + (minX-pad) + ' ' + (minY-pad) + ' ' + vw + ' ' + vh + '">'];
        svgParts.push('<rect x="'+(minX-pad)+'" y="'+(minY-pad)+'" width="'+vw+'" height="'+vh+'" fill="#fafafa"/>');

        elements.forEach(e => {
            const t = e.type, x = e.x||0, y = e.y||0, w = e.width||100, h = e.height||50;
            const sc = e.strokeColor||"#000", bg = e.backgroundColor||"#fff";
            if (t === "rectangle") {
                svgParts.push('<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+bg+'" stroke="'+sc+'" stroke-width="2" rx="4"/>');
            } else if (t === "ellipse") {
                svgParts.push('<ellipse cx="'+(x+w/2)+'" cy="'+(y+h/2)+'" rx="'+(w/2)+'" ry="'+(h/2)+'" fill="'+bg+'" stroke="'+sc+'" stroke-width="2"/>');
            } else if (t === "text") {
                const fs = e.fontSize||16;
                const lines = (e.text||"").split("\n");
                lines.forEach((line, i) => {
                    svgParts.push('<text x="'+x+'" y="'+(y+fs+i*(fs*1.2))+'" font-size="'+fs+'" fill="'+sc+'" font-family="sans-serif">'+esc(line)+'</text>');
                });
            } else if (t === "line") {
                const pts = e.points || [[0,0],[w,h]];
                if (pts.length >= 2) {
                    svgParts.push('<line x1="'+(x+pts[0][0])+'" y1="'+(y+pts[0][1])+'" x2="'+(x+pts[pts.length-1][0])+'" y2="'+(y+pts[pts.length-1][1])+'" stroke="'+sc+'" stroke-width="2"/>');
                }
            }
        });
        svgParts.push('</svg>');

        const pz = document.getElementById("panZoom");
        pz.innerHTML = svgParts.join("");

        // Pan & zoom
        let scale = 1, tx = 0, ty = 0, dragging = false, lastX, lastY;
        function applyTransform() { pz.style.transform = "translate("+tx+"px,"+ty+"px) scale("+scale+")"; }

        const wrap = document.getElementById("canvasWrap");
        wrap.addEventListener("wheel", e => {
            e.preventDefault();
            const r = wrap.getBoundingClientRect();
            const mx = e.clientX - r.left, my = e.clientY - r.top;
            const oldScale = scale;
            scale *= e.deltaY < 0 ? 1.1 : 0.9;
            scale = Math.max(0.1, Math.min(10, scale));
            tx = mx - (mx - tx) * scale / oldScale;
            ty = my - (my - ty) * scale / oldScale;
            applyTransform();
        }, { passive: false });

        wrap.addEventListener("mousedown", e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
        window.addEventListener("mousemove", e => {
            if (!dragging) return;
            tx += e.clientX - lastX; ty += e.clientY - lastY;
            lastX = e.clientX; lastY = e.clientY;
            applyTransform();
        });
        window.addEventListener("mouseup", () => { dragging = false; });

        // Save button — downloads original .excalidraw JSON
        document.getElementById("saveBtn").addEventListener("click", () => {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "trip-gallery.excalidraw";
            a.click();
            URL.revokeObjectURL(a.href);
        });
    </script>
</body>
</html>
