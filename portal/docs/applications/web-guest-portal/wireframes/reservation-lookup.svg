<text x="284" y="694" font-size="14" fill="#2563EB" font-family="sans-serif">Have a QR Code? Scan at the kiosk or use our mobile app.</text>
<text x="284" y="719" font-size="13" fill="#6B7280" font-family="sans-serif">NovaTrek mobile app guests can use their digital booking QR code for instant check-in.</text>
