<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loyalty Dashboard — Excalidraw Editor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background: #fafafa; }
        .toolbar {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 16px; background: #fff; border-bottom: 1px solid #e0e0e0;
        }
        .toolbar h1 { font-size: 16px; color: #333; flex: 1; }
        .toolbar button {
            padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px;
            font-weight: 600; cursor: pointer;
        }
        .btn-save { background: #4CAF50; color: white; }
        .btn-save:hover { background: #388E3C; }
        .btn-back { background: #f5f5f5; color: #333; border: 1px solid #ddd !important; }
        .btn-back:hover { background: #eee; }
        .canvas-wrap {
            position: absolute; top: 49px; left: 0; right: 0; bottom: 0;
            overflow: hidden; background: #fff;
        }
        svg { display: block; width: 100%; height: 100%; }
        .pan-zoom {
            transform-origin: 0 0; cursor: grab;
        }
        .pan-zoom:active { cursor: grabbing; }
    </style>
</head>
<body>
    <div class="toolbar">
        <button class="btn-back" onclick="history.back()">&larr; Back</button>
        <h1>Loyalty Dashboard</h1>
        <button class="btn-save" id="saveBtn">&#x2B07; Save .excalidraw</button>
    </div>
    <div class="canvas-wrap" id="canvasWrap">
        <div class="pan-zoom" id="panZoom"></div>
    </div>
    <script>
        // Render Excalidraw elements as interactive SVG with zoom/pan
        const data = {"type": "excalidraw", "version": 2, "source": "https://marketplace.visualstudio.com/items?itemName=pomdtr.excalidraw-editor", "elements": [{"type": "rectangle", "id": "nav_bar", "x": 0, "y": 0, "width": 900, "height": 56, "backgroundColor": "#2563eb", "strokeColor": "#2563eb", "version": 2, "versionNonce": 1835696640, "index": "a0", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773954817549, "link": null, "locked": false}, {"type": "rectangle", "id": "tier_card", "x": 50, "y": 125, "width": 400, "height": 160, "backgroundColor": "#fef3c7", "strokeColor": "#fbbf24", "version": 2, "versionNonce": 1379009024, "index": "a4", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773954817549, "link": null, "locked": false}, {"type": "rectangle", "id": "progress_bg", "x": 280, "y": 252, "width": 150, "height": 10, "backgroundColor": "#fde68a", "strokeColor": "#fbbf24", "version": 2, "versionNonce": 783785472, "index": "a9", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773954817549, "link": null, "locked": false}, {"type": "rectangle", "id": "progress_fill", "x": 280, "y": 252, "width": 110, "height": 10, "backgroundColor": "#f59e0b", "strokeColor": "#d97706", "version": 2, "versionNonce": 1889092096, "index": "aA", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": h": 290, "height": 405, "backgroundColor": "#FFFFFF", "strokeColor": "#e2e8f0", "version": 2, "versionNonce": 2051981824, "index": "aU", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773954817549, "link": null, "locked": false}, {"type": "rectangle", "id": "reward_1", "x": 610, "y": 270, "width": 250, "height": 95, "backgroundColor": "#f8fafc", "strokeColor": "#e2e8f0", "version": 2, "versionNonce": 119964160, "index": "aW", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773954817549, "link": null, "locked": false}, {"type": "rectangle", "id": "reward_1_btn", "x": 625, "y": 328, "width": 80, "height": 26, "backgroundColor": "#2563eb", "strokeColor": "#1d4ed8", "version": 2, "versionNonce": 687267328, "index": "aZ", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773954817549, "link": null, "locked": false}, {"type": "rectangle", "id": "reward_2", "x": 610, "y": 380, "width": 250, "height": 95, "backgroundColor": "#f8fafc", "strokeColor": "#e2e8f0", "version": 2, "versionNonce": 1651187200, "index": "ab", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773954817549, "link": null, "locked": false}, {"type": "rectangle", "id": "reward_2_btn", "x": 625, "y": 438, "width": 80, "height": 26, "backgroundColor": "#2563eb", "strokeColor": "#1d4ed8", "version": 2, "versionNonce": 651526656, "index": "ae", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773954817549, "link": null, "locked": false}, {"type": "rectangle", "id": "reward_3", "x": 610, "y": 490, "width": 250, "height": 95, "backgroundColor": "#f8fafc", "strokeColor": "#e2e8f0", "version": 2, "versionNonce": 1960133120, "index": "ag", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773954817549, "link": null, "locked": false}, {"type": "rectangle", "id": "reward_3_btn", "x": 625, "y": 548, "width": 80, "height": 26, "backgroundColor": "#2563eb", "strokeColor": "#1d4ed8", "version": 2, "versionNonce": 485236224, "index": "aj", "isDeleted": false, "fillStyle": "solid", "strokeWidth": 2, "strokeStyle": "solid", "roughness": 1, "opacity": 100, "angle": 0, "seed": 1, "groupIds": [], "frameId": null, "roundness": null, "boundElements": [], "updated": 1773954817549, "link": null, "locked": false}], "appState": {"gridSize": 20, "gridStep": 5, "gridModeEnabled": false, "viewBackgroundColor": "#f1f5f9"}, "files": {}};
        const elements = data.elements || [];

        // Bounding box
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        elements.forEach(e => {
            const x = e.x || 0, y = e.y || 0, w = e.width || 0, h = e.height || 0;
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x + w > maxX) maxX = x + w;
            if (y + h > maxY) maxY = y + h;
        });
        if (!isFinite(minX)) { minX = 0; minY = 0; maxX = 800; maxY = 600; }
        const pad = 40;
        const vw = maxX - minX + pad * 2, vh = maxY - minY + pad * 2;

        function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

        let svgParts = ['<svg xmlns="http://www.w3.org/2000/svg" viewBox="' + (minX-pad) + ' ' + (minY-pad) + ' ' + vw + ' ' + vh + '">'];
        svgParts.push('<rect x="'+(minX-pad)+'" y="'+(minY-pad)+'" width="'+vw+'" height="'+vh+'" fill="#fafafa"/>');

        elements.forEach(e => {
            const t = e.type, x = e.x||0, y = e.y||0, w = e.width||100, h = e.height||50;
            const sc = e.strokeColor||"#000", bg = e.backgroundColor||"#fff";
            if (t === "rectangle") {
                svgParts.push('<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+bg+'" stroke="'+sc+'" stroke-width="2" rx="4"/>');
            } else if (t === "ellipse") {
                svgParts.push('<ellipse cx="'+(x+w/2)+'" cy="'+(y+h/2)+'" rx="'+(w/2)+'" ry="'+(h/2)+'" fill="'+bg+'" stroke="'+sc+'" stroke-width="2"/>');
            } else if (t === "text") {
                const fs = e.fontSize||16;
                const lines = (e.text||"").split("\n");
                lines.forEach((line, i) => {
                    svgParts.push('<text x="'+x+'" y="'+(y+fs+i*(fs*1.2))+'" font-size="'+fs+'" fill="'+sc+'" font-family="sans-serif">'+esc(line)+'</text>');
                });
            } else if (t === "line") {
                const pts = e.points || [[0,0],[w,h]];
                if (pts.length >= 2) {
                    svgParts.push('<line x1="'+(x+pts[0][0])+'" y1="'+(y+pts[0][1])+'" x2="'+(x+pts[pts.length-1][0])+'" y2="'+(y+pts[pts.length-1][1])+'" stroke="'+sc+'" stroke-width="2"/>');
                }
            }
        });
        svgParts.push('</svg>');

        const pz = document.getElementById("panZoom");
        pz.innerHTML = svgParts.join("");

        // Pan & zoom
        let scale = 1, tx = 0, ty = 0, dragging = false, lastX, lastY;
        function applyTransform() { pz.style.transform = "translate("+tx+"px,"+ty+"px) scale("+scale+")"; }

        const wrap = document.getElementById("canvasWrap");
        wrap.addEventListener("wheel", e => {
            e.preventDefault();
            const r = wrap.getBoundingClientRect();
            const mx = e.clientX - r.left, my = e.clientY - r.top;
            const oldScale = scale;
            scale *= e.deltaY < 0 ? 1.1 : 0.9;
            scale = Math.max(0.1, Math.min(10, scale));
            tx = mx - (mx - tx) * scale / oldScale;
            ty = my - (my - ty) * scale / oldScale;
            applyTransform();
        }, { passive: false });

        wrap.addEventListener("mousedown", e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
        window.addEventListener("mousemove", e => {
            if (!dragging) return;
            tx += e.clientX - lastX; ty += e.clientY - lastY;
            lastX = e.clientX; lastY = e.clientY;
            applyTransform();
        });
        window.addEventListener("mouseup", () => { dragging = false; });

        // Save button — downloads original .excalidraw JSON
        document.getElementById("saveBtn").addEventListener("click", () => {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "loyalty-dashboard.excalidraw";
            a.click();
            URL.revokeObjectURL(a.href);
        });
    </script>
</body>
</html>
