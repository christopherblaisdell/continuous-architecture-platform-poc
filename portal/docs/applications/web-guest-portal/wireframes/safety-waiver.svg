<text x="100" y="176" font-size="14" fill="#111827" font-family="sans-serif">Sunrise Ridge Trail Hike  |  Saturday, March 14, 2026  |  09:00 AM  |  Guide: Sarah Mitchell</text>
<text x="920" y="174" font-size="12" fill="#2563EB" font-family="sans-serif">Check-In Pattern:</text>
