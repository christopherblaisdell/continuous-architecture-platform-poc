<text x="1038" y="178" font-size="12" fill="#FFFFFF" font-family="sans-serif">Pattern 1 - Basic</text>
<rect x="40" y="230" width="700" height="540" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="2" rx="4"/>
<text x="56" y="257" font-size="13" fill="#6B7280" font-family="sans-serif">ADVENTURE LIABILITY WAIVER & SAFETY ACKNOWLEDGMENT</text>
<line x1="40" y1="268" x2="740" y2="268" stroke="#D1D5DB" stroke-width="2"/>
<text x="56" y="294" font-size="12" fill="#6B7280" font-family="sans-serif">This Liability Waiver and Safety Acknowledgment ('Agreement') is entered into between NovaTrek Adventures</text>
<text x="56" y="312" font-size="12" fill="#6B7280" font-family="sans-serif">('Company') and the undersigned participant ('Guest') for the adventure experience described above.</text>
<text x="56" y="330" font-size="12" fill="#6B7280" font-family="sans-serif"></text>
<text x="56" y="349" font-size="13" fill="#111827" font-family="sans-serif">SECTION 1 - ASSUMPTION OF RISK</text>
<text x="56" y="366" font-size="12" fill="#6B7280" font-family="sans-serif">Guest acknowledges that outdoor adventure activities involve inherent risks including but not limited</text>
<text x="56" y="384" font-size="12" fill="#6B7280" font-family="sans-serif">to: uneven terrain, changing weather conditions, physical exertion, wildlife encounters, and equipment</text>
<text x="56" y="402" font-size="12" fill="#6B7280" font-family="sans-serif">use. Guest voluntarily assumes all such risks.</text>
<text x="56" y="420" font-size="12" fill="#6B7280" font-family="sans-serif"></text>
<text x="56" y="439" font-size="13" fill="#111827" font-family="sans-serif">SECTION 2 - MEDICAL FITNESS</text>
<text x="56" y="456" font-size="12" fill="#6B7280" font-family="sans-serif">Guest confirms they are in adequate physical condition to participate in this adventure and have no</text>
<text x="56" y="474" font-size="12" fill="#6B7280" font-family="sans-serif">medical conditions that would be aggravated by this activity. Guests with cardiac conditions, recent</text>
<text x="56" y="492" font-size="12" fill="#6B7280" font-family="sans-serif">surgery, or pregnancy must provide medical clearance.</text>
<text x="56" y="510" font-size="12" fill="#6B7280" font-family="sans-serif"></text>
<text x="56" y="529" font-size="13" fill="#111827" font-family="sans-serif">SECTION 3 - EQUIPMENT AND SAFETY PROTOCOLS</text>
<text x="56" y="546" font-size="12" fill="#6B7280" font-family="sans-serif">Guest agrees to follow all safety instructions provided by NovaTrek guides, to use all assigned</text>
<text x="56" y="564" font-size="12" fill="#6B7280" font-family="sans-serif">safety equipment correctly, and to remain within designated boundaries at all times during the activity.</text>
<text x="56" y="582" font-size="12" fill="#6B7280" font-family="sans-serif"></text>
<text x="56" y="601" font-size="13" fill="#111827" font-family="sans-serif">SECTION 4 - EMERGENCY PROCEDURES</text>
<text x="56" y="618" font-size="12" fill="#6B7280" font-family="sans-serif">In the event of an emergency, Guest authorizes NovaTrek Adventures to arrange medical treatment at</text>
<text x="56" y="636" font-size="12" fill="#6B7280" font-family="sans-serif">Guest's expense if Guest cannot be reached. Emergency contact information provided will be used.</text>
<text x="56" y="654" font-size="12" fill="#6B7280" font-family="sans-serif"></text>
<text x="56" y="673" font-size="13" fill="#111827" font-family="sans-serif">SECTION 5 - RELEASE OF LIABILITY</text>
<text x="56" y="690" font-size="12" fill="#6B7280" font-family="sans-serif">Guest releases NovaTrek Adventures, its officers, employees, and guides from all liability arising from</text>
<text x="56" y="708" font-size="12" fill="#6B7280" font-family="sans-serif">negligence or fault related to the activity, except in cases of gross negligence or willful misconduct.</text>
