@startuml svc-check-in- -post-check-ins-check_in_id-gear-verification

skinparam backgroundColor #FEFEFE
skinparam shadowing false
skinparam defaultFontName "Segoe UI"
skinparam sequence {
    ArrowColor #059669
    ParticipantBorderColor #374151
    ParticipantBackgroundColor #F9FAFB
    LifeLineBorderColor #6B7280
    BoxBorderColor #94A3B8
    BoxBackgroundColor #F8FAFC
    NoteBorderColor #64748B
    NoteBackgroundColor #F8FAFC
}

header [[/microservices/svc-check-in/#integration-context ⬆ svc-check-in Integration Context]]

title POST /check-ins/{check_in_id}/gear-verification\nVerify gear has been picked up and fitted

participant "Client" as Client [[/applications/]]
participant "API Gateway" as GW [[/actors/#api-gateway]] #E0F2FE
participant "svc-check-in" as Svc [[/microservices/svc-check-in/]] #DBEAFE
participant "Gear Inventory" as Gear [[/microservices/svc-gear-inventory/]] #CFFAFE
participant "Safety Compliance" as Safety [[/microservices/svc-safety-compliance/]] #FEE2E2
database "PostgreSQL" as DB [[/microservices/svc-check-in/#data-store]] #FEF9C3

note over Svc
  [[/services/api/svc-check-in.html#/Check-Ins/verifyGear View in Swagger UI]]
end note

Client -> GW : POST /check-ins/{check_in_id}/gear-verification
activate GW #059669
GW -> Svc : route request
activate Svc #059669

note right of Svc : Validate request body

== Cross-Service Integration ==

Svc -> Gear : [[/microservices/svc-gear-inventory/#get-gear-assignmentsassignment_id-get-gear-assignment-details Verify gear assignment]]
activate Gear #CFFAFE
Gear - -> Svc : OK
deactivate Gear

Svc -> Safety : [[/microservices/svc-safety-compliance/#post-incidents-file-an-incident-report Log gear verification]]
activate Safety #FEE2E2
Safety - -> Svc : OK
deactivate Safety

== Database ==

Svc -> DB : SELECT parent WHERE id = ?
activate DB #FEF9C3
DB - -> Svc : Parent row
deactivate DB
note right of DB : 404 if parent not found

Svc -> DB : INSERT INTO ...
activate DB #FEF9C3
DB - -> Svc : Created row
deactivate DB

Svc - -> GW : 201 Created
deactivate Svc
GW - -> Client : 201 Created
deactivate GW

@enduml

