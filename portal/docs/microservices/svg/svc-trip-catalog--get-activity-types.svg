766cc89a8fb576]
@startuml svc-trip-catalog- -get-activity-types

skinparam backgroundColor #FEFEFE
skinparam shadowing false
skinparam defaultFontName "Segoe UI"
skinparam sequence {
    ArrowColor #2563eb
    ParticipantBorderColor #374151
    ParticipantBackgroundColor #F9FAFB
    LifeLineBorderColor #6B7280
    BoxBorderColor #94A3B8
    BoxBackgroundColor #F8FAFC
    NoteBorderColor #64748B
    NoteBackgroundColor #F8FAFC
}

header [[/microservices/svc-trip-catalog/#integration-context ⬆ svc-trip-catalog Integration Context]]

title GET /activity-types\nList available activity types

participant "Client" as Client [[/applications/]]
participant "API Gateway" as GW [[/actors/#api-gateway]] #E0F2FE
participant "svc-trip-catalog" as Svc [[/microservices/svc-trip-catalog/]] #FEF3C7
database "PostgreSQL" as DB [[/microservices/svc-trip-catalog/#data-store]] #FEF9C3

note over Svc
  [[/services/api/svc-trip-catalog.html#/Reference%20Data/listActivityTypes View in Swagger UI]]
end note

Client -> GW : GET /activity-types
activate GW #2563eb
GW -> Svc : route request
activate Svc #2563eb

== Database ==

Svc -> DB : SELECT ... WHERE filters
activate DB #FEF9C3
DB - -> Svc : Page of results
deactivate DB

Svc - -> GW : 200 OK
deactivate Svc
GW - -> Client : 200 OK
deactivate GW

@enduml

