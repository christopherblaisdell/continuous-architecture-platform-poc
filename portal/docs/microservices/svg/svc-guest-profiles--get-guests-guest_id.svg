iles/#integration-context" xlink:show="new" xlink:title="/microservices/svc-guest-profiles/#integration-context" xlink:type="simple"><text fill="#0000FF" font-family="Segoe UI" font-size="10" lengthAdjust="spacingAndGlyphs" text-decoration="underline" textLength="196" x="507" y="12.2822">⬆ svc-guest-profiles Integration Context</text></a><!--MD5=[f29a07a2885fa95cea9a8e74c6e35758]
@startuml svc-guest-profiles- -get-guests-guest_id

skinparam backgroundColor #FEFEFE
skinparam shadowing false
skinparam defaultFontName "Segoe UI"
skinparam sequence {
    ArrowColor #2563eb
    ParticipantBorderColor #374151
    ParticipantBackgroundColor #F9FAFB
    LifeLineBorderColor #6B7280
    BoxBorderColor #94A3B8
    BoxBackgroundColor #F8FAFC
    NoteBorderColor #64748B
    NoteBackgroundColor #F8FAFC
}

header [[/microservices/svc-guest-profiles/#integration-context ⬆ svc-guest-profiles Integration Context]]

title GET /guests/{guest_id}\nGet guest profile

participant "Client" as Client [[/applications/]]
participant "API Gateway" as GW [[/actors/#api-gateway]] #E0F2FE
participant "svc-guest-profiles" as Svc [[/microservices/svc-guest-profiles/]] #EDE9FE
database "PostgreSQL" as DB [[/microservices/svc-guest-profiles/#data-store]] #FEF9C3

note over Svc
  [[/services/api/svc-guest-profiles.html#/Guests/getGuest View in Swagger UI]]
end note

Client -> GW : GET /guests/{guest_id}
activate GW #2563eb
GW -> Svc : route request
activate Svc #2563eb

== Database ==

Svc -> DB : SELECT ... WHERE id = ?
activate DB #FEF9C3
DB - -> Svc : Row
deactivate DB
note right of DB : Returns 404 if not found

Svc - -> GW : 200 OK
deactivate Svc
GW - -> Client : 200 OK
deactivate GW

@enduml

