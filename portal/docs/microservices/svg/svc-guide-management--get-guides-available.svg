@startuml svc-guide-management- -get-guides-available

skinparam backgroundColor #FEFEFE
skinparam shadowing false
skinparam defaultFontName "Segoe UI"
skinparam sequence {
    ArrowColor #2563eb
    ParticipantBorderColor #374151
    ParticipantBackgroundColor #F9FAFB
    LifeLineBorderColor #6B7280
    BoxBorderColor #94A3B8
    BoxBackgroundColor #F8FAFC
    NoteBorderColor #64748B
    NoteBackgroundColor #F8FAFC
}

header [[/microservices/svc-guide-management/#integration-context ⬆ svc-guide-management Integration Context]]

title GET /guides/available\nFind available guides for a date, activity, and region

participant "Client" as Client [[/applications/]]
participant "API Gateway" as GW [[/actors/#api-gateway]] #E0F2FE
participant "svc-guide-management" as Svc [[/microservices/svc-guide-management/]] #E0E7FF
database "PostgreSQL" as DB [[/microservices/svc-guide-management/#data-store]] #FEF9C3

note over Svc
  [[/services/api/svc-guide-management.html#/Availability/findAvailableGuides View in Swagger UI]]
end note

Client -> GW : GET /guides/available
activate GW #2563eb
GW -> Svc : route request
activate Svc #2563eb

== Database ==

Svc -> DB : SELECT ... WHERE filters
activate DB #FEF9C3
DB - -> Svc : Page of results
deactivate DB

Svc - -> GW : 200 OK
deactivate Svc
GW - -> Client : 200 OK
deactivate GW

@enduml

