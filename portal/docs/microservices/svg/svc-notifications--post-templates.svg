; stroke-width: 2.0;" width="90" x="188" y="284.375"/><text fill="#000000" font-family="Segoe UI" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="71" x="194" y="300.4419">Database</text><polygon fill="#059669" points="394,334.6406,404,338.6406,394,342.6406,398,338.6406" style="stroke: #059669; stroke-width: 1.0;"/><line style="stroke: #059669; stroke-width: 1.0;" x1="292" x2="400" y1="338.6406" y2="338.6406"/><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="95" x="299" y="333.5747">INSERT INTO ...</text><polygon fill="#059669" points="303,363.7734,293,367.7734,303,371.7734,299,367.7734" style="stroke: #059669; stroke-width: 1.0;"/><line style="stroke: #059669; stroke-width: 1.0; stroke-dasharray: 2.0,2.0;" x1="297" x2="410" y1="367.7734" y2="367.7734"/><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="77" x="309" y="362.7075">Created row</text><polygon fill="#059669" points="181.5,392.9063,171.5,396.9063,181.5,400.9063,177.5,396.9063" style="stroke: #059669; stroke-width: 1.0;"/><line style="stroke: #059669; stroke-width: 1.0; stroke-dasharray: 2.0,2.0;" x1="175.5" x2="286" y1="396.9063" y2="396.9063"/><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="79" x="187.5" y="391.8403">201 Created</text><polygon fill="#059669" points="45.5,422.0391,35.5,426.0391,45.5,430.0391,41.5,426.0391" style="stroke: #059669; stroke-width: 1.0;"/><line style="stroke: #059669; stroke-width: 1.0; stroke-dasharray: 2.0,2.0;" x1="39.5" x2="164.5" y1="426.0391" y2="426.0391"/><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="79" x="51.5" y="420.9731">201 Created</text><a href="/microservices/svc-notifications/#integration-context" target="_top" title="/microservices/svc-notifications/#integration-context" xlink:actuate="onRequest" xlink:href="/microservices/svc-notifications/#integration-context" xlink:show="new" xlink:title="/microservices/svc-notifications/#integration-context" xlink:type="simple"><text fill="#0000FF" font-family="Segoe UI" font-size="10" lengthAdjust="spacingAndGlyphs" text-decoration="underline" textLength="188" x="275" y="12.2822">⬆ svc-notifications Integration Context</text></a><!--MD5=[182380b3f166cd7c835e9b8dd0514a08]
@startuml svc-notifications- -post-templates

skinparam backgroundColor #FEFEFE
skinparam shadowing false
skinparam defaultFontName "Segoe UI"
skinparam sequence {
    ArrowColor #059669
    ParticipantBorderColor #374151
    ParticipantBackgroundColor #F9FAFB
    LifeLineBorderColor #6B7280
    BoxBorderColor #94A3B8
    BoxBackgroundColor #F8FAFC
    NoteBorderColor #64748B
    NoteBackgroundColor #F8FAFC
}

header [[/microservices/svc-notifications/#integration-context ⬆ svc-notifications Integration Context]]

title POST /templates\nCreate a notification template

participant "Client" as Client [[/applications/]]
participant "API Gateway" as GW [[/actors/#api-gateway]] #E0F2FE
participant "svc-notifications" as Svc [[/microservices/svc-notifications/]] #F1F5F9
database "PG + Valkey" as DB [[/microservices/svc-notifications/#data-store]] #FEF9C3

note over Svc
  [[/services/api/svc-notifications.html#/Templates/createTemplate View in Swagger UI]]
end note

Client -> GW : POST /templates
activate GW #059669
GW -> Svc : route request
activate Svc #059669

note right of Svc : Validate request body

== Database ==

Svc -> DB : INSERT INTO ...
activate DB #FEF9C3
DB - -> Svc : Created row
deactivate DB

Svc - -> GW : 201 Created
deactivate Svc
GW - -> Client : 201 Created
deactivate GW

@enduml

