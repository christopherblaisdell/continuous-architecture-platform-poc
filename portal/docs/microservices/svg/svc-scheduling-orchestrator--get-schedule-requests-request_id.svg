6" x="51.5" y="420.9731">200 OK</text><a href="/microservices/svc-scheduling-orchestrator/#integration-context" target="_top" title="/microservices/svc-scheduling-orchestrator/#integration-context" xlink:actuate="onRequest" xlink:href="/microservices/svc-scheduling-orchestrator/#integration-context" xlink:show="new" xlink:title="/microservices/svc-scheduling-orchestrator/#integration-context" xlink:type="simple"><text fill="#0000FF" font-family="Segoe UI" font-size="10" lengthAdjust="spacingAndGlyphs" text-decoration="underline" textLength="244" x="582" y="12.2822">⬆ svc-scheduling-orchestrator Integration Context</text></a><!--MD5=[47e7f534839e26b9d20ac7decadbabed]
@startuml svc-scheduling-orchestrator- -get-schedule-requests-request_id

skinparam backgroundColor #FEFEFE
skinparam shadowing false
skinparam defaultFontName "Segoe UI"
skinparam sequence {
    ArrowColor #2563eb
    ParticipantBorderColor #374151
    ParticipantBackgroundColor #F9FAFB
    LifeLineBorderColor #6B7280
    BoxBorderColor #94A3B8
    BoxBackgroundColor #F8FAFC
    NoteBorderColor #64748B
    NoteBackgroundColor #F8FAFC
}

header [[/microservices/svc-scheduling-orchestrator/#integration-context ⬆ svc-scheduling-orchestrator Integration Context]]

title GET /schedule-requests/{request_id}\nGet schedule request status and result

participant "Client" as Client [[/applications/]]
participant "API Gateway" as GW [[/actors/#api-gateway]] #E0F2FE
participant "svc-scheduling-orchestrator" as Svc [[/microservices/svc-scheduling-orchestrator/]] #DBEAFE
database "PG + Valkey" as DB [[/microservices/svc-scheduling-orchestrator/#data-store]] #FEF9C3

note over Svc
  [[/services/api/svc-scheduling-orchestrator.html View in Swagger UI]]
end note

Client -> GW : GET /schedule-requests/{request_id}
activate GW #2563eb
GW -> Svc : route request
activate Svc #2563eb

== Database ==

Svc -> DB : SELECT ... WHERE id = ?
activate DB #FEF9C3
DB - -> Svc : Row
deactivate DB
note right of DB : Returns 404 if not found

Svc - -> GW : 200 OK
deactivate Svc
GW - -> Client : 200 OK
deactivate GW

@enduml

