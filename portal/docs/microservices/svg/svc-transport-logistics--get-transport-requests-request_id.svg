ogistics/#integration-context" target="_top" title="/microservices/svc-transport-logistics/#integration-context" xlink:actuate="onRequest" xlink:href="/microservices/svc-transport-logistics/#integration-context" xlink:show="new" xlink:title="/microservices/svc-transport-logistics/#integration-context" xlink:type="simple"><text fill="#0000FF" font-family="Segoe UI" font-size="10" lengthAdjust="spacingAndGlyphs" text-decoration="underline" textLength="216" x="591" y="12.2822">⬆ svc-transport-logistics Integration Context</text></a><!--MD5=[10e5d739fa27676712645f644210c09f]
@startuml svc-transport-logistics- -get-transport-requests-request_id

skinparam backgroundColor #FEFEFE
skinparam shadowing false
skinparam defaultFontName "Segoe UI"
skinparam sequence {
    ArrowColor #2563eb
    ParticipantBorderColor #374151
    ParticipantBackgroundColor #F9FAFB
    LifeLineBorderColor #6B7280
    BoxBorderColor #94A3B8
    BoxBackgroundColor #F8FAFC
    NoteBorderColor #64748B
    NoteBackgroundColor #F8FAFC
}

header [[/microservices/svc-transport-logistics/#integration-context ⬆ svc-transport-logistics Integration Context]]

title GET /transport-requests/{request_id}\nGet transport request details

participant "Client" as Client [[/applications/]]
participant "API Gateway" as GW [[/actors/#api-gateway]] #E0F2FE
participant "svc-transport-logistics" as Svc [[/microservices/svc-transport-logistics/]] #CFFAFE
database "PostgreSQL" as DB [[/microservices/svc-transport-logistics/#data-store]] #FEF9C3

note over Svc
  [[/services/api/svc-transport-logistics.html View in Swagger UI]]
end note

Client -> GW : GET /transport-requests/{request_id}
activate GW #2563eb
GW -> Svc : route request
activate Svc #2563eb

== Database ==

Svc -> DB : SELECT ... WHERE id = ?
activate DB #FEF9C3
DB - -> Svc : Row
deactivate DB
note right of DB : Returns 404 if not found

Svc - -> GW : 200 OK
deactivate Svc
GW - -> Client : 200 OK
deactivate GW

@enduml

