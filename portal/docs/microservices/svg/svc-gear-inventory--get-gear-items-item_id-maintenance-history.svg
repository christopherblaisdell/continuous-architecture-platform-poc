">⬆ svc-gear-inventory Integration Context</text></a><!--MD5=[d3bcb1603865b75e4849285af67e7c89]
@startuml svc-gear-inventory- -get-gear-items-item_id-maintenance-history

skinparam backgroundColor #FEFEFE
skinparam shadowing false
skinparam defaultFontName "Segoe UI"
skinparam sequence {
    ArrowColor #2563eb
    ParticipantBorderColor #374151
    ParticipantBackgroundColor #F9FAFB
    LifeLineBorderColor #6B7280
    BoxBorderColor #94A3B8
    BoxBackgroundColor #F8FAFC
    NoteBorderColor #64748B
    NoteBackgroundColor #F8FAFC
}

header [[/microservices/svc-gear-inventory/#integration-context ⬆ svc-gear-inventory Integration Context]]

title GET /gear-items/{item_id}/maintenance-history\nGet maintenance history

participant "Client" as Client [[/applications/]]
participant "API Gateway" as GW [[/actors/#api-gateway]] #E0F2FE
participant "svc-gear-inventory" as Svc [[/microservices/svc-gear-inventory/]] #CFFAFE
database "PostgreSQL" as DB [[/microservices/svc-gear-inventory/#data-store]] #FEF9C3

note over Svc
  [[/services/api/svc-gear-inventory.html#/Maintenance/getMaintenanceHistory View in Swagger UI]]
end note

Client -> GW : GET /gear-items/{item_id}/maintenance-history
activate GW #2563eb
GW -> Svc : route request
activate Svc #2563eb

== Database ==

Svc -> DB : SELECT ... WHERE parent_id = ?
activate DB #FEF9C3
DB - -> Svc : ResultSet
deactivate DB

Svc - -> GW : 200 OK
deactivate Svc
GW - -> Client : 200 OK
deactivate GW

@enduml

