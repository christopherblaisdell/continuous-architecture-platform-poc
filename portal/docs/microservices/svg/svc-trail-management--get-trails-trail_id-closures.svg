B; stroke-width: 1.0;" x1="387" x2="603" y1="303.5078" y2="303.5078"/><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="203" x="394" y="298.4419">SELECT ... WHERE parent_id = ?</text><polygon fill="#2563EB" points="398,328.6406,388,332.6406,398,336.6406,394,332.6406" style="stroke: #2563EB; stroke-width: 1.0;"/><line style="stroke: #2563EB; stroke-width: 1.0; stroke-dasharray: 2.0,2.0;" x1="392" x2="613" y1="332.6406" y2="332.6406"/><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="61" x="404" y="327.5747">ResultSet</text><polygon fill="#2563EB" points="257.5,357.7734,247.5,361.7734,257.5,365.7734,253.5,361.7734" style="stroke: #2563EB; stroke-width: 1.0;"/><line style="stroke: #2563EB; stroke-width: 1.0; stroke-dasharray: 2.0,2.0;" x1="251.5" x2="381" y1="361.7734" y2="361.7734"/><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="46" x="263.5" y="356.7075">200 OK</text><polygon fill="#2563EB" points="45.5,386.9063,35.5,390.9063,45.5,394.9063,41.5,390.9063" style="stroke: #2563EB; stroke-width: 1.0;"/><line style="stroke: #2563EB; stroke-width: 1.0; stroke-dasharray: 2.0,2.0;" x1="39.5" x2="240.5" y1="390.9063" y2="390.9063"/><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="46" x="51.5" y="385.8403">200 OK</text><a href="/microservices/svc-trail-management/#integration-context" target="_top" title="/microservices/svc-trail-management/#integration-context" xlink:actuate="onRequest" xlink:href="/microservices/svc-trail-management/#integration-context" xlink:show="new" xlink:title="/microservices/svc-trail-management/#integration-context" xlink:type="simple"><text fill="#0000FF" font-family="Segoe UI" font-size="10" lengthAdjust="spacingAndGlyphs" text-decoration="underline" textLength="218" x="431" y="12.2822">⬆ svc-trail-management Integration Context</text><