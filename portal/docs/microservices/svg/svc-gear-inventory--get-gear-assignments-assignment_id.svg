"/microservices/svc-gear-inventory/#integration-context" xlink:actuate="onRequest" xlink:href="/microservices/svc-gear-inventory/#integration-context" xlink:show="new" xlink:title="/microservices/svc-gear-inventory/#integration-context" xlink:type="simple"><text fill="#0000FF" font-family="Segoe UI" font-size="10" lengthAdjust="spacingAndGlyphs" text-decoration="underline" textLength="202" x="615" y="12.2822">⬆ svc-gear-inventory Integration Context</text></a><!--MD5=[21dce3dfecfd34d032993878fc8b2b7e]
@startuml svc-gear-inventory- -get-gear-assignments-assignment_id

skinparam backgroundColor #FEFEFE
skinparam shadowing false
skinparam defaultFontName "Segoe UI"
skinparam sequence {
    ArrowColor #2563eb
    ParticipantBorderColor #374151
    ParticipantBackgroundColor #F9FAFB
    LifeLineBorderColor #6B7280
    BoxBorderColor #94A3B8
    BoxBackgroundColor #F8FAFC
    NoteBorderColor #64748B
    NoteBackgroundColor #F8FAFC
}

header [[/microservices/svc-gear-inventory/#integration-context ⬆ svc-gear-inventory Integration Context]]

title GET /gear-assignments/{assignment_id}\nGet gear assignment details

participant "Client" as Client [[/applications/]]
participant "API Gateway" as GW [[/actors/#api-gateway]] #E0F2FE
participant "svc-gear-inventory" as Svc [[/microservices/svc-gear-inventory/]] #CFFAFE
database "PostgreSQL" as DB [[/microservices/svc-gear-inventory/#data-store]] #FEF9C3

note over Svc
  [[/services/api/svc-gear-inventory.html#/Gear%20Assignments/getGearAssignment View in Swagger UI]]
end note

Client -> GW : GET /gear-assignments/{assignment_id}
activate GW #2563eb
GW -> Svc : route request
activate Svc #2563eb

== Database ==

Svc -> DB : SELECT ... WHERE id = ?
activate DB #FEF9C3
DB - -> Svc : Row
deactivate DB
note right of DB : Returns 404 if not found

Svc - -> GW : 200 OK
deactivate Svc
GW - -> Client : 200 OK
deactivate GW

@enduml

