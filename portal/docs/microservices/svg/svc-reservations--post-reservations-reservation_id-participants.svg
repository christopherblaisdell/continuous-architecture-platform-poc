@startuml svc-reservations- -post-reservations-reservation_id-participants

skinparam backgroundColor #FEFEFE
skinparam shadowing false
skinparam defaultFontName "Segoe UI"
skinparam sequence {
    ArrowColor #059669
    ParticipantBorderColor #374151
    ParticipantBackgroundColor #F9FAFB
    LifeLineBorderColor #6B7280
    BoxBorderColor #94A3B8
    BoxBackgroundColor #F8FAFC
    NoteBorderColor #64748B
    NoteBackgroundColor #F8FAFC
}

header [[/microservices/svc-reservations/#integration-context ⬆ svc-reservations Integration Context]]

title POST /reservations/{reservation_id}/participants\nAdd a participant to a reservation

participant "Client" as Client [[/applications/]]
participant "API Gateway" as GW [[/actors/#api-gateway]] #E0F2FE
participant "svc-reservations" as Svc [[/microservices/svc-reservations/]] #D1FAE5
participant "Guest Profiles" as GP [[/microservices/svc-guest-profiles/]] #EDE9FE
database "PostgreSQL" as DB [[/microservices/svc-reservations/#data-store]] #FEF9C3

note over Svc
  [[/services/api/svc-reservations.html#/Reservations/addParticipant View in Swagger UI]]
end note

Client -> GW : POST /reservations/{reservation_id}/participants
activate GW #059669
GW -> Svc : route request
activate Svc #059669

note right of Svc : Validate request body

== Cross-Service Integration ==

Svc -> GP : [[/microservices/svc-guest-profiles/#get-guestsguest_id-get-guest-profile Validate participant]]
activate GP #EDE9FE
GP - -> Svc : OK
deactivate GP

== Database ==

Svc -> DB : SELECT parent WHERE id = ?
activate DB #FEF9C3
DB - -> Svc : Parent row
deactivate DB
note right of DB : 404 if parent not found

Svc -> DB : INSERT INTO ...
activate DB #FEF9C3
DB - -> Svc : Created row
deactivate DB

Svc - -> GW : 201 Created
deactivate Svc
GW - -> Client : 201 Created
deactivate GW

@enduml

