nce/#integration-context" xlink:actuate="onRequest" xlink:href="/microservices/svc-safety-compliance/#integration-context" xlink:show="new" xlink:title="/microservices/svc-safety-compliance/#integration-context" xlink:type="simple"><text fill="#0000FF" font-family="Segoe UI" font-size="10" lengthAdjust="spacingAndGlyphs" text-decoration="underline" textLength="219" x="527" y="12.2822">⬆ svc-safety-compliance Integration Context</text></a><!--MD5=[22674b1d60033b3976dae571abda6559]
@startuml svc-safety-compliance- -get-incidents-incident_id

skinparam backgroundColor #FEFEFE
skinparam shadowing false
skinparam defaultFontName "Segoe UI"
skinparam sequence {
    ArrowColor #2563eb
    ParticipantBorderColor #374151
    ParticipantBackgroundColor #F9FAFB
    LifeLineBorderColor #6B7280
    BoxBorderColor #94A3B8
    BoxBackgroundColor #F8FAFC
    NoteBorderColor #64748B
    NoteBackgroundColor #F8FAFC
}

header [[/microservices/svc-safety-compliance/#integration-context ⬆ svc-safety-compliance Integration Context]]

title GET /incidents/{incident_id}\nGet an incident report

participant "Client" as Client [[/applications/]]
participant "API Gateway" as GW [[/actors/#api-gateway]] #E0F2FE
participant "svc-safety-compliance" as Svc [[/microservices/svc-safety-compliance/]] #FEE2E2
database "PostgreSQL" as DB [[/microservices/svc-safety-compliance/#data-store]] #FEF9C3

note over Svc
  [[/services/api/svc-safety-compliance.html#/Incidents/getIncident View in Swagger UI]]
end note

Client -> GW : GET /incidents/{incident_id}
activate GW #2563eb
GW -> Svc : route request
activate Svc #2563eb

== Database ==

Svc -> DB : SELECT ... WHERE id = ?
activate DB #FEF9C3
DB - -> Svc : Row
deactivate DB
note right of DB : Returns 404 if not found

Svc - -> GW : 200 OK
deactivate Svc
GW - -> Client : 200 OK
deactivate GW

@enduml

