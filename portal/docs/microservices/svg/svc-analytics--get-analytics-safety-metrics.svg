@startuml svc-analytics- -get-analytics-safety-metrics

skinparam backgroundColor #FEFEFE
skinparam shadowing false
skinparam defaultFontName "Segoe UI"
skinparam sequence {
    ArrowColor #2563eb
    ParticipantBorderColor #374151
    ParticipantBackgroundColor #F9FAFB
    LifeLineBorderColor #6B7280
    BoxBorderColor #94A3B8
    BoxBackgroundColor #F8FAFC
    NoteBorderColor #64748B
    NoteBackgroundColor #F8FAFC
}

header [[/microservices/svc-analytics/#integration-context ⬆ svc-analytics Integration Context]]

title GET /analytics/safety-metrics\nGet safety and incident metrics

participant "Client" as Client [[/applications/]]
participant "API Gateway" as GW [[/actors/#api-gateway]] #E0F2FE
participant "svc-analytics" as Svc [[/microservices/svc-analytics/]] #F1F5F9
database "Oracle" as DB [[/microservices/svc-analytics/#data-store]] #FEF9C3

note over Svc
  [[/services/api/svc-analytics.html#/Safety/getSafetyMetrics View in Swagger UI]]
end note

Client -> GW : GET /analytics/safety-metrics
activate GW #2563eb
GW -> Svc : route request
activate Svc #2563eb

== Database ==

Svc -> DB : SELECT ... WHERE filters
activate DB #FEF9C3
DB - -> Svc : Page of results
deactivate DB

Svc - -> GW : 200 OK
deactivate Svc
GW - -> Client : 200 OK
deactivate GW

@enduml

