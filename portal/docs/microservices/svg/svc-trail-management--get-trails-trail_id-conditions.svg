fety thresholds:</text><text fill="#000000" font-family="'Segoe UI'" font-size="13" lengthAdjust="spacing" textLength="181.3018" x="511" y="601.4883">- Wind &gt; 45 mph &#8594; CLOSED</text><text fill="#000000" font-family="'Segoe UI'" font-size="13" lengthAdjust="spacing" textLength="203.7661" x="511" y="616.7988">- Visibility &lt; 0.25 mi &#8594; CLOSED</text><text fill="#000000" font-family="'Segoe UI'" font-size="13" lengthAdjust="spacing" textLength="216.6011" x="511" y="632.1094">- Precipitation HEAVY &#8594; CAUTION</text><text fill="#000000" font-family="'Segoe UI'" font-size="13" lengthAdjust="spacing" textLength="153.6704" x="511" y="647.4199">Return composite status</text><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg7"><polygon fill="#D97706" points="270.2056,723.4043,260.2056,727.4043,270.2056,731.4043,266.2056,727.4043" style="stroke:#D97706;stroke-width:1;"/><line style="stroke:#D97706;stroke-width:1;stroke-dasharray:2,2;" x1="264.2056" x2="494.8501" y1="727.4043" y2="727.4043"/><text fill="#000000" font-family="'Segoe UI'" font-size="13" lengthAdjust="spacing" textLength="47.3599" x="276.2056" y="676.7305">200 OK</text><text fill="#000000" font-family="'Segoe UI'" font-size="13" lengthAdjust="spacing" textLength="98.1094" x="276.2056" y="692.041">(trail_id, status,</text><text fill="#000000" font-family="'Segoe UI'" font-size="13" lengthAdjust="spacing" textLength="207.6445" x="276.2056" y="707.3516">safety_rating, weather_snapshot,</text><text fill="#000000" font-family="'Segoe UI'" font-size="13" lengthAdjust="spacing" textLength="85.0522" x="276.2056" y="722.6621">last_updated)</text></g><g class="message" data-entity-1="part2" data-entity-2="part1" id="msg8"><polygon fill="#D97706" points="42.7524,752.7148,32.7524,756.7148,42.7524,760.7148,38.7524,756.7148" style="stroke:#D97706;stroke-width:1;"/><line style="stroke:#D97706;stroke-width:1;stroke-dasharray:2,2;" x1="36.7524" x2="253.2056" y1="756.7148" y2="756.7148"/><text 