B; stroke-width: 1.0;"/><line style="stroke: #2563EB; stroke-width: 1.0;" x1="399" x2="615" y1="303.5078" y2="303.5078"/><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="203" x="406" y="298.4419">SELECT ... WHERE parent_id = ?</text><polygon fill="#2563EB" points="410,328.6406,400,332.6406,410,336.6406,406,332.6406" style="stroke: #2563EB; stroke-width: 1.0;"/><line style="stroke: #2563EB; stroke-width: 1.0; stroke-dasharray: 2.0,2.0;" x1="404" x2="625" y1="332.6406" y2="332.6406"/><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="61" x="416" y="327.5747">ResultSet</text><polygon fill="#2563EB" points="269.5,357.7734,259.5,361.7734,269.5,365.7734,265.5,361.7734" style="stroke: #2563EB; stroke-width: 1.0;"/><line style="stroke: #2563EB; stroke-width: 1.0; stroke-dasharray: 2.0,2.0;" x1="263.5" x2="393" y1="361.7734" y2="361.7734"/><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="46" x="275.5" y="356.7075">200 OK</text><polygon fill="#2563EB" points="45.5,386.9063,35.5,390.9063,45.5,394.9063,41.5,390.9063" style="stroke: #2563EB; stroke-width: 1.0;"/><line style="stroke: #2563EB; stroke-width: 1.0; stroke-dasharray: 2.0,2.0;" x1="39.5" x2="252.5" y1="390.9063" y2="390.9063"/><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="46" x="51.5" y="385.8403">200 OK</text><a href="/microservices/svc-trail-management/#integration-context" target="_top" title="/microservices/svc-trail-management/#integration-context" xlink:actuate="onRequest" xlink:href="/microservices/svc-trail-management/#integration-context" xlink:show="new" xlink:title="/microservices/svc-trail-management/#integration-context" xlink:type="simple"><text fill="#0000FF" font-family="Segoe UI" font-size="10" lengthAdjust="spacingAndGlyphs" text-decoration="underline" textLength="218" x="443" y="12.2822">⬆ svc-trail-management Integration Context</text></a><!--MD5=[b5f6f45cc1691d36e47914be0997e00a]
@startuml svc-trail-management- -get-trails-trail_id-conditions

skinparam backgroundColor #FEFEFE
skinparam shadowing false
skinparam defaultFontName "Segoe UI"
skinparam sequence {
    ArrowColor #2563eb
    ParticipantBorderColor #374151
    ParticipantBackgroundColor #F9FAFB
    LifeLineBorderColor #6B7280
    BoxBorderColor #94A3B8
    BoxBackgroundColor #F8FAFC
    NoteBorderColor #64748B
    NoteBackgroundColor #F8FAFC
}

header [[/microservices/svc-trail-management/#integration-context ⬆ svc-trail-management Integration Context]]

title GET /trails/{trail_id}/conditions\nGet current trail conditions

participant "Client" as Client [[/applications/]]
participant "API Gateway" as GW [[/actors/#api-gateway]] #E0F2FE
participant "svc-trail-management" as Svc [[/microservices/svc-trail-management/]] #FEF3C7
database "PostGIS" as DB [[/microservices/svc-trail-management/#data-store]] #FEF9C3

note over Svc
  [[/services/api/svc-trail-management.html#/Conditions/getTrailCurrentConditions View in Swagger UI]]
end note

Client -> GW : GET /trails/{trail_id}/conditions
activate GW #2563eb
GW -> Svc : route request
activate Svc #2563eb

== Database ==

Svc -> DB : SELECT ... WHERE parent_id = ?
activate DB #FEF9C3
DB - -> Svc : ResultSet
deactivate DB

Svc - -> GW : 200 OK
deactivate Svc
GW - -> Client : 200 OK
deactivate GW

@enduml

