06,247.2056,212.6406,237.2056,216.6406,241.2056,212.6406" style="stroke:#D97706;stroke-width:1;"/><line style="stroke:#D97706;stroke-width:1;" x1="31.7524" x2="243.2056" y1="212.6406" y2="212.6406"/><text fill="#000000" font-family="'Segoe UI'" font-size="13" lengthAdjust="spacing" textLength="198.4531" x="38.7524" y="207.8984">GET /trails/{trail_id}/conditions</text></g><g class="message" data-entity-1="part2" data-entity-2="part3" id="msg2"><polygon fill="#D97706" points="478.8501,237.9512,488.8501,241.9512,478.8501,245.9512,482.8501,241.9512" style="stroke:#D97706;stroke-width:1;"/><line style="stroke:#D97706;stroke-width:1;" x1="259.2056" x2="484.8501" y1="241.9512" y2="241.9512"/><text fill="#000000" font-family="'Segoe UI'" font-size="13" lengthAdjust="spacing" textLength="85.1348" x="266.2056" y="237.209">route request</text></g><g class="message" data-entity-1="part3" data-entity-2="part5" id="msg3"><polygon fill="#D97706" points="765.7822,313.1934,775.7822,317.1934,765.7822,321.1934,769.7822,317.1934" style="stroke:#D97706;stroke-width:1;"/><line style="stroke:#D97706;stroke-width:1;" x1="500.8501" x2="771.7822" y1="317.1934" y2="317.1934"/><text fill="#000000" font-family="'Segoe UI'" font-size="13" lengthAdjust="spacing" textLength="197.6597" x="507.8501" y="266.5195">SELECT * FROM trail_conditions</text><text fill="#000000" font-family="'Segoe UI'" font-size="13" lengthAdjust="spacing" textLength="114.4609" x="507.8501" y="281.8301">WHERE trail_id = ?</text><text fill="#000000" font-family="'Segoe UI'" font-size="13" lengthAdjust="spacing" textLength="176.8965" x="507.8501" y="297.1406">ORDER BY reported_at DESC</text><text fill="#000000" font-family="'Segoe UI'" font-size="13" lengthAdjust="spacing" textLength="46.1729" x="507.8501" y="312.4512">LIMIT 1</text></g><g class="message" data-entity-1="part5" data-entity-2="part3" id="msg4"><polygon fill="#D97706" points="511.8501,373.125,501.8501,377.125,511.8501,381.125,507.8501,377.125" style="stroke:#D97706;stroke-width:1;"/><line style="stroke:#D97706;stroke-width:1;stroke-dasharray:2,2;" x1="505.8501" x2="781.7822" y1="377.125" y2="377.125"/><text fill="#000000" font-family="'Segoe UI'" font-size="13" lengthAdjust="spacing" textLength="144.168" x="517.8501" y="341.7617">Latest condition report</text><text fill="#000000" font-family="'Segoe UI'" font-size="13" lengthAdjust="spacing" textLength="136.0684" x="517.8501" y="357.0723">(status, safety_rating,</text><text fill="#000000" font-family="'Segoe UI'" font-size="13" lengthAdjust="spacing" textLength="106.0313" x="517.8501" y="372.3828">last_reported_at)</text></g><rect fill="#EEEEEE" height="3" rx="4" ry="4" style="stroke:#EEEEEE;stroke-width:1;" width="815.9829" x="0" y="405.7803"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="815.9829" y1="405.7803" y2="405.7803"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="815.9829" y1="408.7803" y2="408.7803"/><rect fill="#EEEEEE" height="23.3105" rx="4" ry="4" style="stroke:#000000;stroke-width:2;" width="184.2822" x="315.8503" y="395.125"/><text fill="#000000" font-family="'Segoe UI'" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="165.9976" x="321.8503" y="411.6934">Live Weather Enrichment</text><g class="message" data-entity-1="part3" data-entity-2="part4" id="msg5"><polygon fill="#D97706" points="679.9077,461.0566,689.9077,465.0566,679.9077,469.0566,683.9077,465.0566" style="stroke:#D97706;stroke-width:1;"/><line style="stroke:#D97706;stroke-width:1;" x1="500.8501" x2="685.9077" y1="465.0566" y2="465.0566"/><a href="/microservices/svc-weather/#get-weathercurrent-get-current-weather-conditions" target="_top" title="/microservices/svc-weather/#get-weathercurrent-get-current-weather-conditions" xlink:actuate="onRequest" xlink:href="/microservices/svc-weather/#get-weathercurrent-get-current-weather-conditions" xlink:show="new" xlink:title="/microservices/svc-weather/#get-weathercurrent-get-current-weather-conditions" xlink:type="si