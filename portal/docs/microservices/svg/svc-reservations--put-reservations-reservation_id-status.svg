 UI" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="46" x="51.5" y="615.77">200 OK</text><a href="/microservices/svc-reservations/#integration-context" target="_top" title="/microservices/svc-reservations/#integration-context" xlink:actuate="onRequest" xlink:href="/microservices/svc-reservations/#integration-context" xlink:show="new" xlink:title="/microservices/svc-reservations/#integration-context" xlink:type="simple"><text fill="#0000FF" font-family="Segoe UI" font-size="10" lengthAdjust="spacingAndGlyphs" text-decoration="underline" textLength="190" x="702.5" y="12.2822">⬆ svc-reservations Integration Context</text></a><!--MD5=[dde71d9fe79687fc875767a72e82399f]
@startuml svc-reservations- -put-reservations-reservation_id-status

skinparam backgroundColor #FEFEFE
skinparam shadowing false
skinparam defaultFontName "Segoe UI"
skinparam sequence {
    ArrowColor #c77b30
    ParticipantBorderColor #374151
    ParticipantBackgroundColor #F9FAFB
    LifeLineBorderColor #6B7280
    BoxBorderColor #94A3B8
    BoxBackgroundColor #F8FAFC
    NoteBorderColor #64748B
    NoteBackgroundColor #F8FAFC
}

header [[/microservices/svc-reservations/#integration-context ⬆ svc-reservations Integration Context]]

title PUT /reservations/{reservation_id}/status\nTransition reservation status

participant "Client" as Client [[/applications/]]
participant "API Gateway" as GW [[/actors/#api-gateway]] #E0F2FE
participant "svc-reservations" as Svc [[/microservices/svc-reservations/]] #D1FAE5
queue "Kafka" as Kafka [[/actors/#event-bus]] #F5F3FF
participant "Notifications" as Ntfy [[/microservices/svc-notifications/]] #F1F5F9
database "PostgreSQL" as DB [[/microservices/svc-reservations/#data-store]] #FEF9C3

note over Svc
  [[/services/api/svc-reservations.html#/Reservation%20Status/transitionStatus View in Swagger UI]]
end note

Client -> GW : PUT /reservations/{reservation_id}/status
activate GW #c77b30
GW -> Svc : route request
activate Svc #c77b30

note right of Svc : Validate request body

== Database ==

Svc -> DB : SELECT ... FOR UPDATE
activate DB #FEF9C3
DB - -> Svc : Current row
deactivate DB
note right of Svc : Replace mutable fields

Svc -> DB : UPDATE ... SET ...
activate DB #FEF9C3
DB - -> Svc : Updated row
deactivate DB

== Async Events ==

Svc ->> Kafka : [[/events/#reservationstatus_changed reservation.status_changed]]
Svc ->> Ntfy : [[/microservices/svc-notifications/#post-notifications-send-a-notification Send status update]]

Svc - -> GW : 200 OK
deactivate Svc
GW - -> Client : 200 OK
deactivate GW

@enduml

