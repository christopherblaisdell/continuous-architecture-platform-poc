: 2.0,2.0;" x1="448.5" x2="660.5" y1="426.0391" y2="426.0391"/><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="18" x="460.5" y="420.9731">OK</text><polygon fill="#DC2626" points="319.5,451.1719,309.5,455.1719,319.5,459.1719,315.5,455.1719" style="stroke: #DC2626; stroke-width: 1.0;"/><line style="stroke: #DC2626; stroke-width: 1.0; stroke-dasharray: 2.0,2.0;" x1="313.5" x2="437.5" y1="455.1719" y2="455.1719"/><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="101" x="325.5" y="450.106">204 No Content</text><polygon fill="#DC2626" points="45.5,480.3047,35.5,484.3047,45.5,488.3047,41.5,484.3047" style="stroke: #DC2626; stroke-width: 1.0;"/><line style="stroke: #DC2626; stroke-width: 1.0; stroke-dasharray: 2.0,2.0;" x1="39.5" x2="302.5" y1="484.3047" y2="484.3047"/><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="101" x="51.5" y="479.2388">204 No Content</text><a href="/microservices/svc-reservations/#integration-context" target="_top" title="/microservices/svc-reservations/#integration-context" xlink:actuate="onRequest" xlink:href="/microservices/svc-reservations/#integration-context" xlink:show="new" xlink:title="/microservices/svc-reservations/#integration-context" xlink:type="simple"><text fill="#0000FF" font-family="Segoe UI" font-size="10" lengthAdjust="spacingAndGlyphs" text-decoration="underline" textLength="190" x="655" y="12.2822">⬆ svc-reservations Integration Context</text></a><!--MD5=[6fc4449c1a5ef1797d32071d7b4670a1]
@startuml svc-reservations- -delete-reservations-reservation_id

skinparam backgroundColor #FEFEFE
skinparam shadowing false
skinparam defaultFontName "Segoe UI"
skinparam sequence {
    ArrowColor #dc2626
    ParticipantBorderColor #374151
    ParticipantBackgroundColor #F9FAFB
    LifeLineBorderColor #6B7280
    BoxBorderColor #94A3B8
    BoxBackgroundColor #F8FAFC
    NoteBorderColor #64748B
    NoteBackgroundColor #F8FAFC
}

header [[/microservices/svc-reservations/#integration-context ⬆ svc-reservations Integration Context]]

title DELETE /reservations/{reservation_id}\nCancel a reservation

participant "Client" as Client [[/applications/]]
participant "API Gateway" as GW [[/actors/#api-gateway]] #E0F2FE
participant "svc-reservations" as Svc [[/microservices/svc-reservations/]] #D1FAE5
database "PostgreSQL" as DB [[/microservices/svc-reservations/#data-store]] #FEF9C3

note over Svc
  [[/services/api/svc-reservations.html#/Reservations/cancelReservation View in Swagger UI]]
end note

Client -> GW : DELETE /reservations/{reservation_id}
activate GW #dc2626
GW -> Svc : route request
activate Svc #dc2626

== Database ==

Svc -> DB : SELECT ... WHERE id = ?
activate DB #FEF9C3
DB - -> Svc : Row
deactivate DB
note right of DB : Returns 404 if not found

Svc -> DB : DELETE FROM ... WHERE id = ?
activate DB #FEF9C3
DB - -> Svc : OK
deactivate DB

Svc - -> GW : 204 No Content
deactivate Svc
GW - -> Client : 204 No Content
deactivate GW

@enduml

