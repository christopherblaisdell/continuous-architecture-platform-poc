@startuml svc-loyalty-rewards- -get-tiers

skinparam backgroundColor #FEFEFE
skinparam shadowing false
skinparam defaultFontName "Segoe UI"
skinparam sequence {
    ArrowColor #2563eb
    ParticipantBorderColor #374151
    ParticipantBackgroundColor #F9FAFB
    LifeLineBorderColor #6B7280
    BoxBorderColor #94A3B8
    BoxBackgroundColor #F8FAFC
    NoteBorderColor #64748B
    NoteBackgroundColor #F8FAFC
}

header [[/microservices/svc-loyalty-rewards/#integration-context ⬆ svc-loyalty-rewards Integration Context]]

title GET /tiers\nList all loyalty tiers and their thresholds

participant "Client" as Client [[/applications/]]
participant "API Gateway" as GW [[/actors/#api-gateway]] #E0F2FE
participant "svc-loyalty-rewards" as Svc [[/microservices/svc-loyalty-rewards/]] #F1F5F9
database "Couchbase" as DB [[/microservices/svc-loyalty-rewards/#data-store]] #FEF9C3

note over Svc
  [[/services/api/svc-loyalty-rewards.html#/Tiers/listTiers View in Swagger UI]]
end note

Client -> GW : GET /tiers
activate GW #2563eb
GW -> Svc : route request
activate Svc #2563eb

== Database ==

Svc -> DB : N1QL: SELECT WHERE filters
activate DB #FEF9C3
DB - -> Svc : Document set
deactivate DB

Svc - -> GW : 200 OK
deactivate Svc
GW - -> Client : 200 OK
deactivate GW

@enduml

