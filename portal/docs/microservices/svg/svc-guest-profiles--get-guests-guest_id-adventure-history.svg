@startuml svc-guest-profiles- -get-guests-guest_id-adventure-history

skinparam backgroundColor #FEFEFE
skinparam shadowing false
skinparam defaultFontName "Segoe UI"
skinparam sequence {
    ArrowColor #2563eb
    ParticipantBorderColor #374151
    ParticipantBackgroundColor #F9FAFB
    LifeLineBorderColor #6B7280
    BoxBorderColor #94A3B8
    BoxBackgroundColor #F8FAFC
    NoteBorderColor #64748B
    NoteBackgroundColor #F8FAFC
}

header [[/microservices/svc-guest-profiles/#integration-context ⬆ svc-guest-profiles Integration Context]]

title GET /guests/{guest_id}/adventure-history\nGet guest adventure history

participant "Client" as Client [[/applications/]]
participant "API Gateway" as GW [[/actors/#api-gateway]] #E0F2FE
participant "svc-guest-profiles" as Svc [[/microservices/svc-guest-profiles/]] #EDE9FE
participant "Reservations" as Res [[/microservices/svc-reservations/]] #D1FAE5
participant "Analytics" as AN [[/microservices/svc-analytics/]] #F1F5F9
database "PostgreSQL" as DB [[/microservices/svc-guest-profiles/#data-store]] #FEF9C3

note over Svc
  [[/services/api/svc-guest-profiles.html#/History/getGuestAdventureHistory View in Swagger UI]]
end note

Client -> GW : GET /guests/{guest_id}/adventure-history
activate GW #2563eb
GW -> Svc : route request
activate Svc #2563eb

== Cross-Service Integration ==

Svc -> Res : [[/microservices/svc-reservations/#get-reservations-search-reservations Query past bookings]]
activate Res #D1FAE5
Res - -> Svc : OK
deactivate Res

Svc -> AN : [[/microservices/svc-analytics/ Get satisfaction scores]]
activate AN #F1F5F9
AN - -> Svc : OK
deactivate AN

== Database ==

Svc -> DB : SELECT ... WHERE parent_id = ?
activate DB #FEF9C3
DB - -> Svc : ResultSet
deactivate DB

Svc - -> GW : 200 OK
deactivate Svc
GW - -> Client : 200 OK
deactivate GW

@enduml

