" xlink:show="new" xlink:title="/microservices/svc-trip-catalog/#integration-context" xlink:type="simple"><text fill="#0000FF" font-family="Segoe UI" font-size="10" lengthAdjust="spacingAndGlyphs" text-decoration="underline" textLength="185" x="479" y="12.2822">⬆ svc-trip-catalog Integration Context</text></a><!--MD5=[c1399659c1583d8c10dc8c990043576f]
@startuml svc-trip-catalog- -get-trips-trip_id

skinparam backgroundColor #FEFEFE
skinparam shadowing false
skinparam defaultFontName "Segoe UI"
skinparam sequence {
    ArrowColor #2563eb
    ParticipantBorderColor #374151
    ParticipantBackgroundColor #F9FAFB
    LifeLineBorderColor #6B7280
    BoxBorderColor #94A3B8
    BoxBackgroundColor #F8FAFC
    NoteBorderColor #64748B
    NoteBackgroundColor #F8FAFC
}

header [[/microservices/svc-trip-catalog/#integration-context ⬆ svc-trip-catalog Integration Context]]

title GET /trips/{trip_id}\nGet trip details

participant "Client" as Client [[/applications/]]
participant "API Gateway" as GW [[/actors/#api-gateway]] #E0F2FE
participant "svc-trip-catalog" as Svc [[/microservices/svc-trip-catalog/]] #FEF3C7
database "PostgreSQL" as DB [[/microservices/svc-trip-catalog/#data-store]] #FEF9C3

note over Svc
  [[/services/api/svc-trip-catalog.html#/Trips/getTripById View in Swagger UI]]
end note

Client -> GW : GET /trips/{trip_id}
activate GW #2563eb
GW -> Svc : route request
activate Svc #2563eb

== Database ==

Svc -> DB : SELECT ... WHERE id = ?
activate DB #FEF9C3
DB - -> Svc : Row
deactivate DB
note right of DB : Returns 404 if not found

Svc - -> GW : 200 OK
deactivate Svc
GW - -> Client : 200 OK
deactivate GW

@enduml

