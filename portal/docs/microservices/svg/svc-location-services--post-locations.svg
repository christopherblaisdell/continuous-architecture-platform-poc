 x="179.5" y="493.2388">201 Created</text><polygon fill="#059669" points="45.5,523.4375,35.5,527.4375,45.5,531.4375,41.5,527.4375" style="stroke: #059669; stroke-width: 1.0;"/><line style="stroke: #059669; stroke-width: 1.0; stroke-dasharray: 2.0,2.0;" x1="39.5" x2="156.5" y1="527.4375" y2="527.4375"/><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="79" x="51.5" y="522.3716">201 Created</text><a href="/microservices/svc-location-services/#integration-context" target="_top" title="/microservices/svc-location-services/#integration-context" xlink:actuate="onRequest" xlink:href="/microservices/svc-location-services/#integration-context" xlink:show="new" xlink:title="/microservices/svc-location-services/#integration-context" xlink:type="simple"><text fill="#0000FF" font-family="Segoe UI" font-size="10" lengthAdjust="spacingAndGlyphs" text-decoration="underline" textLength="210" x="414.5" y="12.2822">⬆ svc-location-services Integration Context</text></a><!--MD5=[8c757e272f4312d10b2e7e53c38ab7b4]
@startuml svc-location-services- -post-locations

skinparam backgroundColor #FEFEFE
skinparam shadowing false
skinparam defaultFontName "Segoe UI"
skinparam sequence {
    ArrowColor #059669
    ParticipantBorderColor #374151
    ParticipantBackgroundColor #F9FAFB
    LifeLineBorderColor #6B7280
    BoxBorderColor #94A3B8
    BoxBackgroundColor #F8FAFC
    NoteBorderColor #64748B
    NoteBackgroundColor #F8FAFC
}

header [[/microservices/svc-location-services/#integration-context ⬆ svc-location-services Integration Context]]

title POST /locations\nCreate a new location

participant "Client" as Client [[/applications/]]
participant "API Gateway" as GW [[/actors/#api-gateway]] #E0F2FE
participant "svc-location-services" as Svc [[/microservices/svc-location-services/]] #F1F5F9
participant "Google Maps Platform" as ExtMap [[/actors/#google-maps-platform]] #F3F4F6
database "PostGIS" as DB [[/microservices/svc-location-services/#data-store]] #FEF9C3

note over Svc
  [[/services/api/svc-location-services.html View in Swagger UI]]
end note

Client -> GW : POST /locations
activate GW #059669
GW -> Svc : route request
activate Svc #059669

note right of Svc : Validate request body

== Cross-Service Integration ==

Svc -> ExtMap : Geocode address
activate ExtMap #F3F4F6
ExtMap - -> Svc : OK
deactivate ExtMap

== Database ==

Svc -> DB : INSERT INTO ...
activate DB #FEF9C3
DB - -> Svc : Created row
deactivate DB

Svc - -> GW : 201 Created
deactivate Svc
GW - -> Client : 201 Created
deactivate GW

@enduml

