@startuml svc-guide-management- -post-guides-guide_id-certifications

skinparam backgroundColor #FEFEFE
skinparam shadowing false
skinparam defaultFontName "Segoe UI"
skinparam sequence {
    ArrowColor #059669
    ParticipantBorderColor #374151
    ParticipantBackgroundColor #F9FAFB
    LifeLineBorderColor #6B7280
    BoxBorderColor #94A3B8
    BoxBackgroundColor #F8FAFC
    NoteBorderColor #64748B
    NoteBackgroundColor #F8FAFC
}

header [[/microservices/svc-guide-management/#integration-context ⬆ svc-guide-management Integration Context]]

title POST /guides/{guide_id}/certifications\nAdd a certification to a guide

participant "Client" as Client [[/applications/]]
participant "API Gateway" as GW [[/actors/#api-gateway]] #E0F2FE
participant "svc-guide-management" as Svc [[/microservices/svc-guide-management/]] #E0E7FF
database "PostgreSQL" as DB [[/microservices/svc-guide-management/#data-store]] #FEF9C3

note over Svc
  [[/services/api/svc-guide-management.html#/Certifications/addGuideCertification View in Swagger UI]]
end note

Client -> GW : POST /guides/{guide_id}/certifications
activate GW #059669
GW -> Svc : route request
activate Svc #059669

note right of Svc : Validate request body

== Database ==

Svc -> DB : SELECT parent WHERE id = ?
activate DB #FEF9C3
DB - -> Svc : Parent row
deactivate DB
note right of DB : 404 if parent not found

Svc -> DB : INSERT INTO ...
activate DB #FEF9C3
DB - -> Svc : Created row
deactivate DB

Svc - -> GW : 201 Created
deactivate Svc
GW - -> Client : 201 Created
deactivate GW

@enduml

