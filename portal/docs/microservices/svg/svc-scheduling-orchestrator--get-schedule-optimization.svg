Rest period minimums (8h)</text><text fill="#000000" font-family="'Segoe UI'" font-size="13" lengthAdjust="spacing" textLength="158.939" x="428" y="815.2832">3. Apply soft constraints:</text><text fill="#000000" font-family="'Segoe UI'" font-size="13" lengthAdjust="spacing" textLength="187.6875" x="440.3398" y="830.5938">- Guest language preferences</text><text fill="#000000" font-family="'Segoe UI'" font-size="13" lengthAdjust="spacing" textLength="144.6631" x="440.3398" y="845.9043">- Guide trail familiarity</text><text fill="#000000" font-family="'Segoe UI'" font-size="13" lengthAdjust="spacing" textLength="181.9746" x="428" y="861.2148">4. Select optimal assignment</text><path d="M416,880.957 L474.1387,880.957 L474.1387,888.2676 L464.1387,898.2676 L412,898.2676 L412,884.957 A4,4 0 0 1 416,880.957" fill="#EEEEEE" style="stroke:#000000;stroke-width:1.5;"/><rect fill="none" height="148.8184" rx="4" ry="4" style="stroke:#000000;stroke-width:1.5;" width="239.0088" x="412" y="880.957"/><text fill="#000000" font-family="'Segoe UI'" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="17.1387" x="427" y="894.5254">alt</text><text fill="#000000" font-family="'Segoe UI'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="141.394" x="489.1387" y="893.5918">[Feasible solution found]</text><path d="M422,907.2676 L422,939.2676 A4,4 0 0 0 426,943.2676 L625,943.2676 A4,4 0 0 0 629,939.2676 L629,913.2676 L619,903.2676 L426,903.2676 A4,4 0 0 0 422,907.2676" fill="#D1FAE5" style="stroke:#181818;stroke-width:0.5;"/><path d="M619,903.2676 L619,911.2676 A2,2 0 0 0 621,913.2676 L629,913.2676 L619,903.2676" fill="#D1FAE5" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="'Segoe UI'" font-size="13" lengthAdjust="spacing" textLength="186.9702" x="428" y="920.8359">Apply optimized assignments</text><text fill="#000000" font-family="'Segoe UI'" font-size="13" lengthAdjust="spacing" textLength="72.8076" x="428" y="936.1465">to sche