;" x1="364" x2="531" y1="303.5078" y2="303.5078"/><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="154" x="371" y="298.4419">SELECT ... WHERE id = ?</text><polygon fill="#2563EB" points="375,328.6406,365,332.6406,375,336.6406,371,332.6406" style="stroke: #2563EB; stroke-width: 1.0;"/><line style="stroke: #2563EB; stroke-width: 1.0; stroke-dasharray: 2.0,2.0;" x1="369" x2="541" y1="332.6406" y2="332.6406"/><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="25" x="381" y="327.5747">Row</text><path d="M547,345.6406 L547,370.6406 L721,370.6406 L721,355.6406 L711,345.6406 L547,345.6406 " fill="#FBFB77" style="stroke: #A80036; stroke-width: 1.0;"/><path d="M711,345.6406 L711,355.6406 L721,355.6406 L711,345.6406 " fill="#FBFB77" style="stroke: #A80036; stroke-width: 1.0;"/><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="153" x="553" y="362.7075">Returns 404 if not found</text><polygon fill="#2563EB" points="232.5,392.9063,222.5,396.9063,232.5,400.9063,228.5,396.9063" style="stroke: #2563EB; stroke-width: 1.0;"/><line style="stroke: #2563EB; stroke-width: 1.0; stroke-dasharray: 2.0,2.0;" x1="226.5" x2="358" y1="396.9063" y2="396.9063"/><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="46" x="238.5" y="391.8403">200 OK</text><polygon fill="#2563EB" points="45.5,422.0391,35.5,426.0391,45.5,430.0391,41.5,426.0391" style="stroke: #2563EB; stroke-width: 1.0;"/><line style="stroke: #2563EB; stroke-width: 1.0; stroke-dasharray: 2.0,2.0;" x1="39.5" x2="215.5" y1="426.0391" y2="426.0391"/><text fill="#000000" font-family="Segoe UI" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="46" x="51.5" y="420.9731">200 OK</text><a href="/microservices/svc-safety-compliance/#integration-context" target="_top" title="/microservices/svc-safety-compliance/#integration-context" xlink:actuate="onRequest" xlink:href="/microservices/svc-safety-compliance/#integration-context" xlink:show="new" xlink:title="/microservices/svc-safety-compliance/#integration-context" xlink:type="simple"><text fill="#0000FF" font-family="Segoe UI" font-size="10" lengthAdjust="spacingAndGlyphs" text-decoration="underline" textLength="219" x="507" y="12.2822">⬆ svc-safety-compliance Integration Context</text></a><!--MD5=[f01e1752f4274639d2db2e38869072f7]
@startuml svc-safety-compliance- -get-waivers-waiver_id

skinparam backgroundColor #FEFEFE
skinparam shadowing false
skinparam defaultFontName "Segoe UI"
skinparam sequence {
    ArrowColor #2563eb
    ParticipantBorderColor #374151
    ParticipantBackgroundColor #F9FAFB
    LifeLineBorderColor #6B7280
    BoxBorderColor #94A3B8
    BoxBackgroundColor #F8FAFC
    NoteBorderColor #64748B
    NoteBackgroundColor #F8FAFC
}

header [[/microservices/svc-safety-compliance/#integration-context ⬆ svc-safety-compliance Integration Context]]

title GET /waivers/{waiver_id}\nGet a specific waiver

participant "Client" as Client [[/applications/]]
participant "API Gateway" as GW [[/actors/#api-gateway]] #E0F2FE
participant "svc-safety-compliance" as Svc [[/microservices/svc-safety-compliance/]] #FEE2E2
database "PostgreSQL" as DB [[/microservices/svc-safety-compliance/#data-store]] #FEF9C3

note over Svc
  [[/services/api/svc-safety-compliance.html#/Waivers/getWaiver View in Swagger UI]]
end note

Client -> GW : GET /waivers/{waiver_id}
activate GW #2563eb
GW -> Svc : route request
activate Svc #2563eb

== Database ==

Svc -> DB : SELECT ... WHERE id = ?
activate DB #FEF9C3
DB - -> Svc : Row
deactivate DB
note right of DB : Returns 404 if not found

Svc - -> GW : 200 OK
deactivate Svc
GW - -> Client : 200 OK
deactivate GW

@enduml

