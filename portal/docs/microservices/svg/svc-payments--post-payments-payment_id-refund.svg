00;stroke-width:1.5;" width="787.5649" x="10" y="347.5039"/><text fill="#000000" font-family="'Segoe UI'" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="17.1387" x="25" y="361.0723">alt</text><text fill="#000000" font-family="'Segoe UI'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="152.0771" x="87.1387" y="360.1387">[Payment not COMPLETED]</text><g class="message" data-entity-1="part2" data-entity-2="part1" id="msg4"><polygon fill="#64748B" points="67.7524,397.4355,57.7524,401.4355,67.7524,405.4355,63.7524,401.4355" style="stroke:#64748B;stroke-width:1;"/><line style="stroke:#64748B;stroke-width:1;stroke-dasharray:2,2;" x1="61.7524" x2="315.9316" y1="401.4355" y2="401.4355"/><text fill="#000000" font-family="'Segoe UI'" font-size="13" lengthAdjust="spacing" textLength="120.853" x="73.7524" y="381.3828">422 Unprocessable</text><text fill="#000000" font-family="'Segoe UI'" font-size="13" lengthAdjust="spacing" textLength="164.855" x="73.7524" y="396.6934">(payment_not_refundable)</text></g><line style="stroke:#000000;stroke-width:1;stroke-dasharray:2,2;" x1="10" x2="797.5649" y1="410.4355" y2="410.4355"/><text fill="#000000" font-family="'Segoe UI'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="77.6982" x="15" y="421.0703">[COMPLETED]</text><path d="M331,433.3906 L331,511.3906 A4,4 0 0 0 335,515.3906 L556,515.3906 A4,4 0 0 0 560,511.3906 L560,439.3906 L550,429.3906 L335,429.3906 A4,4 0 0 0 331,433.3906" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M550,429.3906 L550,437.3906 A2,2 0 0 0 552,439.3906 L560,439.3906 L550,429.3906" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="'Segoe UI'" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="147.8813" x="337" y="446.959">Refund Policy Routing</text><text fill="#000000" font-family="'Segoe UI'" font-size="13" lengthAdjust="spacing" textLength="167.064" x="337" y="462.2695">Ful