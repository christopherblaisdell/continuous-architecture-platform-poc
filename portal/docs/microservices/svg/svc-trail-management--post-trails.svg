/svc-trail-management/#integration-context" xlink:show="new" xlink:title="/microservices/svc-trail-management/#integration-context" xlink:type="simple"><text fill="#0000FF" font-family="Segoe UI" font-size="10" lengthAdjust="spacingAndGlyphs" text-decoration="underline" textLength="218" x="241" y="12.2822">⬆ svc-trail-management Integration Context</text></a><!--MD5=[c073f600d667afd7fe28273eddb8dd26]
@startuml svc-trail-management- -post-trails

skinparam backgroundColor #FEFEFE
skinparam shadowing false
skinparam defaultFontName "Segoe UI"
skinparam sequence {
    ArrowColor #059669
    ParticipantBorderColor #374151
    ParticipantBackgroundColor #F9FAFB
    LifeLineBorderColor #6B7280
    BoxBorderColor #94A3B8
    BoxBackgroundColor #F8FAFC
    NoteBorderColor #64748B
    NoteBackgroundColor #F8FAFC
}

header [[/microservices/svc-trail-management/#integration-context ⬆ svc-trail-management Integration Context]]

title POST /trails\nCreate a new trail

participant "Client" as Client [[/applications/]]
participant "API Gateway" as GW [[/actors/#api-gateway]] #E0F2FE
participant "svc-trail-management" as Svc [[/microservices/svc-trail-management/]] #FEF3C7
database "PostGIS" as DB [[/microservices/svc-trail-management/#data-store]] #FEF9C3

note over Svc
  [[/services/api/svc-trail-management.html#/Trails/createTrail View in Swagger UI]]
end note

Client -> GW : POST /trails
activate GW #059669
GW -> Svc : route request
activate Svc #059669

note right of Svc : Validate request body

== Database ==

Svc -> DB : INSERT INTO ...
activate DB #FEF9C3
DB - -> Svc : Created row
deactivate DB

Svc - -> GW : 201 Created
deactivate Svc
GW - -> Client : 201 Created
deactivate GW

@enduml

