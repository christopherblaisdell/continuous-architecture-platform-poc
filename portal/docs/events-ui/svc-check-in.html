<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>svc-check-in Events — Event Specification</title>
  <link rel="stylesheet" href="https://unpkg.com/@asyncapi/react-component@1.4.10/styles/default.min.css">
  <style>
    :root {
      --nt-navy: #1a2744;
      --nt-copper: #c77b30;
      --nt-slate: #f8fafc;
      --nt-text: #1e293b;
      --nt-border: #e2e8f0;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
      background: var(--nt-slate);
      color: var(--nt-text);
    }
    .nt-header {
      background: var(--nt-navy);
      color: white;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .nt-header h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
    }
    .nt-header a {
      color: var(--nt-copper);
      text-decoration: none;
      font-size: 0.9rem;
    }
    .nt-header a:hover {
      text-decoration: underline;
    }
    .nt-breadcrumb {
      background: white;
      border-bottom: 1px solid var(--nt-border);
      padding: 0.5rem 2rem;
      font-size: 0.85rem;
      color: #64748b;
    }
    .nt-breadcrumb a {
      color: var(--nt-copper);
      text-decoration: none;
    }
    .nt-breadcrumb a:hover {
      text-decoration: underline;
    }
    #asyncapi-container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 2rem;
    }
  </style>
</head>
<body>
  <div class="nt-header">
    <h1>svc-check-in Events — Event Specification</h1>
    <a href="/events/">Back to Event Catalog</a>
    <a href="/microservices/svc-check-in/">Service Page</a>
  </div>
  <div class="nt-breadcrumb">
    <a href="/">Portal</a> &rsaquo;
    <a href="/events/">Event Catalog</a> &rsaquo;
    svc-check-in Events
  </div>
  <div id="asyncapi-container">
    <asyncapi-component
      schemaFetchError="Failed to load AsyncAPI specification"
      cssImportPath="https://unpkg.com/@asyncapi/react-component@1.4.10/styles/default.min.css">
    </asyncapi-component>
  </div>
  <script src="https://unpkg.com/@asyncapi/react-component@1.4.10/browser/standalone/index.js"></script>
  <script>
    const schema = {
  "asyncapi": "3.0.0",
  "info": {
    "title": "svc-check-in Events",
    "version": "1.0.0",
    "description": "Domain events published by the NovaTrek Check-In Service",
    "contact": {
      "name": "NovaTrek Operations Team"
    }
  },
  "defaultContentType": "application/json",
  "channels": {
    "checkinCompleted": {
      "address": "novatrek.operations.checkin.completed",
      "messages": {
        "checkinCompleted": {
          "$ref": "#/components/messages/CheckinCompleted"
        }
      }
    }
  },
  "operations": {
    "publishCheckinCompleted": {
      "action": "send",
      "channel": {
        "$ref": "#/channels/checkinCompleted"
      },
      "summary": "Published when a guest completes the check-in process"
    }
  },
  "components": {
    "messages": {
      "CheckinCompleted": {
        "name": "CheckinCompleted",
        "title": "Check-In Completed",
        "summary": "A guest has successfully completed the day-of-adventure check-in process",
        "contentType": "application/json",
        "payload": {
          "$ref": "#/components/schemas/CheckinCompletedPayload"
        }
      }
    },
    "schemas": {
      "CheckinCompletedPayload": {
        "type": "object",
        "required": [
          "event_id",
          "event_type",
          "timestamp",
          "check_in_id",
          "reservation_id",
          "guest_id"
        ],
        "properties": {
          "event_id": {
            "type": "string",
            "format": "uuid",
            "description": "Unique identifier for this event instance"
          },
          "event_type": {
            "type": "string",
            "const": "checkin.completed"
          },
          "timestamp": {
            "type": "string",
            "format": "date-time",
            "description": "ISO 8601 timestamp when the event occurred"
          },
          "check_in_id": {
            "type": "string",
            "format": "uuid",
            "description": "ID of the completed check-in record"
          },
          "reservation_id": {
            "type": "string",
            "format": "uuid",
            "description": "ID of the associated reservation"
          },
          "guest_id": {
            "type": "string",
            "format": "uuid",
            "description": "ID of the checked-in guest"
          },
          "trip_id": {
            "type": "string",
            "format": "uuid",
            "description": "ID of the booked trip"
          },
          "adventure_category": {
            "type": "string",
            "description": "Category of the adventure (e.g., hiking, kayaking)"
          },
          "check_in_pattern": {
            "type": "integer",
            "enum": [
              1,
              2,
              3
            ],
            "description": "Check-in UI pattern applied (1=Basic, 2=Guided, 3=Full Service)"
          },
          "gear_verified": {
            "type": "boolean",
            "description": "Whether gear verification was completed"
          },
          "wristband_assigned": {
            "type": "boolean",
            "description": "Whether an RFID wristband was assigned"
          },
          "rfid_tag": {
            "type": "string",
            "nullable": true,
            "description": "RFID tag identifier if a wristband was assigned"
          }
        }
      }
    }
  }
};
    AsyncApiStandalone.render({ schema: schema, config: { show: { sidebar: true } } }, document.getElementById('asyncapi-container'));
  </script>
</body>
</html>
