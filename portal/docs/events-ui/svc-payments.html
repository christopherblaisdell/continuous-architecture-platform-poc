<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>svc-payments Events — Event Specification</title>
  <link rel="stylesheet" href="https://unpkg.com/@asyncapi/react-component@1.4.10/styles/default.min.css">
  <style>
    :root {
      --nt-navy: #1a2744;
      --nt-copper: #c77b30;
      --nt-slate: #f8fafc;
      --nt-text: #1e293b;
      --nt-border: #e2e8f0;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
      background: var(--nt-slate);
      color: var(--nt-text);
    }
    .nt-header {
      background: var(--nt-navy);
      color: white;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .nt-header h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
    }
    .nt-header a {
      color: var(--nt-copper);
      text-decoration: none;
      font-size: 0.9rem;
    }
    .nt-header a:hover {
      text-decoration: underline;
    }
    .nt-breadcrumb {
      background: white;
      border-bottom: 1px solid var(--nt-border);
      padding: 0.5rem 2rem;
      font-size: 0.85rem;
      color: #64748b;
    }
    .nt-breadcrumb a {
      color: var(--nt-copper);
      text-decoration: none;
    }
    .nt-breadcrumb a:hover {
      text-decoration: underline;
    }
    #asyncapi-container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 2rem;
    }
  </style>
</head>
<body>
  <div class="nt-header">
    <h1>svc-payments Events — Event Specification</h1>
    <a href="/events/">Back to Event Catalog</a>
    <a href="/microservices/svc-payments/">Service Page</a>
  </div>
  <div class="nt-breadcrumb">
    <a href="/">Portal</a> &rsaquo;
    <a href="/events/">Event Catalog</a> &rsaquo;
    svc-payments Events
  </div>
  <div id="asyncapi-container">
    <asyncapi-component
      schemaFetchError="Failed to load AsyncAPI specification"
      cssImportPath="https://unpkg.com/@asyncapi/react-component@1.4.10/styles/default.min.css">
    </asyncapi-component>
  </div>
  <script src="https://unpkg.com/@asyncapi/react-component@1.4.10/browser/standalone/index.js"></script>
  <script>
    const schema = {
  "asyncapi": "3.0.0",
  "info": {
    "title": "svc-payments Events",
    "version": "1.1.0",
    "description": "Domain events published by the NovaTrek Payments Service (PCI scope)",
    "contact": {
      "name": "NovaTrek Engineering"
    }
  },
  "defaultContentType": "application/json",
  "channels": {
    "paymentProcessed": {
      "address": "novatrek.support.payment.processed",
      "messages": {
        "paymentProcessed": {
          "$ref": "#/components/messages/PaymentProcessed"
        }
      }
    },
    "disputeCreated": {
      "address": "novatrek.support.dispute.created",
      "messages": {
        "disputeCreated": {
          "$ref": "#/components/messages/DisputeCreated"
        }
      }
    },
    "disputeStatusChanged": {
      "address": "novatrek.support.dispute.status-changed",
      "messages": {
        "disputeStatusChanged": {
          "$ref": "#/components/messages/DisputeStatusChanged"
        }
      }
    },
    "disputeResolved": {
      "address": "novatrek.support.dispute.resolved",
      "messages": {
        "disputeResolved": {
          "$ref": "#/components/messages/DisputeResolved"
        }
      }
    },
    "disputeEscalated": {
      "address": "novatrek.support.dispute.escalated",
      "messages": {
        "disputeEscalated": {
          "$ref": "#/components/messages/DisputeEscalated"
        }
      }
    }
  },
  "operations": {
    "publishPaymentProcessed": {
      "action": "send",
      "channel": {
        "$ref": "#/channels/paymentProcessed"
      },
      "summary": "Published when a payment transaction is successfully processed"
    },
    "publishDisputeCreated": {
      "action": "send",
      "channel": {
        "$ref": "#/channels/disputeCreated"
      },
      "summary": "Published when a new refund dispute is opened"
    },
    "publishDisputeStatusChanged": {
      "action": "send",
      "channel": {
        "$ref": "#/channels/disputeStatusChanged"
      },
      "summary": "Published when a dispute transitions to a new status"
    },
    "publishDisputeResolved": {
      "action": "send",
      "channel": {
        "$ref": "#/channels/disputeResolved"
      },
      "summary": "Published when a dispute is resolved with a refund decision"
    },
    "publishDisputeEscalated": {
      "action": "send",
      "channel": {
        "$ref": "#/channels/disputeEscalated"
      },
      "summary": "Published when a dispute is escalated to a higher tier"
    }
  },
  "components": {
    "messages": {
      "PaymentProcessed": {
        "name": "PaymentProcessed",
        "title": "Payment Processed",
        "summary": "A payment has been successfully processed through the payment gateway",
        "contentType": "application/json",
        "payload": {
          "$ref": "#/components/schemas/PaymentProcessedPayload"
        }
      },
      "DisputeCreated": {
        "name": "DisputeCreated",
        "title": "Dispute Created",
        "summary": "A new refund dispute has been opened for a payment",
        "contentType": "application/json",
        "payload": {
          "$ref": "#/components/schemas/DisputeCreatedPayload"
        }
      },
      "DisputeStatusChanged": {
        "name": "DisputeStatusChanged",
        "title": "Dispute Status Changed",
        "summary": "A dispute has transitioned to a new lifecycle status",
        "contentType": "application/json",
        "payload": {
          "$ref": "#/components/schemas/DisputeStatusChangedPayload"
        }
      },
      "DisputeResolved": {
        "name": "DisputeResolved",
        "title": "Dispute Resolved",
        "summary": "A dispute has been resolved with a refund decision",
        "contentType": "application/json",
        "payload": {
          "$ref": "#/components/schemas/DisputeResolvedPayload"
        }
      },
      "DisputeEscalated": {
        "name": "DisputeEscalated",
        "title": "Dispute Escalated",
        "summary": "A dispute has been escalated to a higher authority tier",
        "contentType": "application/json",
        "payload": {
          "$ref": "#/components/schemas/DisputeEscalatedPayload"
        }
      }
    },
    "schemas": {
      "PaymentProcessedPayload": {
        "type": "object",
        "description": "NOTE - This event payload intentionally excludes PCI-sensitive data (card numbers, tokens). Only the payment reference and outcome are published.\n",
        "required": [
          "event_id",
          "event_type",
          "timestamp",
          "payment_id",
          "reservation_id",
          "amount",
          "currency",
          "status"
        ],
        "properties": {
          "event_id": {
            "type": "string",
            "format": "uuid",
            "description": "Unique identifier for this event instance"
          },
          "event_type": {
            "type": "string",
            "const": "payment.processed"
          },
          "timestamp": {
            "type": "string",
            "format": "date-time",
            "description": "ISO 8601 timestamp when the event occurred"
          },
          "payment_id": {
            "type": "string",
            "format": "uuid",
            "description": "ID of the payment record"
          },
          "reservation_id": {
            "type": "string",
            "format": "uuid",
            "description": "ID of the reservation this payment covers"
          },
          "amount": {
            "type": "number",
            "format": "decimal",
            "description": "Payment amount"
          },
          "currency": {
            "type": "string",
            "enum": [
              "USD",
              "CAD",
              "EUR",
              "GBP"
            ],
            "description": "ISO 4217 currency code"
          },
          "status": {
            "type": "string",
            "enum": [
              "COMPLETED",
              "REFUNDED",
              "PARTIALLY_REFUNDED"
            ],
            "description": "Outcome of the payment transaction"
          },
          "payment_method": {
            "type": "string",
            "enum": [
              "CREDIT_CARD",
              "DEBIT_CARD",
              "LOYALTY_POINTS",
              "PARTNER_CREDIT"
            ],
            "description": "Payment method category (no card details)"
          }
        }
      },
      "DisputeCreatedPayload": {
        "type": "object",
        "description": "Published when a new dispute is opened. Excludes PCI-sensitive data.",
        "required": [
          "event_id",
          "event_type",
          "timestamp",
          "dispute_id",
          "payment_id",
          "reservation_id",
          "guest_id",
          "type",
          "tier",
          "amount_requested"
        ],
        "properties": {
          "event_id": {
            "type": "string",
            "format": "uuid",
            "description": "Unique identifier for this event instance"
          },
          "event_type": {
            "type": "string",
            "const": "dispute.created"
          },
          "timestamp": {
            "type": "string",
            "format": "date-time",
            "description": "ISO 8601 timestamp when the event occurred"
          },
          "dispute_id": {
            "type": "string",
            "format": "uuid",
            "description": "ID of the dispute record"
          },
          "payment_id": {
            "type": "string",
            "format": "uuid",
            "description": "ID of the original payment"
          },
          "reservation_id": {
            "type": "string",
            "format": "uuid",
            "description": "ID of the associated reservation"
          },
          "guest_id": {
            "type": "string",
            "format": "uuid",
            "description": "ID of the guest who filed the dispute"
          },
          "type": {
            "type": "string",
            "enum": [
              "CANCELLATION",
              "SERVICE_COMPLAINT",
              "WEATHER",
              "CHARGEBACK",
              "OTHER"
            ],
            "description": "Dispute category"
          },
          "tier": {
            "type": "string",
            "enum": [
              "AUTO",
              "AGENT",
              "MANAGER"
            ],
            "description": "Escalation tier assigned by the policy engine"
          },
          "amount_requested": {
            "type": "number",
            "format": "decimal",
            "description": "Refund amount requested by the guest"
          }
        }
      },
      "DisputeStatusChangedPayload": {
        "type": "object",
        "description": "Published when a dispute transitions to a new status.",
        "required": [
          "event_id",
          "event_type",
          "timestamp",
          "dispute_id",
          "guest_id",
          "previous_status",
          "new_status"
        ],
        "properties": {
          "event_id": {
            "type": "string",
            "format": "uuid",
            "description": "Unique identifier for this event instance"
          },
          "event_type": {
            "type": "string",
            "const": "dispute.status_changed"
          },
          "timestamp": {
            "type": "string",
            "format": "date-time",
            "description": "ISO 8601 timestamp when the event occurred"
          },
          "dispute_id": {
            "type": "string",
            "format": "uuid",
            "description": "ID of the dispute record"
          },
          "guest_id": {
            "type": "string",
            "format": "uuid",
            "description": "ID of the guest who filed the dispute"
          },
          "previous_status": {
            "type": "string",
            "enum": [
              "OPENED",
              "UNDER_REVIEW",
              "ESCALATED",
              "RESOLVED",
              "CLOSED"
            ],
            "description": "Status before the transition"
          },
          "new_status": {
            "type": "string",
            "enum": [
              "OPENED",
              "UNDER_REVIEW",
              "ESCALATED",
              "RESOLVED",
              "CLOSED"
            ],
            "description": "Status after the transition"
          }
        }
      },
      "DisputeResolvedPayload": {
        "type": "object",
        "description": "Published when a dispute is resolved with a final decision.",
        "required": [
          "event_id",
          "event_type",
          "timestamp",
          "dispute_id",
          "payment_id",
          "guest_id",
          "resolution",
          "amount_requested",
          "resolver_role"
        ],
        "properties": {
          "event_id": {
            "type": "string",
            "format": "uuid",
            "description": "Unique identifier for this event instance"
          },
          "event_type": {
            "type": "string",
            "const": "dispute.resolved"
          },
          "timestamp": {
            "type": "string",
            "format": "date-time",
            "description": "ISO 8601 timestamp when the event occurred"
          },
          "dispute_id": {
            "type": "string",
            "format": "uuid",
            "description": "ID of the dispute record"
          },
          "payment_id": {
            "type": "string",
            "format": "uuid",
            "description": "ID of the original payment"
          },
          "guest_id": {
            "type": "string",
            "format": "uuid",
            "description": "ID of the guest who filed the dispute"
          },
          "resolution": {
            "type": "string",
            "enum": [
              "FULL_REFUND",
              "PARTIAL_REFUND",
              "DENIED"
            ],
            "description": "Resolution outcome"
          },
          "amount_requested": {
            "type": "number",
            "format": "decimal",
            "description": "Refund amount originally requested"
          },
          "amount_approved": {
            "oneOf": [
              {
                "type": "number",
                "format": "decimal"
              },
              {
                "type": "null"
              }
            ],
            "description": "Refund amount approved (null if denied)"
          },
          "resolver_role": {
            "type": "string",
            "enum": [
              "SYSTEM",
              "AGENT",
              "MANAGER"
            ],
            "description": "Role of the resolver (SYSTEM for auto-approved)"
          }
        }
      },
      "DisputeEscalatedPayload": {
        "type": "object",
        "description": "Published when a dispute is escalated to a higher authority tier.",
        "required": [
          "event_id",
          "event_type",
          "timestamp",
          "dispute_id",
          "guest_id",
          "from_tier",
          "to_tier"
        ],
        "properties": {
          "event_id": {
            "type": "string",
            "format": "uuid",
            "description": "Unique identifier for this event instance"
          },
          "event_type": {
            "type": "string",
            "const": "dispute.escalated"
          },
          "timestamp": {
            "type": "string",
            "format": "date-time",
            "description": "ISO 8601 timestamp when the event occurred"
          },
          "dispute_id": {
            "type": "string",
            "format": "uuid",
            "description": "ID of the dispute record"
          },
          "guest_id": {
            "type": "string",
            "format": "uuid",
            "description": "ID of the guest who filed the dispute"
          },
          "from_tier": {
            "type": "string",
            "enum": [
              "AUTO",
              "AGENT"
            ],
            "description": "Tier the dispute was escalated from"
          },
          "to_tier": {
            "type": "string",
            "enum": [
              "AGENT",
              "MANAGER"
            ],
            "description": "Tier the dispute was escalated to"
          },
          "reason": {
            "type": "string",
            "description": "Reason for escalation"
          }
        }
      }
    }
  }
};
    AsyncApiStandalone.render({ schema: schema, config: { show: { sidebar: true } } }, document.getElementById('asyncapi-container'));
  </script>
</body>
</html>
