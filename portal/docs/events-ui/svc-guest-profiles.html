<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>svc-guest-profiles Events — Event Specification</title>
  <link rel="stylesheet" href="https://unpkg.com/@asyncapi/react-component@1.4.10/styles/default.min.css">
  <style>
    :root {
      --nt-navy: #1a2744;
      --nt-copper: #c77b30;
      --nt-slate: #f8fafc;
      --nt-text: #1e293b;
      --nt-border: #e2e8f0;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
      background: var(--nt-slate);
      color: var(--nt-text);
    }
    .nt-header {
      background: var(--nt-navy);
      color: white;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .nt-header h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
    }
    .nt-header a {
      color: var(--nt-copper);
      text-decoration: none;
      font-size: 0.9rem;
    }
    .nt-header a:hover {
      text-decoration: underline;
    }
    .nt-breadcrumb {
      background: white;
      border-bottom: 1px solid var(--nt-border);
      padding: 0.5rem 2rem;
      font-size: 0.85rem;
      color: #64748b;
    }
    .nt-breadcrumb a {
      color: var(--nt-copper);
      text-decoration: none;
    }
    .nt-breadcrumb a:hover {
      text-decoration: underline;
    }
    #asyncapi-container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 2rem;
    }
  </style>
</head>
<body>
  <div class="nt-header">
    <h1>svc-guest-profiles Events — Event Specification</h1>
    <a href="/events/">Back to Event Catalog</a>
    <a href="/microservices/svc-guest-profiles/">Service Page</a>
  </div>
  <div class="nt-breadcrumb">
    <a href="/">Portal</a> &rsaquo;
    <a href="/events/">Event Catalog</a> &rsaquo;
    svc-guest-profiles Events
  </div>
  <div id="asyncapi-container">
    <asyncapi-component
      schemaFetchError="Failed to load AsyncAPI specification"
      cssImportPath="https://unpkg.com/@asyncapi/react-component@1.4.10/styles/default.min.css">
    </asyncapi-component>
  </div>
  <script src="https://unpkg.com/@asyncapi/react-component@1.4.10/browser/standalone/index.js"></script>
  <script>
    const schema = {
  "asyncapi": "3.0.0",
  "info": {
    "title": "svc-guest-profiles Events",
    "version": "2.4.0",
    "description": "Domain events published by the NovaTrek Guest Profiles Service",
    "contact": {
      "name": "Guest Experience Team"
    }
  },
  "defaultContentType": "application/json",
  "channels": {
    "guestRegistered": {
      "address": "novatrek.guest-identity.guest.registered",
      "messages": {
        "guestRegistered": {
          "$ref": "#/components/messages/GuestRegistered"
        }
      }
    }
  },
  "operations": {
    "publishGuestRegistered": {
      "action": "send",
      "channel": {
        "$ref": "#/channels/guestRegistered"
      },
      "summary": "Published when a new guest profile is created"
    }
  },
  "components": {
    "messages": {
      "GuestRegistered": {
        "name": "GuestRegistered",
        "title": "Guest Registered",
        "summary": "A new guest has registered in the system",
        "contentType": "application/json",
        "payload": {
          "$ref": "#/components/schemas/GuestRegisteredPayload"
        }
      }
    },
    "schemas": {
      "GuestRegisteredPayload": {
        "type": "object",
        "required": [
          "event_id",
          "event_type",
          "timestamp",
          "guest_id",
          "first_name",
          "last_name"
        ],
        "properties": {
          "event_id": {
            "type": "string",
            "format": "uuid",
            "description": "Unique identifier for this event instance"
          },
          "event_type": {
            "type": "string",
            "const": "guest.registered"
          },
          "timestamp": {
            "type": "string",
            "format": "date-time",
            "description": "ISO 8601 timestamp when the event occurred"
          },
          "guest_id": {
            "type": "string",
            "format": "uuid",
            "description": "ID of the newly registered guest"
          },
          "first_name": {
            "type": "string",
            "description": "Guest first name"
          },
          "last_name": {
            "type": "string",
            "description": "Guest last name"
          },
          "email": {
            "type": "string",
            "format": "email",
            "description": "Guest email address"
          },
          "date_of_birth": {
            "type": "string",
            "format": "date",
            "description": "Guest date of birth"
          }
        }
      }
    }
  }
};
    AsyncApiStandalone.render({ schema: schema, config: { show: { sidebar: true } } }, document.getElementById('asyncapi-container'));
  </script>
</body>
</html>
