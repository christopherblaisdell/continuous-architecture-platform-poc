<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>svc-scheduling-orchestrator Events — Event Specification</title>
  <link rel="stylesheet" href="https://unpkg.com/@asyncapi/react-component@1.4.10/styles/default.min.css">
  <style>
    :root {
      --nt-navy: #1a2744;
      --nt-copper: #c77b30;
      --nt-slate: #f8fafc;
      --nt-text: #1e293b;
      --nt-border: #e2e8f0;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
      background: var(--nt-slate);
      color: var(--nt-text);
    }
    .nt-header {
      background: var(--nt-navy);
      color: white;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .nt-header h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
    }
    .nt-header a {
      color: var(--nt-copper);
      text-decoration: none;
      font-size: 0.9rem;
    }
    .nt-header a:hover {
      text-decoration: underline;
    }
    .nt-breadcrumb {
      background: white;
      border-bottom: 1px solid var(--nt-border);
      padding: 0.5rem 2rem;
      font-size: 0.85rem;
      color: #64748b;
    }
    .nt-breadcrumb a {
      color: var(--nt-copper);
      text-decoration: none;
    }
    .nt-breadcrumb a:hover {
      text-decoration: underline;
    }
    #asyncapi-container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 2rem;
    }
  </style>
</head>
<body>
  <div class="nt-header">
    <h1>svc-scheduling-orchestrator Events — Event Specification</h1>
    <a href="/events/">Back to Event Catalog</a>
    <a href="/microservices/svc-scheduling-orchestrator/">Service Page</a>
  </div>
  <div class="nt-breadcrumb">
    <a href="/">Portal</a> &rsaquo;
    <a href="/events/">Event Catalog</a> &rsaquo;
    svc-scheduling-orchestrator Events
  </div>
  <div id="asyncapi-container">
    <asyncapi-component
      schemaFetchError="Failed to load AsyncAPI specification"
      cssImportPath="https://unpkg.com/@asyncapi/react-component@1.4.10/styles/default.min.css">
    </asyncapi-component>
  </div>
  <script src="https://unpkg.com/@asyncapi/react-component@1.4.10/browser/standalone/index.js"></script>
  <script>
    const schema = {
  "asyncapi": "3.0.0",
  "info": {
    "title": "svc-scheduling-orchestrator Events",
    "version": "3.0.1",
    "description": "Domain events published by the NovaTrek Scheduling Orchestrator",
    "contact": {
      "name": "NovaTrek Operations Team"
    }
  },
  "defaultContentType": "application/json",
  "channels": {
    "schedulePublished": {
      "address": "novatrek.operations.schedule.published",
      "messages": {
        "schedulePublished": {
          "$ref": "#/components/messages/SchedulePublished"
        }
      }
    }
  },
  "operations": {
    "publishSchedulePublished": {
      "action": "send",
      "channel": {
        "$ref": "#/channels/schedulePublished"
      },
      "summary": "Published when a daily schedule is finalized and distributed"
    }
  },
  "components": {
    "messages": {
      "SchedulePublished": {
        "name": "SchedulePublished",
        "title": "Schedule Published",
        "summary": "A daily adventure schedule has been finalized and is ready for execution",
        "contentType": "application/json",
        "payload": {
          "$ref": "#/components/schemas/SchedulePublishedPayload"
        }
      }
    },
    "schemas": {
      "SchedulePublishedPayload": {
        "type": "object",
        "required": [
          "event_id",
          "event_type",
          "timestamp",
          "schedule_id",
          "schedule_date"
        ],
        "properties": {
          "event_id": {
            "type": "string",
            "format": "uuid",
            "description": "Unique identifier for this event instance"
          },
          "event_type": {
            "type": "string",
            "const": "schedule.published"
          },
          "timestamp": {
            "type": "string",
            "format": "date-time",
            "description": "ISO 8601 timestamp when the event occurred"
          },
          "schedule_id": {
            "type": "string",
            "format": "uuid",
            "description": "ID of the published daily schedule"
          },
          "schedule_date": {
            "type": "string",
            "format": "date",
            "description": "The date this schedule covers"
          },
          "trip_count": {
            "type": "integer",
            "minimum": 0,
            "description": "Number of trips scheduled for the day"
          },
          "guide_count": {
            "type": "integer",
            "minimum": 0,
            "description": "Number of guides assigned"
          },
          "optimization_score": {
            "type": "number",
            "format": "float",
            "description": "Quality score from the optimization algorithm (0.0 to 1.0)"
          },
          "conflicts_resolved": {
            "type": "integer",
            "minimum": 0,
            "description": "Number of scheduling conflicts that were resolved"
          }
        }
      }
    }
  }
};
    AsyncApiStandalone.render({ schema: schema, config: { show: { sidebar: true } } }, document.getElementById('asyncapi-container'));
  </script>
</body>
</html>
