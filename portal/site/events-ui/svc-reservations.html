<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>svc-reservations Events — Event Specification</title>
  <link rel="stylesheet" href="https://unpkg.com/@asyncapi/react-component@1.4.10/styles/default.min.css">
  <style>
    :root {
      --nt-navy: #1a2744;
      --nt-copper: #c77b30;
      --nt-slate: #f8fafc;
      --nt-text: #1e293b;
      --nt-border: #e2e8f0;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
      background: var(--nt-slate);
      color: var(--nt-text);
    }
    .nt-header {
      background: var(--nt-navy);
      color: white;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .nt-header h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
    }
    .nt-header a {
      color: var(--nt-copper);
      text-decoration: none;
      font-size: 0.9rem;
    }
    .nt-header a:hover {
      text-decoration: underline;
    }
    .nt-breadcrumb {
      background: white;
      border-bottom: 1px solid var(--nt-border);
      padding: 0.5rem 2rem;
      font-size: 0.85rem;
      color: #64748b;
    }
    .nt-breadcrumb a {
      color: var(--nt-copper);
      text-decoration: none;
    }
    .nt-breadcrumb a:hover {
      text-decoration: underline;
    }
    #asyncapi-container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 2rem;
    }
  </style>
</head>
<body>
  <div class="nt-header">
    <h1>svc-reservations Events — Event Specification</h1>
    <a href="/events/">Back to Event Catalog</a>
    <a href="/microservices/svc-reservations/">Service Page</a>
  </div>
  <div class="nt-breadcrumb">
    <a href="/">Portal</a> &rsaquo;
    <a href="/events/">Event Catalog</a> &rsaquo;
    svc-reservations Events
  </div>
  <div id="asyncapi-container">
    <asyncapi-component
      schemaFetchError="Failed to load AsyncAPI specification"
      cssImportPath="https://unpkg.com/@asyncapi/react-component@1.4.10/styles/default.min.css">
    </asyncapi-component>
  </div>
  <script src="https://unpkg.com/@asyncapi/react-component@1.4.10/browser/standalone/index.js"></script>
  <script>
    const schema = {
  "asyncapi": "3.0.0",
  "info": {
    "title": "svc-reservations Events",
    "version": "2.4.1",
    "description": "Domain events published by the NovaTrek Reservations Service",
    "contact": {
      "name": "Booking Platform Team"
    }
  },
  "defaultContentType": "application/json",
  "channels": {
    "reservationCreated": {
      "address": "novatrek.booking.reservation.created",
      "messages": {
        "reservationCreated": {
          "$ref": "#/components/messages/ReservationCreated"
        }
      }
    },
    "reservationStatusChanged": {
      "address": "novatrek.booking.reservation.status-changed",
      "messages": {
        "reservationStatusChanged": {
          "$ref": "#/components/messages/ReservationStatusChanged"
        }
      }
    }
  },
  "operations": {
    "publishReservationCreated": {
      "action": "send",
      "channel": {
        "$ref": "#/channels/reservationCreated"
      },
      "summary": "Published when a new reservation is confirmed"
    },
    "publishReservationStatusChanged": {
      "action": "send",
      "channel": {
        "$ref": "#/channels/reservationStatusChanged"
      },
      "summary": "Published when a reservation status transitions"
    }
  },
  "components": {
    "messages": {
      "ReservationCreated": {
        "name": "ReservationCreated",
        "title": "Reservation Created",
        "summary": "A new reservation has been confirmed in the system",
        "contentType": "application/json",
        "payload": {
          "$ref": "#/components/schemas/ReservationCreatedPayload"
        }
      },
      "ReservationStatusChanged": {
        "name": "ReservationStatusChanged",
        "title": "Reservation Status Changed",
        "summary": "A reservation has transitioned to a new status",
        "contentType": "application/json",
        "payload": {
          "$ref": "#/components/schemas/ReservationStatusChangedPayload"
        }
      }
    },
    "schemas": {
      "ReservationCreatedPayload": {
        "type": "object",
        "required": [
          "event_id",
          "event_type",
          "timestamp",
          "reservation_id",
          "guest_id",
          "trip_id"
        ],
        "properties": {
          "event_id": {
            "type": "string",
            "format": "uuid",
            "description": "Unique identifier for this event instance"
          },
          "event_type": {
            "type": "string",
            "const": "reservation.created"
          },
          "timestamp": {
            "type": "string",
            "format": "date-time",
            "description": "ISO 8601 timestamp when the event occurred"
          },
          "reservation_id": {
            "type": "string",
            "format": "uuid",
            "description": "ID of the newly created reservation"
          },
          "guest_id": {
            "type": "string",
            "format": "uuid",
            "description": "ID of the guest who made the reservation"
          },
          "trip_id": {
            "type": "string",
            "format": "uuid",
            "description": "ID of the booked trip"
          },
          "trip_date": {
            "type": "string",
            "format": "date",
            "description": "Scheduled date of the adventure"
          },
          "participant_count": {
            "type": "integer",
            "minimum": 1,
            "description": "Number of participants on the reservation"
          },
          "status": {
            "type": "string",
            "enum": [
              "CONFIRMED"
            ]
          },
          "confirmation_code": {
            "type": "string",
            "description": "Human-readable booking confirmation code"
          }
        }
      },
      "ReservationStatusChangedPayload": {
        "type": "object",
        "required": [
          "event_id",
          "event_type",
          "timestamp",
          "reservation_id",
          "previous_status",
          "new_status"
        ],
        "properties": {
          "event_id": {
            "type": "string",
            "format": "uuid",
            "description": "Unique identifier for this event instance"
          },
          "event_type": {
            "type": "string",
            "const": "reservation.status_changed"
          },
          "timestamp": {
            "type": "string",
            "format": "date-time",
            "description": "ISO 8601 timestamp when the event occurred"
          },
          "reservation_id": {
            "type": "string",
            "format": "uuid",
            "description": "ID of the reservation whose status changed"
          },
          "previous_status": {
            "type": "string",
            "enum": [
              "PENDING",
              "CONFIRMED",
              "CHECKED_IN",
              "IN_PROGRESS",
              "COMPLETED",
              "CANCELLED"
            ],
            "description": "Status before the transition"
          },
          "new_status": {
            "type": "string",
            "enum": [
              "PENDING",
              "CONFIRMED",
              "CHECKED_IN",
              "IN_PROGRESS",
              "COMPLETED",
              "CANCELLED"
            ],
            "description": "Status after the transition"
          },
          "changed_by": {
            "type": "string",
            "description": "User or service identifier that triggered the transition"
          }
        }
      }
    }
  }
};
    AsyncApiStandalone.render({ schema: schema, config: { show: { sidebar: true } } }, document.getElementById('asyncapi-container'));
  </script>
</body>
</html>
