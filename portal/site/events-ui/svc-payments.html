<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>svc-payments Events — Event Specification</title>
  <link rel="stylesheet" href="https://unpkg.com/@asyncapi/react-component@1.4.10/styles/default.min.css">
  <style>
    :root {
      --nt-navy: #1a2744;
      --nt-copper: #c77b30;
      --nt-slate: #f8fafc;
      --nt-text: #1e293b;
      --nt-border: #e2e8f0;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
      background: var(--nt-slate);
      color: var(--nt-text);
    }
    .nt-header {
      background: var(--nt-navy);
      color: white;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .nt-header h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
    }
    .nt-header a {
      color: var(--nt-copper);
      text-decoration: none;
      font-size: 0.9rem;
    }
    .nt-header a:hover {
      text-decoration: underline;
    }
    .nt-breadcrumb {
      background: white;
      border-bottom: 1px solid var(--nt-border);
      padding: 0.5rem 2rem;
      font-size: 0.85rem;
      color: #64748b;
    }
    .nt-breadcrumb a {
      color: var(--nt-copper);
      text-decoration: none;
    }
    .nt-breadcrumb a:hover {
      text-decoration: underline;
    }
    #asyncapi-container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 2rem;
    }
  </style>
</head>
<body>
  <div class="nt-header">
    <h1>svc-payments Events — Event Specification</h1>
    <a href="/events/">Back to Event Catalog</a>
    <a href="/microservices/svc-payments/">Service Page</a>
  </div>
  <div class="nt-breadcrumb">
    <a href="/">Portal</a> &rsaquo;
    <a href="/events/">Event Catalog</a> &rsaquo;
    svc-payments Events
  </div>
  <div id="asyncapi-container">
    <asyncapi-component
      schemaFetchError="Failed to load AsyncAPI specification"
      cssImportPath="https://unpkg.com/@asyncapi/react-component@1.4.10/styles/default.min.css">
    </asyncapi-component>
  </div>
  <script src="https://unpkg.com/@asyncapi/react-component@1.4.10/browser/standalone/index.js"></script>
  <script>
    const schema = {
  "asyncapi": "3.0.0",
  "info": {
    "title": "svc-payments Events",
    "version": "1.0.0",
    "description": "Domain events published by the NovaTrek Payments Service (PCI scope)",
    "contact": {
      "name": "NovaTrek Engineering"
    }
  },
  "defaultContentType": "application/json",
  "channels": {
    "paymentProcessed": {
      "address": "novatrek.support.payment.processed",
      "messages": {
        "paymentProcessed": {
          "$ref": "#/components/messages/PaymentProcessed"
        }
      }
    }
  },
  "operations": {
    "publishPaymentProcessed": {
      "action": "send",
      "channel": {
        "$ref": "#/channels/paymentProcessed"
      },
      "summary": "Published when a payment transaction is successfully processed"
    }
  },
  "components": {
    "messages": {
      "PaymentProcessed": {
        "name": "PaymentProcessed",
        "title": "Payment Processed",
        "summary": "A payment has been successfully processed through the payment gateway",
        "contentType": "application/json",
        "payload": {
          "$ref": "#/components/schemas/PaymentProcessedPayload"
        }
      }
    },
    "schemas": {
      "PaymentProcessedPayload": {
        "type": "object",
        "description": "NOTE - This event payload intentionally excludes PCI-sensitive data (card numbers, tokens). Only the payment reference and outcome are published.\n",
        "required": [
          "event_id",
          "event_type",
          "timestamp",
          "payment_id",
          "reservation_id",
          "amount",
          "currency",
          "status"
        ],
        "properties": {
          "event_id": {
            "type": "string",
            "format": "uuid",
            "description": "Unique identifier for this event instance"
          },
          "event_type": {
            "type": "string",
            "const": "payment.processed"
          },
          "timestamp": {
            "type": "string",
            "format": "date-time",
            "description": "ISO 8601 timestamp when the event occurred"
          },
          "payment_id": {
            "type": "string",
            "format": "uuid",
            "description": "ID of the payment record"
          },
          "reservation_id": {
            "type": "string",
            "format": "uuid",
            "description": "ID of the reservation this payment covers"
          },
          "amount": {
            "type": "number",
            "format": "decimal",
            "description": "Payment amount"
          },
          "currency": {
            "type": "string",
            "enum": [
              "USD",
              "CAD",
              "EUR",
              "GBP"
            ],
            "description": "ISO 4217 currency code"
          },
          "status": {
            "type": "string",
            "enum": [
              "COMPLETED",
              "REFUNDED",
              "PARTIALLY_REFUNDED"
            ],
            "description": "Outcome of the payment transaction"
          },
          "payment_method": {
            "type": "string",
            "enum": [
              "CREDIT_CARD",
              "DEBIT_CARD",
              "LOYALTY_POINTS",
              "PARTNER_CREDIT"
            ],
            "description": "Payment method category (no card details)"
          }
        }
      }
    }
  }
};
    AsyncApiStandalone.render({ schema: schema, config: { show: { sidebar: true } } }, document.getElementById('asyncapi-container'));
  </script>
</body>
</html>
